<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake_Twitch - Stream, Gaming & Community</title>
<meta name="description" content="VenomSnake_Twitch - Dein Twitch Streamer für Metal Gear Solid, Resident Evil und mehr. Streams jeden Montag, Mittwoch und Freitag um 13:30 Uhr.">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
    :root {
        --twitch: #9146FF;
        --twitch-dim: #772ce8;
        --tactical-blue: #52b6ca;
        --base: #0a0b0e;
        --surface: #13151a;
        --overlay: #1c1f26;
        --live: #ff4444;
        --text-primary: #e6eef3;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Rajdhani', sans-serif; font-weight: 500; background-color: var(--base); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }

    /* Grid Background */
    .grid-bg { background-image: radial-gradient(rgba(82, 182, 202, 0.1) 1px, transparent 1px); background-size: 40px 40px; }

    /* Glass Effect */
    .glass { backdrop-filter: blur(16px); background-color: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--border); }

    /* Cut Corner Effects */
    .cut-corner { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%); }
    .cut-corner-sm { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); }

    /* Glow Effects */
    .glow-text { text-shadow: 0 0 20px rgba(145, 70, 255, 0.5); }
    .glow-twitch { box-shadow: 0 0 30px rgba(145, 70, 255, 0.3); }

    /* Navigation */
    .nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 50; }
    .nav-container { max-width: 1600px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 80px; }
    .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .logo img { height: 56px; width: auto; }
    .logo-text { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.25rem; letter-spacing: 0.1em; }
    .logo-text .venom { color: var(--twitch); }
    .logo-text .snake { color: var(--tactical-blue); }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-link { font-family: 'Chakra Petch', sans-serif; font-size: 0.875rem; letter-spacing: 0.2em; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s; position: relative; }
    .nav-link:hover, .nav-link.active { color: var(--twitch); }
    .nav-link::after { content: ""; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: var(--twitch); transition: width 0.3s ease; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .discord-btn { background-color: #5865F2; color: white; padding: 0.5rem 1rem; font-family: 'Chakra Petch', sans-serif; font-size: 0.875rem; letter-spacing: 0.1em; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: background-color 0.3s; }
    .discord-btn:hover { background-color: #4752c4; }

    /* Mobile Menu */
    .mobile-menu-btn { display: none; background: none; border: none; color: white; cursor: pointer; }
    .mobile-nav { display: none; padding: 1rem 0; border-top: 1px solid var(--border); }
    .mobile-nav.open { display: block; }
    .mobile-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0.5rem; font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.1em; color: var(--text-secondary); text-decoration: none; }
    .mobile-nav a.active { color: var(--twitch); }

    /* Page Container */
    .page { display: none; min-height: 100vh; padding-top: 96px; padding-bottom: 3rem; }
    .page.active { display: block; }
    .container { max-width: 1600px; margin: 0 auto; padding: 0 1rem; }

    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 2.5rem; text-transform: uppercase; letter-spacing: -0.025em; }
    .page-header .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-secondary); margin-top: 0.5rem; }

    /* CTA Buttons */
    .cta-box { background-color: var(--overlay); border: 1px solid rgba(145, 70, 255, 0.3); padding: 1.5rem; }
    .cta-buttons { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.5rem; }
    .btn { padding: 0.75rem 1.5rem; font-family: 'Chakra Petch', sans-serif; font-size: 0.875rem; letter-spacing: 0.1em; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: background-color 0.3s; }
    .btn-twitch { background-color: var(--twitch); color: white; }
    .btn-twitch:hover { background-color: var(--twitch-dim); }
    .btn-discord { background-color: #5865F2; color: white; }
    .btn-discord:hover { background-color: #4752c4; }

    /* Footer */
    footer { background-color: var(--base); border-top: 1px solid var(--border); padding: 1.5rem 0; }
    .footer-content { max-width: 1600px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    @media (min-width: 768px) { .footer-content { flex-direction: row; justify-content: space-between; } }
    .footer-left { display: flex; align-items: center; gap: 0.75rem; }
    .footer-left img { height: 32px; width: auto; }
    .footer-left span { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--text-muted); transition: color 0.3s; }
    .footer-links a:hover { color: var(--twitch); }

    /* Responsive */
    @media (max-width: 768px) { .nav-links { display: none; } .mobile-menu-btn { display: block; } .page-header h1 { font-size: 2rem; } .container { padding: 0 1rem; } }

    .discord-icon { width: 20px; height: 20px; fill: currentColor; }
</style>
</head>
<body>
