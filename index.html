<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenomSnake_Twitch - Stream, Gaming & Community</title>
    <meta name="description" content="VenomSnake_Twitch - Dein Twitch Streamer für Metal Gear Solid, Resident Evil und mehr. Streams jeden Montag, Mittwoch und Freitag um 13:30 Uhr.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --twitch: #9146FF;
            --twitch-dim: #772ce8;
            --tactical-blue: #52b6ca;
            --base: #0a0b0e;
            --surface: #13151a;
            --overlay: #1c1f26;
            --live: #ff4444;
            --text-primary: #e6eef3;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Rajdhani', sans-serif; font-weight:500; background-color: var(--base); color: var(--text-primary); min-height:100vh; line-height:1.6; }

        /* Grid Background */
        .grid-bg { background-image: radial-gradient(rgba(82, 182, 202, 0.1) 1px, transparent 1px); background-size: 40px 40px; }

        /* Glass Effect */
        .glass { backdrop-filter: blur(16px); background-color: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }

        /* Cut Corner */
        .cut-corner { clip-path: polygon(0 0,100% 0,100% calc(100% - 20px),calc(100% - 20px) 100%,0 100%); }
        .cut-corner-sm { clip-path: polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%); }

        /* Glow Effects */
        .glow-text { text-shadow: 0 0 20px rgba(145,70,255,0.5); }
        .glow-twitch { box-shadow: 0 0 30px rgba(145,70,255,0.3); }

        /* Navigation */
        .nav { position: fixed; top:0; left:0; width:100%; z-index:50; }
        .nav-container { max-width:1600px; margin:0 auto; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:80px; }
        .logo { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .logo img { height:56px; width:auto; }
        .logo-text { font-family: 'Chakra Petch', sans-serif; font-weight:700; font-size:1.25rem; letter-spacing:0.1em; }
        .logo-text .venom { color: var(--twitch); } .logo-text .snake { color: var(--tactical-blue); }
        .nav-links { display:flex; align-items:center; gap:2rem; }
        .nav-link { font-family: 'Chakra Petch', sans-serif; font-size:0.875rem; letter-spacing:0.2em; color:var(--text-secondary); text-decoration:none; display:flex; align-items:center; gap:0.5rem; transition: color 0.3s; position:relative; }
        .nav-link:hover, .nav-link.active { color: var(--twitch); }
        .nav-link::after { content:""; position:absolute; bottom:-4px; left:0; width:0; height:2px; background-color:var(--twitch); transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width:100%; }
        .discord-btn { background-color:#5865F2; color:white; padding:0.5rem 1rem; font-family:'Chakra Petch',sans-serif; font-size:0.875rem; letter-spacing:0.1em; display:flex; align-items:center; gap:0.5rem; text-decoration:none; transition: background-color 0.3s; }
        .discord-btn:hover { background-color:#4752c4; }

        /* Mobile Menu */
        .mobile-menu-btn { display:none; background:none; border:none; color:white; cursor:pointer; }
        .mobile-nav { display:none; padding:1rem 0; border-top:1px solid var(--border); }
        .mobile-nav.open { display:block; }
        .mobile-nav a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 0.5rem; font-family:'Chakra Petch', monospace; letter-spacing:0.1em; color:var(--text-secondary); text-decoration:none; }
        .mobile-nav a.active { color: var(--twitch); }

        /* Pages */
        .page { display:none; min-height:100vh; padding-top:96px; padding-bottom:3rem; }
        .page.active { display:block; }

        .container { max-width:1600px; margin:0 auto; padding:0 1rem; }

        /* Footer */
        footer { background-color: var(--base); border-top:1px solid var(--border); padding:1.5rem 0; }
        .footer-content { max-width:1600px; margin:0 auto; padding:0 1rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }
        @media (min-width:768px) { .footer-content { flex-direction:row; justify-content:space-between; } }

        /* Responsive */
        @media (max-width:768px) { .nav-links { display:none; } .mobile-menu-btn { display:block; } }
    </style>
</head>
<body>
    <script>
        const TWITCH_CHANNEL = "VenomSnake_Twitch";
        const DISCORD_LINK = "https://discord.gg/SFzk4YxgRv";
    </script>

    <!-- Navigation -->
    <nav class="nav glass">
        <div class="nav-container">
            <a href="#" class="logo" onclick="showPage('stream'); return false;">
                <img src="https://customer-assets.emergentagent.com/job_e904fb4f-623b-4db4-a233-abfe9217b422/artifacts/5y81atfn_DogVenomsnake.png" alt="VenomSnake Logo">
                <span class="logo-text"><span class="venom">VENOM</span><span class="snake">SNAKE</span></span>
            </a>

            <div class="nav-links">
                <a href="#" class="nav-link active" data-page="stream" onclick="showPage('stream'); return false;"><i data-lucide="tv"></i> STREAM</a>
                <a href="#" class="nav-link" data-page="musicplayer" onclick="showExternalPage('musikplayer.html'); return false;"><i data-lucide="music"></i> MUSIKPLAYER</a>
                <a href="#" class="nav-link" data-page="contact" onclick="showExternalPage('kontakt.html'); return false;"><i data-lucide="mail"></i> KONTAKT</a>
                <a href="https://discord.gg/SFzk4YxgRv" target="_blank" class="discord-btn cut-corner-sm">DISCORD</a>
            </div>

            <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i data-lucide="menu"></i></button>
        </div>

        <div class="mobile-nav" id="mobileNav">
            <a href="#" class="active" data-page="stream" onclick="showPage('stream'); toggleMobileMenu(); return false;"><i data-lucide="tv"></i> STREAM</a>
            <a href="#" data-page="musicplayer" onclick="showExternalPage('musikplayer.html'); toggleMobileMenu(); return false;"><i data-lucide="music"></i> MUSIKPLAYER</a>
            <a href="#" data-page="contact" onclick="showExternalPage('kontakt.html'); toggleMobileMenu(); return false;"><i data-lucide="mail"></i> KONTAKT</a>
            <a href="https://discord.gg/SFzk4YxgRv" target="_blank" style="color:#5865F2;">DISCORD</a>
        </div>
    </nav>

    <!-- Stream Page (unverändert) -->
    <main id="page-stream" class="page active grid-bg">
        <div class="container">
            <h1 style="color:var(--twitch);">STREAM-BEREICH</h1>
            <p>Hier bleibt dein aktueller Stream-Bereich komplett erhalten.</p>
            <!-- Dein kompletter Stream-Bereich Code hier einfügen -->
        </div>
    </main>

    <!-- Externe Pages -->
    <main id="page-external" class="page grid-bg">
        <div class="container" id="external-content"></div>
    </main>

    <footer>
        <div class="footer-content">
            <span>&copy; 2026 VenomSnake_Twitch</span>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        const pages = document.querySelectorAll('.page');

        function showPage(id) {
            pages.forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + id);
            if(page) page.classList.add('active');
        }

        async function showExternalPage(url) {
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById('page-external').classList.add('active');
            const container = document.getElementById('external-content');
            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error('Seite konnte nicht geladen werden.');
                const html = await response.text();
                container.innerHTML = html;
            } catch(err) {
                container.innerHTML = `<p style="color:red;">Fehler beim Laden: ${err.message}</p>`;
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobileNav').classList.toggle('open');
        }
    </script>
</body>
</html>
