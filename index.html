<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenomSnake_Twitch - Stream, Gaming & Community</title>
    <meta name="description" content="VenomSnake_Twitch - Dein Twitch Streamer für Metal Gear Solid, Resident Evil und mehr. Streams jeden Montag, Mittwoch und Freitag um 13:30 Uhr.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --twitch: #9146FF;
            --twitch-dim: #772ce8;
            --tactical-blue: #52b6ca;
            --base: #0a0b0e;
            --surface: #13151a;
            --overlay: #1c1f26;
            --live: #ff4444;
            --text-primary: #e6eef3;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; font-weight: 500; background-color: var(--base); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }

        .grid-bg { background-image: radial-gradient(rgba(82, 182, 202, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
        .glass { backdrop-filter: blur(16px); background-color: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--border); }
        .glow-text { text-shadow: 0 0 20px rgba(145, 70, 255, 0.5); }
        .glow-twitch { box-shadow: 0 0 30px rgba(145, 70, 255, 0.3); }

        /* Navigation */
        .nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 50; }
        .nav-container { max-width: 1600px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 80px; }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo img { height: 56px; width: auto; }
        .logo-text { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.25rem; letter-spacing: 0.1em; }
        .logo-text .venom { color: var(--twitch); }
        .logo-text .snake { color: var(--tactical-blue); }
        .nav-links { display: flex; align-items: center; gap: 2rem; }
        .nav-link { font-family: 'Chakra Petch', sans-serif; font-size: 0.875rem; letter-spacing: 0.2em; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s; position: relative; }
        .nav-link:hover, .nav-link.active { color: var(--twitch); }
        .nav-link::after { content: ""; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: var(--twitch); transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .discord-btn { background-color: #5865F2; color: white; padding: 0.5rem 1rem; font-family: 'Chakra Petch', sans-serif; font-size: 0.875rem; letter-spacing: 0.1em; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: background-color 0.3s; }
        .discord-btn:hover { background-color: #4752c4; }

        /* Mobile Menu */
        .mobile-menu-btn { display: none; background: none; border: none; color: white; cursor: pointer; }
        .mobile-nav { display: none; padding: 1rem 0; border-top: 1px solid var(--border); }
        .mobile-nav.open { display: block; }
        .mobile-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0.5rem; font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.1em; color: var(--text-secondary); text-decoration: none; }
        .mobile-nav a.active { color: var(--twitch); }

        /* Page Container */
        .page { display: none; min-height: 100vh; padding-top: 96px; padding-bottom: 3rem; }
        .page.active { display: block; }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 1rem; }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 2.5rem; text-transform: uppercase; letter-spacing: -0.025em; }
        .page-header .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-secondary); margin-top: 0.5rem; }

        /* Stream & Chat Grid */
        .stream-chat-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .stream-container, .chat-container { background-color: var(--surface); border: 1px solid var(--border); }
        .stream-container { position: relative; padding-top: 56.25%; overflow: hidden; }
        .stream-container iframe, .stream-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        .chat-container { height: 600px; }

        /* Schedule / Next Stream */
        .schedule-section { margin-top: 2rem; }
        .schedule-section h2 { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 1rem; }
        .schedule-grid { display: flex; flex-wrap: wrap; gap: 1rem; }
        .schedule-card { background-color: var(--surface); border: 1px solid var(--border); padding: 1rem; flex: 1; min-width: 150px; text-align: center; }
        .schedule-card h3 { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; }
        .schedule-card p { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: var(--text-secondary); }
        .next-stream { margin-top: 1.5rem; text-align: center; font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.25rem; }
        .countdown { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; color: var(--twitch); margin-top: 0.5rem; }

        /* Responsive */
        @media (max-width: 1024px) { .stream-chat-grid { grid-template-columns: 1fr; } .chat-container { height: 400px; } }
        @media (max-width: 768px) { .nav-links { display: none; } .mobile-menu-btn { display: block; } .page-header h1 { font-size: 2rem; } }

    </style>
</head>
<body>
<script>
    const TWITCH_PARENT = window.location.hostname;
    const TWITCH_CHANNEL = "VenomSnake_Twitch";
    const DISCORD_LINK = "https://discord.gg/SFzk4YxgRv";

    // Mobile Menu Toggle
    function toggleMobileMenu() {
        document.getElementById('mobileNav').classList.toggle('open');
    }

    // Page Switch
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelector('#page-' + page).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.querySelector('.nav-link[data-page="' + page + '"]').classList.add('active');
    }

    // Countdown Timer
    const nextStreamDate = new Date(); // Beispiel: setze auf nächsten Stream
    nextStreamDate.setHours(13,30,0,0); // 13:30 Uhr
    const daysOfWeek = [ "Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag" ];
    
    function updateCountdown() {
        const now = new Date();
        const diff = nextStreamDate - now;
        const countdownEl = document.getElementById('countdown');
        const nextStreamEl = document.getElementById('nextStream');

        if(diff <= 0) {
            countdownEl.textContent = "JETZT LIVE!";
        } else {
            const h = Math.floor(diff / 1000 / 60 / 60);
            const m = Math.floor(diff / 1000 / 60 % 60);
            const s = Math.floor(diff / 1000 % 60);
            countdownEl.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            nextStreamEl.textContent = "Nächster Stream: " + daysOfWeek[nextStreamDate.getDay()] + " 13:30 Uhr";
        }
    }

    setInterval(updateCountdown, 1000);
    window.onload = updateCountdown;
</script>

<!-- Navigation -->
<nav class="nav glass">
    <div class="nav-container">
        <a href="#" class="logo" onclick="showPage('stream'); return false;">
            <img src="https://customer-assets.emergentagent.com/job_e904fb4f-623b-4db4-a233-abfe9217b422/artifacts/5y81atfn_DogVenomsnake.png" alt="VenomSnake Logo">
            <span class="logo-text"><span class="venom">VENOM</span><span class="snake">SNAKE</span></span>
        </a>

        <div class="nav-links">
            <a href="#" class="nav-link active" data-page="stream" onclick="showPage('stream'); return false;">
                <i data-lucide="tv" style="width: 16px; height: 16px;"></i> STREAM
            </a>
            <a href="#" class="nav-link" data-page="about" onclick="showPage('about'); return false;">
                <i data-lucide="user" style="width: 16px; height: 16px;"></i> ÜBER MICH
            </a>
            <a href="https://discord.gg/SFzk4YxgRv" target="_blank" class="discord-btn cut-corner-sm">DISCORD</a>
        </div>

        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
        </button>
    </div>

    <div class="mobile-nav" id="mobileNav">
        <a href="#" class="active" data-page="stream" onclick="showPage('stream'); toggleMobileMenu(); return false;">
            <i data-lucide="tv" style="width: 18px; height: 18px;"></i> STREAM
        </a>
        <a href="#" data-page="about" onclick="showPage('about'); toggleMobileMenu(); return false;">
            <i data-lucide="user" style="width: 18px; height: 18px;"></i> ÜBER MICH
        </a>
        <a href="https://discord.gg/SFzk4YxgRv" target="_blank" style="color: #5865F2;">DISCORD</a>
    </div>
</nav>

<!-- Stream Page -->
<main id="page-stream" class="page active grid-bg">
    <div class="container">
        <div class="page-header">
            <h1><span class="glow-text" style="color: var(--twitch);">LIVE</span> <span style="color: var(--tactical-blue);">STREAM</span></h1>
            <p class="subtitle">MISSION CONTROL // TACTICAL ENTERTAINMENT</p>
        </div>

        <div class="stream-chat-grid">
            <div class="stream-container">
                <iframe src="https://player.twitch.tv/?channel=VenomSnake_Twitch&parent=localhost" allowfullscreen></iframe>

        <div class="schedule-section">

                <div class="schedule-card"><h3>Montag</h3><p>13:30 Uhr</p></div>

            <div class="next-stream" id="nextStream">Nächster Stream: </div>
            <div class="countdown" id="countdown">--:--:--</div>

</main>

</body>
</html>
