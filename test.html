<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenomSnake_Twitch - Taktisches Operationszentrum</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --mgs-green: #00ff41;
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
            --live-red: #ff0000;
            --tactical-blue: #52b6ca;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            color: var(--text-primary);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container {
            max-width: 1600px; margin: 0 auto; height: 100%; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }
        .nav-links { display: flex; gap: 0.8rem; align-items: center; }
        .nav-link {
            color: var(--mgs-green); text-decoration: none; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px;
            transition: 0.2s; border: 1px solid transparent;
        }
        .nav-link:hover, .nav-link.active { background: var(--mgs-green-dim); border: 1px solid var(--mgs-green); color: #fff; }
        
        .container { max-width: 1400px; margin: 100px auto 20px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .mgs-header {
            border: 2px solid var(--mgs-green); padding: 1.5rem; background: rgba(0, 59, 0, 0.1); margin-bottom: 2rem;
            position: relative;
        }
        .mgs-header::before {
            content: "SYSTEM_ID: 140.85"; position: absolute; top: -12px; left: 20px;
            background: var(--mgs-bg); padding: 0 10px; font-size: 0.7rem; color: var(--mgs-green);
        }

        /* Follower Goal Styles */
        #goal-section { margin-top: 15px; background: rgba(26, 46, 26, 0.5); border: 1px solid var(--mgs-border); padding: 10px; display: none; }
        .goal-bar-bg { background: #000; height: 12px; border: 1px solid var(--mgs-green-dim); margin-top: 5px; position: relative; }
        .goal-bar-fill { background: var(--mgs-green); height: 100%; width: 0%; box-shadow: 0 0 10px var(--mgs-green); transition: width 1.5s ease-in-out; }

        .stream-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 1024px) { .stream-grid { grid-template-columns: 3fr 1fr; } }
        .frame { border: 1px solid var(--mgs-green-dim); background: #000; padding: 2px; }
        .twitch-embed { position: relative; padding-bottom: 56.25%; height: 0; }
        .twitch-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.7rem; }
        .live-pulse { color: var(--live-red); animation: pulse 1.5s infinite; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-container">
        <a href="#" class="logo" onclick="showPage('stream')">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span style="font-family:'Chakra Petch'; font-weight:bold;">VENOM_SNAKE_OPS</span>
        </a>
        <div class="nav-links">
            <a href="#" class="nav-link active" id="btn-stream" onclick="showPage('stream')">[ EINSATZ ]</a>
            <a href="#" class="nav-link" id="btn-about" onclick="showPage('about')">[ PERSONALAKTE ]</a>
            <a href="https://discord.gg/SFzk4YxgRv" target="_blank" class="nav-link">DISCORD</a>
        </div>
    </div>
</nav>

<main class="container">
    <section id="page-stream" class="page active">
        <div class="mgs-header">
            <div id="countdown-display" style="font-size: 1.5rem; color: var(--mgs-green); font-weight: bold;">INITIALISIERE MISSIONS-DATEN...</div>
            <div style="font-family: 'JetBrains Mono'; font-size: 0.85rem; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,255,65,0.1);">
                <div><span style="color: var(--mgs-green);">AKTUELLER_EINSATZ: </span><span id="twitch-title">VERBINDE...</span></div>
                <div><span style="color: var(--tactical-blue);">MISSIONS-ZIEL: </span><span id="twitch-game">BEREITSCHAFT</span></div>
                <div><span style="color: var(--mgs-green);"><i data-lucide="users" style="width:14px;"></i> EINHEITEN_VOR_ORT: </span><span id="twitch-viewers">0</span></div>
            </div>

            <div id="goal-section">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; color: var(--mgs-green);">
                    <span>REKRUTIERUNGS-ZIEL: <span id="follower-count">0</span> / <span id="follower-goal">...</span></span>
                    <span id="goal-percent">0%</span>
                </div>
                <div class="goal-bar-bg"><div id="goal-bar" class="goal-bar-fill"></div></div>
            </div>
        </div>

        <div class="stream-grid">
            <div class="frame"><div class="twitch-embed" id="player"></div></div>
            <div class="frame"><div id="chat" style="height: 600px;"></div></div>
        </div>
    </section>

    <section id="page-about" class="page">
        <div class="mgs-header">
            <h1>PERSONALAKTE: VENOMSNAKE</h1>
            <p>Alter: <span id="age-val">..</span></p>
        </div>
    </section>
</main>

<script>
    // DEINE AKTUELLEN ZUGANGSDATEN
    const CLIENT_ID = '8hxk605f3s73ayay6puh6qqonpie7w';
    const ACCESS_TOKEN = 'xpq1x3m1bta579xsa2fvttudtej519'; 
    const CHANNEL_NAME = 'VenomSnake_Twitch';
    const BIRTH_DATE = "1994-06-08";

    async function updateTwitchData() {
        try {
            const headers = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${ACCESS_TOKEN}` };
            
            // 1. User ID holen
            const userResp = await fetch(`https://api.twitch.tv/helix/users?login=${CHANNEL_NAME}`, { headers }).then(r => r.json());
            const bId = userResp.data[0].id;

            // 2. Goal Abruf (300, 400, etc.)
            const goalData = await fetch(`https://api.twitch.tv/helix/goals?broadcaster_id=${bId}`, { headers }).then(r => r.json());
            if(goalData.data && goalData.data.length > 0) {
                const g = goalData.data[0];
                document.getElementById('goal-section').style.display = 'block';
                document.getElementById('follower-count').textContent = g.current_amount;
                document.getElementById('follower-goal').textContent = g.target_amount;
                const prc = Math.min(Math.round((g.current_amount / g.target_amount) * 100), 100);
                document.getElementById('goal-bar').style.width = prc + "%";
                document.getElementById('goal-percent').textContent = prc + "%";
            }

            // 3. Stream & Kanal Info
            const stream = await fetch(`https://api.twitch.tv/helix/streams?user_id=${bId}`, { headers }).then(r => r.json());
            document.getElementById('twitch-viewers').textContent = stream.data.length > 0 ? stream.data[0].viewer_count : "0";
            
            const chan = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${bId}`, { headers }).then(r => r.json());
            document.getElementById('twitch-title').textContent = chan.data[0].title.toUpperCase();
            document.getElementById('twitch-game').textContent = chan.data[0].game_name.toUpperCase();

        } catch (e) { console.error("API Fehler:", e); }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const domain = window.location.hostname || "localhost";
        document.getElementById('player').innerHTML = `<iframe src="https://player.twitch.tv/?channel=${CHANNEL_NAME}&parent=${domain}" height="100%" width="100%" allowfullscreen="true"></iframe>`;
        document.getElementById('chat').innerHTML = `<iframe src="https://www.twitch.tv/embed/${CHANNEL_NAME}/chat?parent=${domain}&darkpopout" height="100%" width="100%"></iframe>`;
        
        lucide.createIcons();
        updateTwitchData();
        setInterval(updateTwitchData, 60000); // Alle 60 Sekunden live aktualisieren
    });
</script>
</body>
</html>
