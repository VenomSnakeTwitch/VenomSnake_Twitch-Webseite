<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CODEC // VenomSnake_Twitch</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-controls { display: flex; gap: 5px; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; font-size: 0.9rem; }
        .logo img { height: 35px; filter: drop-shadow(0 0 5px var(--mgs-green)); }

        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 15px; text-align: center; }

        .player-box {
            background: rgba(10, 15, 10, 0.85); border: 2px solid var(--mgs-green); padding: 1.5rem;
            position: relative; box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1); width: 100%;
            backdrop-filter: blur(5px);
        }

        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 3px; color: var(--mgs-green); margin-bottom: 5px; font-size: 1.5rem; }

        .suno-notice {
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--mgs-green); padding: 10px;
            margin-bottom: 20px; font-size: 0.7rem; color: var(--mgs-green); text-transform: uppercase;
        }

        #currentSong { color: #fff; font-size: 0.8rem; margin-bottom: 20px; background: var(--mgs-green-dim); padding: 12px; border: 1px dashed var(--mgs-green); min-height: 45px; display: flex; align-items: center; justify-content: center; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 20px; }

        select, button, .download-btn, .home-btn {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 12px 5px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer;
            font-size: 0.7rem; transition: 0.2s; text-decoration: none; text-align: center;
        }
        button:hover, .home-btn:hover { background: var(--mgs-green); color: #000; }

        .active-mode { background: var(--mgs-green) !important; color: #000 !important; }

        .slider-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; background: rgba(0,255,65,0.05); padding: 10px; border: 1px solid var(--mgs-border); }
        .slider-label { font-size: 0.65rem; color: var(--mgs-green); min-width: 35px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--mgs-green); height: 15px; }

        #visualizerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 1px solid var(--mgs-green); width: 95vw; height: 50vh; background: transparent; }

        .vis-player-ui {
            margin-top: 15px; padding: 10px; border: 1px solid var(--mgs-green);
            background: rgba(0, 255, 65, 0.05); display: flex; flex-direction: column; gap: 10px; width: 95%;
        }
        .vis-row { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }

        footer { text-align: center; padding: 30px; color: var(--mgs-green-dim); font-size: 0.6rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span>SNAKE_AUDIO</span>
        </a>
        <div class="nav-controls">
            <a href="index.html" class="home-btn">[ HOME ]</a>
            <button onclick="toggleFullscreen()">[ ⛶ ]</button>
        </div>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <h1>CODEC INTERFACE</h1>
        <div class="suno-notice">[ STATUS: CONNECTION READY ]</div>

        <h2 id="currentSong">BITTE PLAY DRÜCKEN</h2>
        <audio id="audioPlayer" preload="auto" playsinline></audio>

        <div class="control-grid">
            <select id="songSelect" onchange="selectSong(this.value)">
                <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
                <option value="1">Ghost Town by VenomSnake_Twitch</option>
                <option value="2">Wreckfest</option>
                <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
                <option value="4">Paradies City</option>
                <option value="5">Parasitäres Bewustsein</option>
                <option value="6">Still Alive (Voiced)</option>
                <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
                <option value="8">Bye Bye Beautiful</option>
                <option value="9">Kettenreaktion (Cover)</option>
                <option value="10">Straße der Verdammnis</option>
                <option value="11">Syphon Filter Synth Mix</option>
                <option value="12">VenomSnake Mode Intro song</option>
                <option value="13">Hell March [Retaliation Cover]</option>
                <option value="14">Dance hall Dance(Cover)</option>
                <option value="15">Resident Evil 5 Desperate Escape Main Theme Music(Remix)</option>
                <option value="16">Bleed out My Frend</option>
                <option value="17">Revange</option>
                <option value="18">Revange 2</option>
                <option value="19">Survival Of Death</option>
                <option value="20">Pile of Total Wreck</option>
                <option value="21">Dessert Storm Ahead</option>
                <option value="22">Industrial Breakdown</option>
                <option value="23">Mental Breakdown</option>
                <option value="24">Metal Gear 2 Solid Snake Chasing the Green Beret Remix</option>
                <option value="25">Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026</option>
                <option value="26">Metal Gear 2 Solid Snake Level1 Warning Remix</option>
                <option value="27">Metal Gear 2 Solid Snake Level3 Warning Remix</option>
                <option value="28">Metal Gear 2 Solid Snake Reprieve of The Doctor Remix</option>
                <option value="29">Operation Stealth Destruction</option>
                <option value="30">Takin' On The Shagohod Remake</option>
                <option value="31">Metal Gear 2 Solid Snake Freqency 140.85</option>
                <option value="32">Ghostbusters 2 - Savin The Day Remix</option>
            </select>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
            <a id="downloadBtn" href="#" download class="download-btn">DOWNLOAD</a>
        </div>

        <div class="slider-row">
            <span class="slider-label" id="timeLabel">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span class="slider-label" id="durationLabel">0:00</span>
        </div>

        <div class="slider-row">
            <span class="slider-label">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-label" id="volumeLabel">50%</span>
        </div>

        <div class="control-grid">
            <button id="radioModeBtn" onclick="toggleRadioMode()">📻 RADIO: AUS</button>
            <button id="loopModeBtn" onclick="toggleLoopMode()">🔂 LOOP: AUS</button>
            <button onclick="prevSong()">⏮</button>
            <button id="playPauseBtn" onclick="togglePlay()" style="font-weight:bold; border-width:2px;">▶ PLAY</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>
</main>

<div id="visualizerOverlay">
    <canvas id="visualizerCanvas"></canvas>
    <div class="vis-player-ui">
        <div class="vis-row">
            <button onclick="prevSong()">⏮</button>
            <button id="visPlayPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="nextSong()">⏭</button>
            <button onclick="closeVisualizer()" style="color:#ff4141; border-color:#ff4141;">EXIT</button>
        </div>
    </div>
</div>

<script>
const songs = ["Snake Eater VenomSnake_Twitch Mix.mp3","Ghost Town by VenomSnake_Twitch.mp3","Wreckfest.mp3","In The Air Tonight(VenomSnake_Twitch).mp3","Paradies City.mp3","Parasitäres Bewustsein.mp3","Still Alive (Voiced).mp3","Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3","ByeByeBeautiful.mp3","Kettenreaktion (Cover).mp3","Strasse der Verdammnis.mp3","Syphon Filter Synth Mix.mp3","VenomSnake Mode Intro song.mp3","Hell March [Retaliation Cover].mp3","Dance hall Dance(Cover).mp3","Resident Evil 5 Desperate Escape Main Theme Music(Remix).mp3","Bleed out My Frend.mp3","Revange.mp3","Revange 2.mp3","Survival Of Death.mp3","Pile of Total Wreck.mp3","Dessert Storm Ahead.mp3","Industrial Breakdown.mp3","Mental Breakdown.mp3","Metal Gear 2 Solid Snake Chasing the Green Beret Remix.mp3","Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026.mp3","Metal Gear 2 Solid Snake Level1 Warning Remix.mp3","Metal Gear 2 Solid Snake Level3 Warning Remix.mp3","Metal Gear 2 Solid Snake Reprieve of The Doctor Remix.mp3","Operation Stealth Destruction.mp3","Takin' On The Shagohod Remake.mp3","Metal Gear 2 Solid Snake Freqency 140.85.mp3","Ghostbusters 2 - Savin The Day Remix.mp3"];

const BASE_URL = "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/";
let currentIndex = 0;
let audioCtx = null;
let analyser, dataArray, source;
let isRadioMode = false;
let isLoopMode = false;
let isInitialized = false;

const audio = document.getElementById("audioPlayer");
const playBtn = document.getElementById("playPauseBtn");
const visPlayBtn = document.getElementById("visPlayPauseBtn");

function initAudioContext() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    } catch(e) { console.log("AudioContext blocked"); }
}

function loadSong(index) {
    currentIndex = parseInt(index);
    const songUrl = BASE_URL + encodeURIComponent(songs[currentIndex]);
    audio.src = songUrl;
    audio.load();
    
    document.getElementById("songSelect").value = currentIndex;
    document.getElementById("downloadBtn").href = songUrl;
    const title = document.getElementById("songSelect").options[currentIndex].text.toUpperCase();
    document.getElementById("currentSong").textContent = "▶ " + title;
}

function togglePlay() {
    if (!isInitialized) {
        loadSong(currentIndex);
        isInitialized = true;
    }
    
    initAudioContext();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    if (audio.paused) {
        audio.play().then(() => {
            updateButtons("⏸ PAUSE");
        }).catch(e => console.log("Playback failed", e));
    } else {
        audio.pause();
        updateButtons("▶ PLAY");
    }
}

function updateButtons(txt) {
    playBtn.textContent = txt;
    if(visPlayBtn) visPlayBtn.textContent = txt;
}

function selectSong(val) {
    isInitialized = true;
    loadSong(val);
    togglePlay();
}

function nextSong() { selectSong((currentIndex + 1) % songs.length); }
function prevSong() { selectSong((currentIndex - 1 + songs.length) % songs.length); }

audio.onended = () => {
    if (isLoopMode) { audio.play(); } 
    else if (isRadioMode) { selectSong(Math.floor(Math.random() * songs.length)); } 
    else { nextSong(); }
};

audio.ontimeupdate = () => {
    if(!isNaN(audio.duration)) {
        const prog = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progress").value = prog;
        document.getElementById("timeLabel").textContent = formatTime(audio.currentTime);
        document.getElementById("durationLabel").textContent = formatTime(audio.duration);
    }
};

function formatTime(s) {
    let m = Math.floor(s/60), sec = Math.floor(s%60).toString().padStart(2, '0');
    return m + ":" + sec;
}

function openVisualizer() {
    initAudioContext();
    document.getElementById("visualizerOverlay").classList.add("active");
    renderFrame();
}

function closeVisualizer() {
    document.getElementById("visualizerOverlay").classList.remove("active");
}

function renderFrame() {
    if(!analyser) return;
    requestAnimationFrame(renderFrame);
    analyser.getByteFrequencyData(dataArray);
    const canvas = document.getElementById("visualizerCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff41";
    const barWidth = (canvas.width / dataArray.length);
    for (let i = 0; i < dataArray.length; i++) {
        const h = (dataArray[i] / 255) * canvas.height;
        ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 2, h);
    }
}

function toggleRadioMode() { isRadioMode = !isRadioMode; isLoopMode = false; updateModeUI(); }
function toggleLoopMode() { isLoopMode = !isLoopMode; isRadioMode = false; updateModeUI(); }
function updateModeUI() {
    document.getElementById("radioModeBtn").classList.toggle("active-mode", isRadioMode);
    document.getElementById("loopModeBtn").classList.toggle("active-mode", isLoopMode);
}

// Volume & Seek
document.getElementById("volumeSlider").oninput = (e) => { audio.volume = e.target.value; document.getElementById("volumeLabel").textContent = Math.round(e.target.value*100)+"%"; };
document.getElementById("progress").oninput = (e) => { if(isInitialized) audio.currentTime = (e.target.value/100) * audio.duration; };

function toggleFullscreen() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

// Initialisierung beim ersten Klick
window.onload = () => {
    // Wir laden hier noch nichts aktiv, um Mobile-Sperren zu umgehen
    document.getElementById("downloadBtn").href = BASE_URL + encodeURIComponent(songs[0]);
};
</script>
</body>
</html>
