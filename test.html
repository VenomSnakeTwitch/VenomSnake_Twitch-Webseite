<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC // VenomSnake_Twitch</title>

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        /* Vorhandene Styles beibehalten */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-primary);
        }

        .nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; }

        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }
        .player-box { background: rgba(10, 15, 10, 0.85); border: 2px solid var(--mgs-green); padding: 2rem; backdrop-filter: blur(5px); }

        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 5px; color: var(--mgs-green); margin-bottom: 5px; }
        .suno-notice { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--mgs-green); padding: 12px; margin-bottom: 20px; font-size: 0.8rem; color: var(--mgs-green); text-transform: uppercase; }

        /* Song-Anzeige als Klick-Fläche */
        #currentSong { 
            color: #fff; font-size: 0.9rem; margin-bottom: 20px; background: var(--mgs-green-dim); 
            padding: 15px; border: 1px dashed var(--mgs-green); min-height: 45px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        #currentSong:hover { background: var(--mgs-green); color: #000; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button, .download-btn, .home-btn {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 10px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer;
            font-size: 0.75rem; transition: 0.2s; text-decoration: none; text-align: center;
        }
        button:hover, .download-btn:hover { background: var(--mgs-green); color: #000; }

        /* --- NEUES OVERLAY STYLE --- */
        #songOverlay {
            position: fixed; inset: 0; background: rgba(5, 8, 5, 0.98); z-index: 3000;
            display: none; flex-direction: column; padding: 40px;
        }
        #songOverlay.active { display: flex; }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mgs-green); padding-bottom: 20px; margin-bottom: 20px; }
        
        .song-list-container {
            overflow-y: auto; flex-grow: 1; padding-right: 10px;
        }
        .song-list-container::-webkit-scrollbar { width: 8px; }
        .song-list-container::-webkit-scrollbar-thumb { background: var(--mgs-green); }

        .song-item {
            padding: 15px; border: 1px solid var(--mgs-green-dim); margin-bottom: 8px;
            text-align: left; transition: 0.2s; cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }
        .song-item:hover { background: var(--mgs-green); color: #000; padding-left: 25px; }
        .song-item.playing { border-color: var(--mgs-green); background: rgba(0, 255, 65, 0.1); color: var(--mgs-green); }

        .search-input {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 10px; font-family: 'JetBrains Mono'; width: 300px;
        }
        /* --- ENDE OVERLAY STYLE --- */

        .slider-row { display: flex; align-items: center; gap: 15px; margin: 10px 0; background: rgba(0,255,65,0.05); padding: 10px; border: 1px solid var(--mgs-border); }
        .slider-label { font-size: 0.7rem; color: var(--mgs-green); min-width: 40px; font-weight: bold; }
        input[type="range"] { flex-grow: 1; accent-color: var(--mgs-green); }

        #visualizerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 2px solid var(--mgs-green); max-width: 95vw; max-height: 60vh; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="./DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_AUDIO</span>
        </a>
        <div class="nav-controls">
            <a href="index.html" class="home-btn" style="padding: 5px 15px;">[ HOME ]</a>
            <button onclick="toggleFullscreen()" style="padding: 5px 15px;">[ VOLLBILD ]</button>
        </div>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <h1>CODEC INTERFACE</h1>
        <div class="suno-notice">
            [ STATUS: TRANSMISSION ACTIVE ]<br>
            KLICKE AUF DEN SONG-TITEL, UM DIE PLAYLIST ZU ÖFFNEN.
        </div>

        <div id="currentSong" onclick="toggleSongOverlay()">INITIALISIERE...</div>
        
        <audio id="audioPlayer" crossOrigin="anonymous"></audio>

        <div class="control-grid">
            <button onclick="toggleSongOverlay()">[ PLAYLIST ]</button>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
            <a id="downloadBtn" href="#" download class="download-btn">DOWNLOAD</a>
        </div>

        <div class="slider-row">
            <span class="slider-label" id="timeLabel">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span class="slider-label" id="durationLabel">0:00</span>
        </div>

        <div class="slider-row">
            <span class="slider-label">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-label" id="volumeLabel">50%</span>
        </div>

        <div class="control-grid">
            <button id="radioModeBtn" onclick="toggleRadioMode()">📻 RADIO: AUS</button>
            <button id="loopModeBtn" onclick="toggleLoopMode()">🔂 LOOP: AUS</button>
            <button onclick="prevSong()">⏮ ZURÜCK</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="nextSong()">WEITER ⏭</button>
        </div>
    </div>
</main>

<div id="songOverlay">
    <div class="overlay-header">
        <h2 style="font-family:'Chakra Petch'; color:var(--mgs-green);">SELECT FREQUENCY (SONGS)</h2>
        <div>
            <input type="text" id="songSearch" class="search-input" placeholder="SUCHEN..." oninput="filterSongs()">
            <button onclick="toggleSongOverlay()" style="color:#ff4141; border-color:#ff4141; margin-left:10px;">X SCHLIESSEN</button>
        </div>
    </div>
    <div id="songList" class="song-list-container">
        </div>
</div>

<div id="visualizerOverlay">
    <div style="color:var(--mgs-green); margin-bottom:10px; font-family:'Chakra Petch';">VENOM_VISUALIZER_V5.0</div>
    <canvas id="visualizerCanvas"></canvas>
    <div class="vis-player-ui" style="width: 90%; max-width: 800px; margin-top:20px;">
        <div class="vis-row">
            <button onclick="toggleSongOverlay()">SONG WÄHLEN</button>
            <button id="visPlayPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="closeVisualizer()" style="color:#ff4141;">EXIT</button>
        </div>
    </div>
</div>

<script>
const songTitles = [
    "Snake Eater VenomSnake_Twitch Mix", "Ghost Town by VenomSnake_Twitch", "Wreckfest", 
    "In The Air Tonight(VenomSnake_Twitch)", "Paradies City", "Parasitäres Bewustsein", 
    "Still Alive (Voiced)", "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix", "Bye Bye Beautiful", 
    "Kettenreaktion (Cover)", "Straße der Verdammnis", "Syphon Filter Synth Mix", 
    "VenomSnake Mode Intro song", "Hell March [Retaliation Cover]", "Dance hall Dance(Cover)", 
    "Resident Evil 5 Desperate Escape Main Theme Music(Remix)", "Bleed out My Frend", "Revange", 
    "Revange 2", "Survival Of Death", "Pile of Total Wreck", "Dessert Storm Ahead", 
    "Industrial Breakdown", "Mental Breakdown", "Metal Gear 2 Solid Snake Chasing the Green Beret Remix", 
    "Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026", "Metal Gear 2 Solid Snake Level1 Warning Remix", 
    "Metal Gear 2 Solid Snake Level3 Warning Remix", "Metal Gear 2 Solid Snake Reprieve of The Doctor Remix", 
    "Operation Stealth Destruction", "Takin' On The Shagohod Remake", "Metal Gear 2 Solid Snake Freqency 140.85", 
    "Ghostbusters 2 - Savin The Day Remix", "Resident Evil Requiem Titel Song Through the Darkness Female Version", 
    "Dragonball Z Du Wirst Unbesiegbar Sein", "Dragonball Z Cha La Head Cha La", "Wir Kiffen Parodie", 
    "LA-LE-LU", "Feel the Storm Coming", "Inu Yasha Was ist Zeit Lange Vesion", 
    "Thunder in Paradiese Cover", "The Dead Inside Me", "Gesang von Asgard (Remix)"
];

const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3", "Ghost Town by VenomSnake_Twitch.mp3", "Wreckfest.mp3", 
    "In The Air Tonight(VenomSnake_Twitch).mp3", "Paradies City.mp3", "Parasitäres Bewustsein.mp3", 
    "Still Alive (Voiced).mp3", "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3", "ByeByeBeautiful.mp3", 
    "Kettenreaktion (Cover).mp3", "Strasse der Verdammnis.mp3", "Syphon Filter Synth Mix.mp3", 
    "VenomSnake Mode Intro song.mp3", "Hell March [Retaliation Cover].mp3", "Dance hall Dance(Cover).mp3", 
    "Resident Evil 5 Desperate Escape Main Theme Music(Remix).mp3", "Bleed out My Frend.mp3", "Revange.mp3", 
    "Revange 2.mp3", "Survival Of Death.mp3", "Pile of Total Wreck.mp3", "Dessert Storm Ahead.mp3", 
    "Industrial Breakdown.mp3", "Mental Breakdown.mp3", "Metal Gear 2 Solid Snake Chasing the Green Beret Remix.mp3", 
    "Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026.mp3", "Metal Gear 2 Solid Snake Level1 Warning Remix.mp3", 
    "Metal Gear 2 Solid Snake Level3 Warning Remix.mp3", "Metal Gear 2 Solid Snake Reprieve of The Doctor Remix.mp3", 
    "Operation Stealth Destruction.mp3", "Takin' On The Shagohod Remake.mp3", "Metal Gear 2 Solid Snake Freqency 140.85.mp3", 
    "Ghostbusters 2 - Savin The Day Remix.mp3","Resident Evil Requiem Titel Song Through the Darkness Female Version.mp3",
    "Dragonball Z Du Wirst Unbesiegbar Sein.mp3","Dragonball Z  Cha La Head Cha La.mp3","Wir Kiffen Parodie.mp3","LA-LE-LU.mp3","Feel the Storm Coming.mp3",
    "Inu Yasha Was ist Zeit Lange Vesion.mp3","Thunder in Paradise.mp3", "The Dead Inside Me.mp3","Gesang von Asgard (Remix).mp3"
];

const BASE_URL = "./";
let currentIndex = 0;
let audioCtx, analyser, dataArray, animationId;
let isRadioMode = false;
let isLoopMode = false;

const audio = document.getElementById("audioPlayer");

// Playlist generieren
function buildPlaylist() {
    const list = document.getElementById("songList");
    list.innerHTML = "";
    songTitles.forEach((title, index) => {
        const div = document.createElement("div");
        div.className = "song-item" + (index === currentIndex ? " playing" : "");
        div.textContent = `${(index + 1).toString().padStart(2, '0')} // ${title}`;
        div.onclick = () => { selectSong(index); toggleSongOverlay(); };
        list.appendChild(div);
    });
}

function toggleSongOverlay() {
    const overlay = document.getElementById("songOverlay");
    overlay.classList.toggle("active");
    if(overlay.classList.contains("active")) {
        buildPlaylist();
        document.getElementById("songSearch").focus();
    }
}

function filterSongs() {
    const term = document.getElementById("songSearch").value.toLowerCase();
    const items = document.querySelectorAll(".song-item");
    items.forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(term) ? "block" : "none";
    });
}

function loadSong(index) {
    currentIndex = parseInt(index);
    audio.src = BASE_URL + encodeURIComponent(songs[currentIndex]);
    document.getElementById("downloadBtn").href = audio.src;
    document.getElementById("currentSong").textContent = "▶ " + songTitles[currentIndex].toUpperCase();
}

function selectSong(val) {
    loadSong(val);
    audio.play();
    updatePlayButtons("⏸ PAUSE");
}

function togglePlay() {
    if(!audioCtx) initAudioSystem();
    if (audio.paused) { audio.play(); updatePlayButtons("⏸ PAUSE"); } 
    else { audio.pause(); updatePlayButtons("▶ PLAY"); }
}

function updatePlayButtons(text) {
    document.getElementById("playPauseBtn").textContent = text;
    document.getElementById("visPlayPauseBtn").textContent = text;
}

audio.onended = () => {
    if (isLoopMode) { audio.currentTime = 0; audio.play(); } 
    else if (isRadioMode) {
        let randomIndex = Math.floor(Math.random() * songs.length);
        selectSong(randomIndex);
    } else { nextSong(); }
};

function nextSong() { selectSong((currentIndex + 1) % songs.length); }
function prevSong() { selectSong((currentIndex - 1 + songs.length) % songs.length); }

function initAudioSystem() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
}

// Zeit-Update & Slider (vereinfacht für dieses Beispiel)
audio.ontimeupdate = () => {
    if(!isNaN(audio.duration)) {
        const prog = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progress").value = prog;
        document.getElementById("timeLabel").textContent = formatTime(audio.currentTime);
        document.getElementById("durationLabel").textContent = formatTime(audio.duration);
    }
};

function formatTime(s) { 
    let m = Math.floor(s/60), sec = Math.floor(s%60).toString().padStart(2, '0'); 
    return m + ":" + sec; 
}

function openVisualizer() { document.getElementById("visualizerOverlay").classList.add("active"); }
function closeVisualizer() { document.getElementById("visualizerOverlay").classList.remove("active"); }

window.onload = () => { loadSong(0); audio.volume = 0.5; };
</script>
</body>
</html>
