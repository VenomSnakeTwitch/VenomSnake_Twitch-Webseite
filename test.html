<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC // VenomSnake_Twitch</title>

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
            --mgs-orange: #ff6600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-controls { display: flex; gap: 10px; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }

        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }

        .player-box {
            background: rgba(10, 15, 10, 0.85); border: 2px solid var(--mgs-green); padding: 2rem;
            position: relative; box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1); width: 100%;
            backdrop-filter: blur(5px);
        }

        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 5px; color: var(--mgs-green); margin-bottom: 5px; font-size: 2rem; }

        .suno-notice {
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--mgs-green); padding: 12px;
            margin-bottom: 20px; font-size: 0.8rem; color: var(--mgs-green); text-transform: uppercase;
            line-height: 1.4;
        }

        #currentSong { color: #fff; font-size: 0.9rem; margin-bottom: 20px; background: var(--mgs-green-dim); padding: 12px; border: 1px dashed var(--mgs-green); min-height: 45px; display: flex; align-items: center; justify-content: center; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }

        select, button, .download-btn, .home-btn {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 10px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer;
            font-size: 0.75rem; transition: 0.2s; text-decoration: none; text-align: center;
        }
        button:hover, select:hover, .download-btn:hover, .home-btn:hover { background: var(--mgs-green); color: #000; box-shadow: 0 0 10px var(--mgs-green); }

        .active-mode { background: var(--mgs-green) !important; color: #000 !important; }

        .slider-row { display: flex; align-items: center; gap: 15px; margin: 10px 0; background: rgba(0,255,65,0.05); padding: 10px; border: 1px solid var(--mgs-border); }
        .slider-label { font-size: 0.7rem; color: var(--mgs-green); min-width: 50px; font-weight: bold; }

        input[type="range"] { flex-grow: 1; accent-color: var(--mgs-green); cursor: pointer; height: 6px; background: var(--mgs-green-dim); border: none; }

        .reset-btn { border-color: var(--mgs-orange); color: var(--mgs-orange); padding: 2px 8px; font-size: 0.6rem; }
        .reset-btn:hover { background: var(--mgs-orange); color: #000; }

        #visualizerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 2px solid var(--mgs-green); max-width: 95vw; max-height: 60vh; background: transparent; }

        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.65rem; letter-spacing: 2px; }

        #loadingOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center;
            z-index: 10; color: var(--mgs-green); font-size: 1.2rem;
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="./DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_AUDIO</span>
        </a>
        <div class="nav-controls">
            <button onclick="toggleFullscreen()">[ VOLLBILD ]</button>
        </div>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <div id="loadingOverlay">DATENÜBERTRAGUNG...</div>
        <h1>CODEC INTERFACE</h1>
        <div class="suno-notice">
            [ FREQUENCY: 140.85 ]<br>
            <span style="color:var(--mgs-orange)">PITCH & TEMPO PROCESSING AKTIV</span>
        </div>

        <h2 id="currentSong">BEREIT FÜR ÜBERTRAGUNG</h2>

        <div class="control-grid">
            <select id="songSelect" onchange="selectSong(this.value)">
                <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
                <option value="1">Ghost Town by VenomSnake_Twitch</option>
                <option value="2">Wreckfest</option>
                <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
                <option value="4">Paradies City</option>
                <option value="5">Parasitäres Bewustsein</option>
                <option value="6">Still Alive (Voiced)</option>
                <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
                <option value="8">Bye Bye Beautiful</option>
                <option value="9">Kettenreaktion (Cover)</option>
                <option value="10">Straße der Verdammnis</option>
                <option value="11">Syphon Filter Synth Mix</option>
                <option value="12">VenomSnake Mode Intro song</option>
                <option value="13">Hell March [Retaliation Cover]</option>
                <option value="14">Dance hall Dance(Cover)</option>
                <option value="15">Resident Evil 5 Desperate Escape Main Theme Music(Remix)</option>
                <option value="16">Bleed out My Frend</option>
                <option value="17">Revange</option>
                <option value="18">Revange 2</option>
                <option value="19">Survival Of Death</option>
                <option value="20">Pile of Total Wreck</option>
                <option value="21">Dessert Storm Ahead</option>
                <option value="22">Industrial Breakdown</option>
                <option value="23">Mental Breakdown</option>
                <option value="24">Metal Gear 2 Solid Snake Chasing the Green Beret Remix</option>
                <option value="25">Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026</option>
                <option value="26">Metal Gear 2 Solid Snake Level1 Warning Remix</option>
                <option value="27">Metal Gear 2 Solid Snake Level3 Warning Remix</option>
                <option value="28">Metal Gear 2 Solid Snake Reprieve of The Doctor Remix</option>
                <option value="29">Operation Stealth Destruction</option>
                <option value="30">Takin' On The Shagohod Remake</option>
                <option value="31">Metal Gear 2 Solid Snake Freqency 140.85</option>
                <option value="32">Ghostbusters 2 - Savin The Day Remix</option>
            </select>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
            <a id="downloadBtn" href="#" download class="download-btn">DOWNLOAD</a>
        </div>

        <div class="slider-row">
            <span class="slider-label" id="timeLabel">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0" step="0.1" oninput="seekAudio(this.value)">
            <span class="slider-label" id="durationLabel">0:00</span>
        </div>

        <div class="slider-row">
            <span class="slider-label">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-label" id="volumeLabel">50%</span>
        </div>

        <div class="slider-row">
            <span class="slider-label">PITCH</span>
            <input type="range" id="pitchSlider" min="-12" max="12" step="1" value="0">
            <span class="slider-label" id="pitchLabel">0 st</span>
            <button class="reset-btn" onclick="resetPitch()">RESET</button>
        </div>

        <div class="slider-row">
            <span class="slider-label">SPEED</span>
            <input type="range" id="tempoSlider" min="0.5" max="2.0" step="0.05" value="1.0">
            <span class="slider-label" id="tempoLabel">100%</span>
            <button class="reset-btn" onclick="resetTempo()">RESET</button>
        </div>

        <div class="control-grid">
            <button id="radioModeBtn" onclick="toggleRadioMode()">📻 RADIO: AUS</button>
            <button id="loopModeBtn" onclick="toggleLoopMode()">🔂 LOOP: AUS</button>
            <button onclick="prevSong()">⏮</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>
</main>

<div id="visualizerOverlay">
    <canvas id="visualizerCanvas"></canvas>
    <button onclick="closeVisualizer()" style="margin-top:20px; color:var(--mgs-green); border: 1px solid var(--mgs-green); padding: 10px;">[ CLOSE ]</button>
</div>

<footer>
    <p>EST. 2026 // OPERATOR: VENOMSNAKE_TWITCH</p>
</footer>

<script>
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3", "Ghost Town by VenomSnake_Twitch.mp3", "Wreckfest.mp3", 
    "In The Air Tonight(VenomSnake_Twitch).mp3", "Paradies City.mp3", "Parasitäres Bewustsein.mp3", 
    "Still Alive (Voiced).mp3", "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3", "ByeByeBeautiful.mp3", 
    "Kettenreaktion (Cover).mp3", "Strasse der Verdammnis.mp3", "Syphon Filter Synth Mix.mp3", 
    "VenomSnake Mode Intro song.mp3", "Hell March [Retaliation Cover].mp3", "Dance hall Dance(Cover).mp3", 
    "Resident Evil 5 Desperate Escape Main Theme Music(Remix).mp3", "Bleed out My Frend.mp3", "Revange.mp3", 
    "Revange 2.mp3", "Survival Of Death.mp3", "Pile of Total Wreck.mp3", "Dessert Storm Ahead.mp3", 
    "Industrial Breakdown.mp3", "Mental Breakdown.mp3", "Metal Gear 2 Solid Snake Chasing the Green Beret Remix.mp3", 
    "Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026.mp3", "Metal Gear 2 Solid Snake Level1 Warning Remix.mp3", 
    "Metal Gear 2 Solid Snake Level3 Warning Remix.mp3", "Metal Gear 2 Solid Snake Reprieve of The Doctor Remix.mp3", 
    "Operation Stealth Destruction.mp3", "Takin' On The Shagohod Remake.mp3", "Metal Gear 2 Solid Snake Freqency 140.85.mp3", "Ghostbusters 2 - Savin The Day Remix.mp3"
];

const BASE_URL = "./";
let currentIndex = 0;
let isRadioMode = false;
let isLoopMode = false;
let player, pitchShift, fft, noise, noiseGain;
let isInitialized = false;

// Audio System Initialisieren
async function initAudio() {
    if (isInitialized) return;
    await Tone.start();
    
    // Rauschen (CODEC Static)
    noise = new Tone.Noise("white");
    noiseGain = new Tone.Gain(0).toDestination();
    noise.connect(noiseGain);
    noise.start();

    // Effekte
    pitchShift = new Tone.PitchShift(0).toDestination();
    fft = new Tone.FFT(128);
    pitchShift.connect(fft);
    
    player = new Tone.Player().connect(pitchShift);
    isInitialized = true;
}

// CODEC Static Effekt
function playStatic() {
    if (!noiseGain) return;
    noiseGain.gain.rampTo(0.05, 0.01);
    setTimeout(() => noiseGain.gain.rampTo(0, 0.2), 150);
}

async function loadSong(index) {
    try {
        await initAudio();
        document.getElementById("loadingOverlay").style.display = "flex";
        currentIndex = parseInt(index);
        const url = BASE_URL + encodeURIComponent(songs[currentIndex]);
        
        await player.load(url);
        
        document.getElementById("currentSong").textContent = "▶ " + songs[currentIndex].toUpperCase();
        document.getElementById("durationLabel").textContent = formatTime(player.buffer.duration);
        document.getElementById("loadingOverlay").style.display = "none";
        document.getElementById("downloadBtn").href = url;
        playStatic();
    } catch (e) {
        console.error("Load error", e);
        document.getElementById("currentSong").textContent = "❌ FEHLER BEIM LADEN";
        document.getElementById("loadingOverlay").style.display = "none";
    }
}

async function togglePlay() {
    await initAudio();
    if (player.state === "started") {
        player.stop();
        updatePlayButtons("▶ PLAY");
    } else {
        player.start();
        updatePlayButtons("⏸ PAUSE");
        updateProgress();
    }
}

function updateProgress() {
    if (player && player.state === "started") {
        const elapsed = player.buffer.duration > 0 ? (player.now() - player.started) * player.playbackRate : 0;
        const current = Math.min(elapsed, player.buffer.duration);
        
        document.getElementById("progress").value = (current / player.buffer.duration) * 100;
        document.getElementById("timeLabel").textContent = formatTime(current);
        
        if (current >= player.buffer.duration) {
            if (isLoopMode) player.start(0);
            else if (isRadioMode) selectSong(Math.floor(Math.random() * songs.length));
            else nextSong();
        } else {
            requestAnimationFrame(updateProgress);
        }
    }
}

// Controls
document.getElementById("pitchSlider").oninput = function() {
    pitchShift.pitch = parseInt(this.value);
    document.getElementById("pitchLabel").textContent = (this.value >= 0 ? "+" : "") + this.value + " st";
};
document.getElementById("tempoSlider").oninput = function() {
    player.playbackRate = parseFloat(this.value);
    document.getElementById("tempoLabel").textContent = Math.round(this.value * 100) + "%";
};
document.getElementById("volumeSlider").oninput = function() {
    player.volume.value = Tone.gainToDb(parseFloat(this.value));
    document.getElementById("volumeLabel").textContent = Math.round(this.value * 100) + "%";
};

function seekAudio(val) {
    const time = (val / 100) * player.buffer.duration;
    player.stop();
    player.start(0, time);
}

function resetPitch() { document.getElementById("pitchSlider").value = 0; pitchShift.pitch = 0; document.getElementById("pitchLabel").textContent = "0 st"; }
function resetTempo() { document.getElementById("tempoSlider").value = 1.0; player.playbackRate = 1.0; document.getElementById("tempoLabel").textContent = "100%"; }

async function selectSong(val) { await loadSong(val); togglePlay(); }
function nextSong() { selectSong((currentIndex + 1) % songs.length); }
function prevSong() { selectSong((currentIndex - 1 + songs.length) % songs.length); }

function toggleRadioMode() { isRadioMode = !isRadioMode; isLoopMode = false; updateModeUI(); }
function toggleLoopMode() { isLoopMode = !isLoopMode; isRadioMode = false; updateModeUI(); }
function updateModeUI() {
    document.getElementById("radioModeBtn").classList.toggle("active-mode", isRadioMode);
    document.getElementById("loopModeBtn").classList.toggle("active-mode", isLoopMode);
}

function formatTime(s) {
    let m = Math.floor(s / 60), sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ":" + sec;
}

function updatePlayButtons(t) { document.getElementById("playPauseBtn").textContent = t; }

// Visualizer
function draw() {
    const canvas = document.getElementById("visualizerCanvas");
    const ctx = canvas.getContext("2d");
    const values = fft.getValue();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff41";
    const barWidth = canvas.width / values.length;
    for (let i = 0; i < values.length; i++) {
        const barHeight = (values[i] + 140) * 2;
        ctx.fillRect(i * barWidth, canvas.height - barHeight, barWidth - 1, barHeight);
    }
    animationId = requestAnimationFrame(draw);
}

function openVisualizer() {
    document.getElementById("visualizerOverlay").classList.add("active");
    const cv = document.getElementById("visualizerCanvas");
    cv.width = window.innerWidth * 0.8; cv.height = 400;
    draw();
}
function closeVisualizer() { document.getElementById("visualizerOverlay").classList.remove("active"); cancelAnimationFrame(animationId); }
function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

window.onload = () => { loadSong(0); };
</script>
</body>
</html>
