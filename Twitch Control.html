<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VENOM_SNAKE - Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050805; color: #00ff41; font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .panel {
            border: 2px solid #00ff41; padding: 2rem; width: 500px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        h2 { border-bottom: 2px solid #00ff41; padding-bottom: 10px; font-size: 1.2rem; }
        .input-group { margin: 20px 0; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #008f11; }
        input {
            width: 100%; background: #001a00; border: 1px solid #00ff41;
            color: #fff; padding: 10px; font-family: inherit; outline: none;
        }
        button {
            width: 100%; padding: 10px; background: #00ff41; color: #000;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #fff; }
        #status { margin-top: 15px; font-size: 0.8rem; text-align: center; min-height: 1.2em; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2>[ COMMAND_CENTER_AUTH ]</h2>
    
    <div id="auth-section">
        <p style="font-size: 0.8rem; margin-bottom: 20px;">Autorisierung erforderlich, um Missionsdaten zu überschreiben.</p>
        <button onclick="login()">LOGIN BEI TWITCH</button>
    </div>

    <div id="control-section" class="hidden">
        <div class="input-group">
            <label>NEUER_MISSIONS_TITEL</label>
            <input type="text" id="stream-title" placeholder="z.B. MGS3 - Tactical Espionage Action">
        </div>
        <button onclick="updateTwitch()">DATEN SENDEN</button>
        <p id="status"></p>
    </div>
</div>

<script>
    const CLIENT_ID = '8hxk605f3s73ayay6puh6qqonpie7w'; // Deine Client ID
    const REDIRECT_URI = window.location.href.split('#')[0]; // Diese Datei selbst
    const SCOPES = 'channel:manage:broadcast';

    // 1. Check if we have a token in the URL
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    let accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('control-section').classList.remove('active');
        document.getElementById('control-section').classList.remove('hidden');
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    function login() {
        const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPES}`;
        window.location.href = authUrl;
    }

    async function updateTwitch() {
        const title = document.getElementById('stream-title').value;
        const statusEl = document.getElementById('status');
        
        statusEl.textContent = "SENDE DATEN AN FOXHOUND...";

        try {
            // Erst User ID holen
            const userResp = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
            });
            const userData = await userResp.json();
            const broadcasterId = userData.data[0].id;

            // Titel updaten
            const response = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${broadcasterId}`, {
                method: 'PATCH',
                headers: {
                    'Client-ID': CLIENT_ID,
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title: title })
            });

            if (response.ok) {
                statusEl.style.color = "#00ff41";
                statusEl.textContent = "UPDATE ERFOLGREICH: MISSION_LOG AKTUALISIERT.";
            } else {
                throw new Error("Fehler beim Senden");
            }
        } catch (e) {
            statusEl.style.color = "#ff0000";
            statusEl.textContent = "FEHLER: VERBINDUNG UNTERBROCHEN.";
        }
    }
</script>

</body>
</html>
