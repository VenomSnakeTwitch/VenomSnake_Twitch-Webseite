<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VENOM_SNAKE - Mission Control (AUTO-SUCHE)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --mgs-green: #00ff41; --mgs-bg: #050805; --mgs-red: #ff0000; }
        
        body {
            background: var(--mgs-bg); color: var(--mgs-green); font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #lock-overlay {
            position: fixed; inset: 0; background: var(--mgs-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }

        .lock-box { border: 2px solid var(--mgs-green); padding: 3rem; background: rgba(0, 20, 0, 0.9); text-align: center; }

        .panel {
            border: 2px solid var(--mgs-green); padding: 2rem; width: 90%; max-width: 500px;
            background: rgba(10, 15, 10, 0.95); box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            display: none;
        }

        h2 { border-bottom: 2px solid var(--mgs-green); padding-bottom: 10px; font-size: 1.1rem; text-transform: uppercase; }
        .input-group { margin: 20px 0; position: relative; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #008f11; font-weight: bold; }
        
        input {
            width: 100%; background: #001a00; border: 1px solid var(--mgs-green);
            color: #fff; padding: 12px; font-family: inherit; outline: none; box-sizing: border-box;
        }

        /* Suchvorschläge Liste */
        #game-suggestions {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #0a0f0a; border: 1px solid var(--mgs-green);
            z-index: 100; max-height: 200px; overflow-y: auto; display: none;
        }
        .suggestion-item {
            padding: 10px; cursor: pointer; border-bottom: 1px solid #1a2e1a; font-size: 0.8rem;
        }
        .suggestion-item:hover { background: var(--mgs-green); color: #000; }

        button {
            width: 100%; padding: 12px; background: var(--mgs-green); color: #000;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #fff; }
        #status, #lock-status { margin-top: 20px; font-size: 0.75rem; text-align: center; min-height: 1em; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="lock-overlay">
    <div class="lock-box">
        <h2 style="color: var(--mgs-red); margin-bottom: 20px;">[ ZUGRIFF_GESPERRT ]</h2>
        <input type="password" id="pass-input" placeholder="CODE EINGEBEN" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" style="margin-top:10px;">VERIFIZIEREN</button>
        <div id="lock-status"></div>
    </div>
</div>

<div class="panel" id="main-panel">
    <h2>[ COMMAND_CENTER ]</h2>
    <div id="auth-section">
        <button onclick="login()">1. LOGIN BEI TWITCH</button>
    </div>

    <div id="control-section" class="hidden">
        <div class="input-group">
            <label>STREAM_TITEL</label>
            <input type="text" id="stream-title" placeholder="Titel eingeben...">
        </div>
        
        <div class="input-group">
            <label>MISSIONS_KATEGORIE (SUCHE...)</label>
            <input type="text" id="stream-game" placeholder="Tippe Spielnamen..." autocomplete="off">
            <div id="game-suggestions"></div>
        </div>

        <button onclick="updateTwitch()">UPDATE SENDEN</button>
        <div id="status">BEREIT FÜR ÜBERTRAGUNG.</div>
    </div>
</div>

<script>
    const CORRECT_PASS = "VenomSnake94";
    const CLIENT_ID = '67qdowganroqrazq3yt4g1bwj9bp8r';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'channel:manage:broadcast';

    let selectedGameId = null;
    let accessToken = null;

    function checkPass() {
        if(document.getElementById('pass-input').value === CORRECT_PASS) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            sessionStorage.setItem('mission_auth', 'true');
        } else {
            document.getElementById('lock-status').textContent = "ZUGRIFF VERWEIGERT.";
        }
    }

    if(sessionStorage.getItem('mission_auth') === 'true') {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
    }

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('control-section').classList.remove('hidden');
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    function login() {
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${SCOPES}`;
    }

    // --- LIVE SUCHE LOGIK ---
    const gameInput = document.getElementById('stream-game');
    const suggestionBox = document.getElementById('game-suggestions');

    gameInput.addEventListener('input', async () => {
        const query = gameInput.value;
        if (query.length < 3) { suggestionBox.style.display = 'none'; return; }

        try {
            const resp = await fetch(`https://api.twitch.tv/helix/search/categories?query=${encodeURIComponent(query)}`, {
                headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await resp.json();
            
            suggestionBox.innerHTML = '';
            if (data.data && data.data.length > 0) {
                suggestionBox.style.display = 'block';
                data.data.forEach(game => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = game.name;
                    div.onclick = () => {
                        gameInput.value = game.name;
                        selectedGameId = game.id;
                        suggestionBox.style.display = 'none';
                    };
                    suggestionBox.appendChild(div);
                });
            }
        } catch (e) { console.error("Suche fehlgeschlagen", e); }
    });

    // Klick außerhalb schließt Vorschläge
    document.addEventListener('click', (e) => {
        if (e.target !== gameInput) suggestionBox.style.display = 'none';
    });

    async function updateTwitch() {
        const title = document.getElementById('stream-title').value;
        const statusEl = document.getElementById('status');
        statusEl.textContent = "SENDE...";

        try {
            const userResp = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
            });
            const userData = await userResp.json();
            const bId = userData.data[0].id;

            let body = {};
            if (title) body.title = title;
            if (selectedGameId) body.game_id = selectedGameId;

            const response = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${bId}`, {
                method: 'PATCH',
                headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (response.ok) {
                statusEl.textContent = "MISSION ERFOLGREICH AKTUALISIERT!";
                statusEl.style.color = "#00ff41";
                selectedGameId = null; // Reset für nächsten Einsatz
            }
        } catch (e) { statusEl.textContent = "FEHLER BEI DER ÜBERTRAGUNG."; }
    }
</script>
</body>
</html>
