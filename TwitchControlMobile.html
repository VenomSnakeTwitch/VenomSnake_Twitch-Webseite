<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VENOM_SNAKE - Mission Control App</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mgs-green: #00ff41; 
            --mgs-green-dim: rgba(0, 255, 65, 0.15);
            --mgs-bg: #050805; 
            --mgs-red: #ff0000; 
            --tactical-blue: #52b6ca;
            --panel-bg: #0a0f0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--mgs-bg); color: var(--mgs-green); font-family: 'JetBrains Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Passwort Overlay */
        #lock-overlay {
            position: fixed; inset: 0; background: var(--mgs-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { border: 2px solid var(--mgs-green); padding: 2rem; background: var(--panel-bg); text-align: center; width: 85%; max-width: 400px; }

        /* Navigation am unteren Rand */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--panel-bg); border-top: 2px solid var(--mgs-green);
            display: none; z-index: 100;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--mgs-green); font-size: 0.75rem; font-weight: bold; cursor: pointer; opacity: 0.4;
            transition: 0.3s;
        }
        .tab-item.active { opacity: 1; background: var(--mgs-green-dim); border-top: 4px solid var(--mgs-green); }

        /* App Container */
        .app-container { height: calc(100vh - 75px); overflow-y: auto; padding: 20px; display: none; }
        .view { display: none; flex-direction: column; min-height: 100%; }
        .view.active { display: flex; }

        h2 { font-size: 1.2rem; text-transform: uppercase; border-bottom: 2px solid var(--mgs-green); padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 0.7rem; margin-bottom: 8px; color: #008f11; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%; background: #001a00; border: 1px solid var(--mgs-green);
            color: #fff; padding: 15px; font-family: inherit; outline: none; font-size: 1rem;
        }

        /* Listen & Vorschläge */
        .suggestion-box {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #0a0f0a; border: 1px solid var(--mgs-green);
            z-index: 1000; max-height: 180px; overflow-y: auto; display: none;
        }
        .suggestion-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #1a2e1a; font-size: 0.9rem; }

        #live-follows-list {
            background: #001a00; border: 1px solid var(--mgs-green-dim);
            flex-grow: 1; min-height: 200px; max-height: 300px; overflow-y: auto; margin-bottom: 15px;
        }
        .live-follow-item {
            padding: 15px; border-bottom: 1px solid #1a2e1a;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;
        }
        .live-follow-item b { color: var(--mgs-green); }

        button {
            width: 100%; padding: 18px; background: var(--mgs-green); color: #000;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem;
        }
        .btn-raid { background: var(--mgs-red); color: #fff; margin-top: 10px; }

        #status-msg { 
            position: fixed; top: 0; left: 0; right: 0; padding: 10px; 
            text-align: center; font-size: 0.7rem; background: var(--mgs-green); color: #000;
            transform: translateY(-100%); transition: 0.4s; z-index: 2000; font-weight: bold;
        }
        #status-msg.show { transform: translateY(0); }
    </style>
</head>
<body>

<div id="status-msg">SYSTEM_STATUS_NORMAL</div>

<div id="lock-overlay">
    <div class="lock-box">
        <h2 style="color: var(--mgs-red); border: none;">[ ZUGRIFF_GESPERRT ]</h2>
        <input type="password" id="pass-input" placeholder="CODE EINGEBEN" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" style="margin-top:20px;">VERIFIZIEREN</button>
    </div>
</div>

<div class="app-container" id="main-app">
    
    <div id="view-broadcast" class="view active">
        <h2>[ STREAM_SETUP ]</h2>
        <div id="auth-section">
            <p style="margin-bottom: 20px; font-size: 0.9rem;">Initialisiere HQ-Verbindung...</p>
            <button onclick="login()">LOGIN BEI TWITCH</button>
        </div>
        <div id="control-section" style="display:none;">
            <div class="input-group">
                <label>MISSION_TITEL</label>
                <input type="text" id="stream-title" placeholder="Lade Titel...">
            </div>
            <div class="input-group">
                <label>KATEGORIE</label>
                <input type="text" id="stream-game" placeholder="Nach Spiel suchen..." autocomplete="off">
                <div id="game-suggestions" class="suggestion-box"></div>
            </div>
            <button onclick="updateTwitch()">UPDATE SENDEN</button>
        </div>
    </div>

    <div id="view-raid" class="view">
        <h2>[ RAID_COMMAND ]</h2>
        <label>LIVE FOLLOWS (AUFKLÄRUNG)</label>
        <div id="live-follows-list">Suche Live-Ziele...</div>

        <div class="input-group">
            <label>ZIEL_SCAN (NAME)</label>
            <input type="text" id="raid-target-input" placeholder="Suche..." autocomplete="off">
            <div id="raid-suggestions" class="suggestion-box"></div>
        </div>

        <div id="target-info" style="margin-bottom: 15px; font-size: 0.8rem; border: 1px solid #1a2e1a; padding: 15px; background: rgba(255,0,0,0.05);">
            ZIEL_ERFASST: <span id="selected-target-name" style="color: var(--mgs-red); font-weight: bold;">KEINES</span>
        </div>
        <button class="btn-raid" onclick="startRaid()">RAID EINLEITEN</button>
        <button style="margin-top:10px; background: #333; color: #aaa;" onclick="cancelRaid()">ABBRECHEN</button>
    </div>

</div>

<nav class="tab-bar" id="app-nav">
    <div class="tab-item active" onclick="switchTab('broadcast')">
        <span>BROADCAST</span>
    </div>
    <div class="tab-item" onclick="switchTab('raid')">
        <span>RAID</span>
    </div>
    <div class="tab-item" onclick="window.location.href='index.html'">
        <span>BACK</span>
    </div>
</nav>

<script>
    const CORRECT_PASS = "VenomSnake94";
    const CLIENT_ID = '67qdowganroqrazq3yt4g1bwj9bp8r';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'channel:manage:broadcast channel:manage:raids user:read:follows';

    let accessToken = null, myId = null, selectedGameId = null, selectedRaidTargetId = null;

    function showStatus(text) {
        const el = document.getElementById('status-msg');
        el.textContent = text;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function checkPass() {
        if(document.getElementById('pass-input').value === CORRECT_PASS) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('app-nav').style.display = 'flex';
            sessionStorage.setItem('mission_auth', 'true');
        }
    }

    if(sessionStorage.getItem('mission_auth') === 'true') {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
    }

    function switchTab(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('control-section').style.display = 'block';
        window.history.replaceState({}, document.title, window.location.pathname);
        initMissionData();
    }

    function login() {
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
    }

    async function initMissionData() {
        try {
            const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
            const u = await fetch('https://api.twitch.tv/helix/users', { headers: h }).then(r => r.json());
            myId = u.data[0].id;
            const c = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myId}`, { headers: h }).then(r => r.json());
            document.getElementById('stream-title').value = c.data[0].title;
            loadLiveFollows();
        } catch (e) { showStatus("ERROR: DATA_FETCH_FAILED"); }
    }

    async function loadLiveFollows() {
        const list = document.getElementById('live-follows-list');
        const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
        try {
            const f = await fetch(`https://api.twitch.tv/helix/channels/followed?user_id=${myId}&first=100`, { headers: h }).then(r => r.json());
            if(!f.data || f.data.length === 0) return list.innerHTML = "KEINE FOLLOWS.";
            const ids = f.data.map(x => x.broadcaster_id).join('&user_id=');
            const s = await fetch(`https://api.twitch.tv/helix/streams?user_id=${ids}`, { headers: h }).then(r => r.json());
            list.innerHTML = '';
            s.data.forEach(stream => {
                const item = document.createElement('div');
                item.className = 'live-follow-item';
                item.innerHTML = `<div><b>${stream.user_name}</b><br><small>${stream.game_name}</small></div><div>${stream.viewer_count} 👤</div>`;
                item.onclick = () => {
                    selectedRaidTargetId = stream.user_id;
                    document.getElementById('selected-target-name').textContent = stream.user_name.toUpperCase();
                    showStatus("ZIEL FIXIERT: " + stream.user_name);
                };
                list.appendChild(item);
            });
        } catch(e) { list.innerHTML = "SCAN_ERROR."; }
    }

    // SUCHE FÜR SPIELE & MANUELLER RAID
    const gIn = document.getElementById('stream-game'), gSug = document.getElementById('game-suggestions');
    gIn.addEventListener('input', async () => {
        if (gIn.value.length < 3) return gSug.style.display = 'none';
        const r = await fetch(`https://api.twitch.tv/helix/search/categories?query=${encodeURIComponent(gIn.value)}`, {
            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        }).then(res => res.json());
        gSug.innerHTML = ''; gSug.style.display = 'block';
        r.data.forEach(g => {
            const d = document.createElement('div'); d.className = 'suggestion-item'; d.textContent = g.name;
            d.onclick = () => { gIn.value = g.name; selectedGameId = g.id; gSug.style.display = 'none'; };
            gSug.appendChild(d);
        });
    });

    async function updateTwitch() {
        showStatus("SENDING_DATA...");
        let body = { title: document.getElementById('stream-title').value };
        if (selectedGameId) body.game_id = selectedGameId;
        const res = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myId}`, {
            method: 'PATCH',
            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        showStatus(res.ok ? "UPDATE_SUCCESS" : "UPDATE_FAILED");
    }

    async function startRaid() {
        if(!selectedRaidTargetId) return showStatus("KEIN ZIEL GEWÄHLT!");
        const res = await fetch(`https://api.twitch.tv/helix/raids?from_broadcaster_id=${myId}&to_broadcaster_id=${selectedRaidTargetId}`, {
            method: 'POST', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        showStatus(res.ok ? "RAID_INITIALIZED" : "RAID_FAILED");
    }

    async function cancelRaid() {
        const res = await fetch(`https://api.twitch.tv/helix/raids?from_broadcaster_id=${myId}`, {
            method: 'DELETE', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        showStatus(res.ok ? "RAID_ABORTED" : "CANCEL_FAILED");
    }

    document.addEventListener('click', (e) => { if(!e.target.closest('.input-group')) gSug.style.display = 'none'; });
    setInterval(loadLiveFollows, 120000);
</script>
</body>
</html>
