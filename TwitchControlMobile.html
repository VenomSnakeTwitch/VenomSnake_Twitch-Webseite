<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VENOM_SNAKE - Mission Control (V7_PREVIEW)</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <style>
        :root { 
            --mgs-green: #00ff41; 
            --mgs-bg: #050805; 
            --mgs-red: #ff0000; 
            --mgs-blue: #0088ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--mgs-bg); color: var(--mgs-green); font-family: 'JetBrains Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex; flex-direction: column;
        }

        #lock-overlay {
            position: fixed; inset: 0; background: var(--mgs-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { border: 2px solid var(--mgs-green); padding: 1rem; background: rgba(0, 20, 0, 0.95); text-align: center; width: 85%; max-width: 400px; }

        .app-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 15px; 
            display: none;
            margin-bottom: 110px; 
        }

        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        h2 { font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid var(--mgs-green); padding-bottom: 5px; margin-bottom: 12px; letter-spacing: 1px; }

        .input-group { margin-bottom: 10px; position: relative; }
        label { display: block; font-size: 0.55rem; margin-bottom: 3px; color: #008f11; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%; background: #001a00; border: 1px solid var(--mgs-green);
            color: #fff; padding: 10px; font-family: inherit; outline: none; font-size: 0.9rem;
        }

        #live-follows-list {
            background: #001a00; border: 1px solid rgba(0, 255, 65, 0.2);
            height: 150px; 
            overflow-y: auto; 
            margin-bottom: 10px;
        }
        .live-follow-item {
            padding: 10px; border-bottom: 1px solid #1a2e1a;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;
            cursor: pointer;
        }

        button {
            width: 100%; padding: 12px; background: var(--mgs-green); color: #000;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-raid { background: var(--mgs-red); color: #fff; margin-top: 5px; }
        .btn-cancel { background: var(--mgs-blue); color: #fff; margin-top: 5px; }

        #status-container {
            position: fixed; bottom: 65px; width: 100%;
            background: var(--mgs-bg); padding: 5px 15px;
            z-index: 1001; border-top: 1px solid rgba(0, 255, 65, 0.1);
        }
        #status { 
            padding: 8px; text-align: center; font-size: 0.7rem;
            border: 1px dashed var(--mgs-green); background: rgba(0,255,65,0.05);
            text-transform: uppercase;
        }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #0a0f0a; border-top: 2px solid var(--mgs-green);
            display: none; z-index: 1000;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--mgs-green); font-size: 0.6rem; font-weight: bold; cursor: pointer; opacity: 0.4;
        }
        .tab-item.active { opacity: 1; background: rgba(0, 255, 65, 0.1); border-top: 3px solid var(--mgs-green); }

        /* Player Styles */
        #preview-player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 1px solid var(--mgs-green);
            margin-top: 10px;
        }

        .suggestion-box {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #0a0f0a; border: 2px solid var(--mgs-green);
            z-index: 2000; max-height: 150px; overflow-y: auto; display: none;
        }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #1a2e1a; font-size: 0.8rem; color: #fff; }
    </style>
</head>
<body>

<div id="lock-overlay">
    <div class="lock-box">
        <h2 style="color: var(--mgs-red); border: none;">[ ZUGRIFF_GESPERRT ]</h2>
        <input type="password" id="pass-input" placeholder="CODE EINGEBEN" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" style="margin-top:10px;">VERIFIZIEREN</button>
        <div id="lock-status" style="margin-top:10px; font-size: 0.7rem;"></div>
    </div>
</div>

<div class="app-container" id="main-panel">
    <div id="view-broadcast" class="view active">
        <h2>[ STREAM_SETUP ]</h2>
        <div id="auth-section">
            <p style="margin: 20px 0; text-align:center; font-size: 0.75rem;">Login erforderlich...</p>
            <button onclick="login()">LOGIN BEI TWITCH</button>
        </div>
        <div id="control-section" style="display:none;">
            <div class="input-group">
                <label>STREAM_TITEL</label>
                <input type="text" id="stream-title">
            </div>
            <div class="input-group">
                <label>KATEGORIE</label>
                <input type="text" id="stream-game" placeholder="Aktuelles Spiel laden..." autocomplete="off">
                <div id="game-suggestions" class="suggestion-box"></div>
            </div>
            <button onclick="updateTwitch()">UPDATE SENDEN</button>
        </div>
    </div>

    <div id="view-raid" class="view">
        <h2>[ RAID_COMMAND ]</h2>
        <label>LIVE FOLLOWS</label>
        <div id="live-follows-list">Lade...</div>
        <div class="input-group">
            <label>ZIEL_SCAN (MANUELL)</label>
            <input type="text" id="raid-target-input" placeholder="Name tippen..." autocomplete="off">
            <div id="raid-suggestions" class="suggestion-box"></div>
        </div>
        <div id="target-info" style="margin-bottom: 8px; font-size: 0.7rem; border: 1px solid #1a2e1a; padding: 8px;">
            ZIEL: <span id="selected-target-name" style="color: var(--mgs-red); font-weight: bold;">KEINES</span>
        </div>
        <button class="btn-raid" onclick="startRaid()">RAID_EINLEITEN</button>
        <button class="btn-cancel" onclick="cancelRaid()">RAID_ABBRECHEN</button>
    </div>

    <div id="view-preview" class="view">
        <h2>[ LIVE_VORSCHAU ]</h2>
        <div id="preview-info" style="font-size: 0.7rem; margin-bottom: 10px;">
            KANAL: <span id="preview-channel-name" style="color: var(--mgs-green);">KEINER AUSGEWÄHLT</span>
        </div>
        <div id="preview-player-container"></div>
        <p style="font-size: 0.55rem; color: #555; margin-top: 10px; text-align: center;">
            Hinweis: Player startet stummgeschaltet (Autoplay-Richtlinie).
        </p>
    </div>
</div>

<div id="status-container" style="display:none;">
    <div id="status">STATUS: STANDBY</div>
</div>

<nav class="tab-bar" id="app-nav">
    <div class="tab-item active" onclick="switchTab('broadcast')"><span>BROADCAST</span></div>
    <div class="tab-item" onclick="switchTab('raid')"><span>RAID</span></div>
    <div class="tab-item" onclick="switchTab('preview')"><span>PREVIEW</span></div>
</nav>

<script>
    const CORRECT_PASS = "VenomSnake94";
    const CLIENT_ID = 'rcm9o1fq5h707qnuovfxodnvydosux'; 
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'channel:manage:broadcast channel:manage:raids user:read:follows';

    let accessToken = null, selectedGameId = null, selectedRaidTargetId = null, myBroadcasterId = null;
    let twitchPlayer = null;

    if(localStorage.getItem('mission_auth') === 'true') { unlockApp(); }

    function checkPass() {
        if(document.getElementById('pass-input').value === CORRECT_PASS) {
            unlockApp();
            localStorage.setItem('mission_auth', 'true');
        } else {
            document.getElementById('lock-status').textContent = "FEHLER.";
        }
    }

    function unlockApp() {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        document.getElementById('status-container').style.display = 'block';
    }

    function switchTab(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Funktion um das Vorschau-Ziel zu setzen
    function setPreviewTarget(userName) {
        document.getElementById('preview-channel-name').textContent = userName.toUpperCase();
        
        if (!twitchPlayer) {
            twitchPlayer = new Twitch.Player("preview-player-container", {
                width: "100%",
                height: "100%",
                channel: userName,
                parent: [window.location.hostname],
                muted: true
            });
        } else {
            twitchPlayer.setChannel(userName);
        }
    }

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('control-section').style.display = 'block';
        window.history.replaceState({}, document.title, window.location.pathname);
        initMissionData();
    }

    function login() {
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
    }

    async function initMissionData() {
        try {
            const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
            const u = await fetch('https://api.twitch.tv/helix/users', { headers: h }).then(r => r.json());
            myBroadcasterId = u.data[0].id;
            const c = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myBroadcasterId}`, { headers: h }).then(r => r.json());
            
            document.getElementById('stream-title').value = c.data[0].title;
            
            if(c.data[0].game_name) {
                document.getElementById('stream-game').placeholder = "AKTUELL: " + c.data[0].game_name;
                selectedGameId = c.data[0].game_id;
            }

            loadLiveFollows();
        } catch (e) { console.error(e); }
    }

    async function loadLiveFollows() {
        const list = document.getElementById('live-follows-list');
        const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
        try {
            const f = await fetch(`https://api.twitch.tv/helix/channels/followed?user_id=${myBroadcasterId}&first=100`, { headers: h }).then(r => r.json());
            if(!f.data || f.data.length === 0) return;
            const ids = f.data.map(x => x.broadcaster_id).join('&user_id=');
            const s = await fetch(`https://api.twitch.tv/helix/streams?user_id=${ids}`, { headers: h }).then(r => r.json());
            list.innerHTML = '';
            s.data.forEach(stream => {
                const item = document.createElement('div');
                item.className = 'live-follow-item';
                item.innerHTML = `
                    <div style="text-align: left;">
                        <b style="color: var(--mgs-green);">${stream.user_name}</b><br>
                        <span style="font-size: 0.6rem; color: var(--mgs-blue);">${stream.game_name || 'Unbekannt'}</span>
                    </div>
                    <div style="text-align: right;">${stream.viewer_count}👤</div>
                `;
                item.onclick = () => {
                    selectedRaidTargetId = stream.user_id;
                    document.getElementById('selected-target-name').textContent = stream.user_name.toUpperCase();
                    document.getElementById('raid-target-input').value = stream.user_name;
                    setPreviewTarget(stream.user_name); // Player Ziel setzen
                };
                list.appendChild(item);
            });
        } catch(e) { console.error(e); }
    }

    const raidInput = document.getElementById('raid-target-input'), rBox = document.getElementById('raid-suggestions');
    raidInput.addEventListener('input', async () => {
        const q = raidInput.value.trim();
        if (q.length < 3) { rBox.style.display = 'none'; return; }
        const res = await fetch(`https://api.twitch.tv/helix/search/channels?query=${encodeURIComponent(q)}&first=5`, {
            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        }).then(r => r.json());
        rBox.innerHTML = '';
        if(res.data && res.data.length > 0) {
            rBox.style.display = 'block';
            res.data.forEach(u => {
                const d = document.createElement('div'); d.className = 'suggestion-item';
                const gameInfo = (u.is_live && u.game_name) ? ` - ${u.game_name}` : "";
                d.textContent = u.is_live ? `[LIVE] ${u.display_name}${gameInfo}` : u.display_name;
                
                d.onclick = () => {
                    raidInput.value = u.display_name; selectedRaidTargetId = u.id;
                    document.getElementById('selected-target-name').textContent = u.display_name.toUpperCase();
                    setPreviewTarget(u.display_name); // Player Ziel setzen
                    rBox.style.display = 'none';
                };
                rBox.appendChild(d);
            });
        }
    });

    const gameInput = document.getElementById('stream-game'), gBox = document.getElementById('game-suggestions');
    gameInput.addEventListener('input', async () => {
        const q = gameInput.value.trim();
        if (q.length < 3) { gBox.style.display = 'none'; return; }
        const r = await fetch(`https://api.twitch.tv/helix/search/categories?query=${encodeURIComponent(q)}`, {
            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        }).then(res => res.json());
        gBox.innerHTML = '';
        if(r.data && r.data.length > 0) {
            gBox.style.display = 'block';
            r.data.forEach(g => {
                const d = document.createElement('div'); d.className = 'suggestion-item'; d.textContent = g.name;
                d.onclick = () => { gameInput.value = g.name; selectedGameId = g.id; gBox.style.display = 'none'; };
                gBox.appendChild(d);
            });
        }
    });

    async function startRaid() {
        const sEl = document.getElementById('status');
        if(!selectedRaidTargetId) { sEl.textContent = "ZIEL FEHLT."; return; }
        sEl.textContent = "RAID SENDET...";
        const res = await fetch(`https://api.twitch.tv/helix/raids?from_broadcaster_id=${myBroadcasterId}&to_broadcaster_id=${selectedRaidTargetId}`, {
            method: 'POST', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        sEl.textContent = res.ok ? "RAID LÄUFT." : "FEHLER.";
    }

    async function cancelRaid() {
        const sEl = document.getElementById('status');
        sEl.textContent = "ABBRUCH...";
        const url = `https://api.twitch.tv/helix/raids?from_broadcaster_id=${myBroadcasterId}&broadcaster_id=${myBroadcasterId}`;
        const res = await fetch(url, {
            method: 'DELETE', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        if (res.ok || res.status === 204) {
            sEl.textContent = "ABGEBROCHEN.";
            document.getElementById('selected-target-name').textContent = "KEINES";
        } else {
            const data = await res.json().catch(() => ({}));
            sEl.textContent = "FEHLER: " + (data.message || "KEIN RAID?");
        }
    }

    async function updateTwitch() {
        const sEl = document.getElementById('status');
        let body = { title: document.getElementById('stream-title').value };
        if (selectedGameId) body.game_id = selectedGameId;
        const res = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myBroadcasterId}`, {
            method: 'PATCH', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if(res.ok) {
            sEl.textContent = "UPDATED.";
            document.getElementById('stream-game').placeholder = "AKTUELL: " + gameInput.value;
            gameInput.value = "";
        } else {
            sEl.textContent = "FEHLER.";
        }
    }

    document.addEventListener('click', (e) => { 
        if(!gBox.contains(e.target)) gBox.style.display = 'none';
        if(!rBox.contains(e.target)) rBox.style.display = 'none';
    });
    setInterval(loadLiveFollows, 60000);
</script>
</body>
</html>
