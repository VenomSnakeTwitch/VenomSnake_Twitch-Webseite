<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VENOM_SNAKE - Mission Control (V11_AUTO)</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <style>
        :root { --mgs-green: #00ff41; --mgs-bg: #050805; --mgs-red: #ff0000; --mgs-blue: #0088ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background: var(--mgs-bg); color: var(--mgs-green); font-family: 'JetBrains Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; display: flex; flex-direction: column;
        }
        #lock-overlay {
            position: fixed; inset: 0; background: var(--mgs-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { border: 2px solid var(--mgs-green); padding: 1.5rem; background: rgba(0, 20, 0, 0.95); text-align: center; width: 85%; max-width: 400px; }
        .app-container { flex: 1; overflow: hidden; padding: 10px 15px; display: none; margin-bottom: 110px; }
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }
        h2 { font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid var(--mgs-green); padding-bottom: 5px; margin-bottom: 12px; }
        input { width: 100%; background: #001a00; border: 1px solid var(--mgs-green); color: #fff; padding: 10px; font-family: inherit; font-size: 0.9rem; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--mgs-green); color: #000; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        #status-container { position: fixed; bottom: 65px; width: 100%; background: var(--mgs-bg); padding: 5px 15px; z-index: 1001; border-top: 1px solid rgba(0, 255, 65, 0.1); }
        #status { padding: 8px; text-align: center; font-size: 0.7rem; border: 1px dashed var(--mgs-green); }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #0a0f0a; border-top: 2px solid var(--mgs-green); display: none; z-index: 1000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--mgs-green); font-size: 0.6rem; opacity: 0.4; }
        .tab-item.active { opacity: 1; background: rgba(0, 255, 65, 0.1); border-top: 3px solid var(--mgs-green); }
    </style>
</head>
<body>

<div id="lock-overlay">
    <div class="lock-box">
        <h2 style="color: var(--mgs-red); border: none;">[ ZUGRIFF_GESPERRT ]</h2>
        <input type="password" id="pass-input" placeholder="CODE EINGEBEN" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()">VERIFIZIEREN</button>
        <div id="lock-status" style="margin-top:10px; font-size: 0.7rem;"></div>
    </div>
</div>

<div class="app-container" id="main-panel">
    <div id="view-broadcast" class="view active">
        <h2>[ STREAM_SETUP ]</h2>
        <div id="control-section">
            <input type="text" id="stream-title" placeholder="Titel...">
            <button onclick="updateTwitch()">UPDATE SENDEN</button>
        </div>
    </div>
    </div>

<div id="status-container" style="display:none;">
    <div id="status">STATUS: STANDBY</div>
</div>

<nav class="tab-bar" id="app-nav">
    <div class="tab-item active" onclick="switchTab('broadcast')">SETUP</div>
    <div class="tab-item" onclick="switchTab('raid')">RAID</div>
    <div class="tab-item" onclick="switchTab('preview')">VIDEO</div>
    <div class="tab-item" onclick="switchTab('chat')">CHAT</div>
</nav>

<script>
    const CORRECT_PASS = "VenomSnake94";
    const CLIENT_ID = 'rcm9o1fq5h707qnuovfxodnvydosux'; 
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'channel:manage:broadcast channel:manage:raids user:read:follows';

    // 1. Token-Management
    let accessToken = localStorage.getItem('twitch_access_token');

    // Prüfe, ob wir gerade vom Login zurückkommen
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    if (params.get('access_token')) {
        accessToken = params.get('access_token');
        localStorage.setItem('twitch_access_token', accessToken);
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // Automatisches Entsperren, wenn Passwort schon mal korrekt war
    if(localStorage.getItem('mission_auth') === 'true') { unlockApp(); }

    function checkPass() {
        if(document.getElementById('pass-input').value === CORRECT_PASS) {
            localStorage.setItem('mission_auth', 'true');
            unlockApp();
        } else {
            document.getElementById('lock-status').textContent = "FEHLER.";
        }
    }

    function unlockApp() {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        document.getElementById('status-container').style.display = 'block';
        
        // 2. Auto-Login Logik
        if (!accessToken) {
            login(); // Springt sofort zu Twitch
        } else {
            initMissionData();
        }
    }

    function login() {
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
    }

    // Deine restlichen Funktionen (switchTab, initMissionData, updateTwitch etc.) 
    // bleiben gleich wie in V10, nutzen aber das gespeicherte accessToken.
    
    function switchTab(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        const targetView = document.getElementById('view-' + viewId);
        if(targetView) targetView.classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function initMissionData() {
        // Hier deine API-Abfragen einbauen...
        console.log("Mission Data geladen mit Token: " + accessToken.substring(0,5) + "...");
    }
</script>
</body>
</html>
