<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE_CONTROL_APP</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mgs-green: #00ff41; 
            --mgs-bg: #050805; 
            --mgs-red: #ff0000; 
            --panel-bg: #0a0f0a;
            --tactical-blue: #52b6ca;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--mgs-bg); color: var(--mgs-green); font-family: 'JetBrains Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Passwort Overlay */
        #lock-overlay {
            position: fixed; inset: 0; background: var(--mgs-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { border: 2px solid var(--mgs-green); padding: 2rem; background: var(--panel-bg); text-align: center; width: 85%; }

        /* Navigation am unteren Rand für Daumen-Bedienung */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--panel-bg); border-top: 2px solid var(--mgs-green);
            display: flex; z-index: 100;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--mgs-green); font-size: 0.7rem; font-weight: bold; cursor: pointer; opacity: 0.5;
        }
        .tab-item.active { opacity: 1; background: rgba(0, 255, 65, 0.1); border-top: 3px solid var(--mgs-green); }

        /* Seiten-Container */
        .app-container { height: calc(100vh - 70px); overflow-y: auto; padding: 20px; padding-bottom: 40px; }
        .view { display: none; flex-direction: column; }
        .view.active { display: flex; }

        h2 { font-size: 1.1rem; text-transform: uppercase; border-bottom: 1px solid var(--mgs-green); padding-bottom: 10px; margin-bottom: 20px; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 0.65rem; margin-bottom: 8px; color: #008f11; text-transform: uppercase; }
        
        input {
            width: 100%; background: #001a00; border: 1px solid var(--mgs-green);
            color: #fff; padding: 15px; font-family: inherit; font-size: 1rem; outline: none;
        }

        /* Listen & Suchvorschläge */
        .suggestion-box {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #0a0f0a; border: 1px solid var(--mgs-green);
            z-index: 1000; max-height: 150px; overflow-y: auto; display: none;
        }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #1a2e1a; font-size: 0.9rem; }

        #live-follows-list {
            background: #001a00; border: 1px solid #1a2e1a;
            max-height: 250px; overflow-y: auto; margin-bottom: 15px;
        }
        .live-follow-item {
            padding: 15px; border-bottom: 1px solid #1a2e1a;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }

        button {
            width: 100%; padding: 18px; background: var(--mgs-green); color: #000;
            border: none; font-weight: bold; text-transform: uppercase; margin-top: 10px;
        }
        .btn-raid { background: var(--mgs-red); color: #fff; }

        #status { 
            position: fixed; top: 10px; left: 10px; right: 10px; 
            padding: 10px; font-size: 0.7rem; text-align: center;
            background: rgba(0,0,0,0.8); border: 1px solid var(--mgs-green);
            z-index: 200; pointer-events: none; opacity: 0; transition: 0.3s;
        }
    </style>
</head>
<body>

<div id="status">STATUS_MELDUNG</div>

<div id="lock-overlay">
    <div class="lock-box">
        <h2 style="color: var(--mgs-red); border:none;">[ GESPERRT ]</h2>
        <input type="password" id="pass-input" placeholder="CODE">
        <button onclick="checkPass()" style="margin-top:20px;">LOGIN</button>
    </div>
</div>

<div class="app-container" id="main-app" style="display:none;">
    
    <div id="view-broadcast" class="view active">
        <h2>[ STREAM_SETUP ]</h2>
        <div id="auth-section">
            <button onclick="login()">LOGIN BEI TWITCH</button>
        </div>
        <div id="broadcast-controls" style="display:none;">
            <div class="input-group">
                <label>MISSION_TITEL</label>
                <input type="text" id="stream-title" placeholder="Lade...">
            </div>
            <div class="input-group">
                <label>KATEGORIE</label>
                <input type="text" id="stream-game" placeholder="Suchen..." autocomplete="off">
                <div id="game-suggestions" class="suggestion-box"></div>
            </div>
            <button onclick="updateTwitch()">DATEN_SENDEN</button>
        </div>
    </div>

    <div id="view-raid" class="view">
        <h2>[ RAID_COMMAND ]</h2>
        <label>LIVE_AUFKLÄRUNG</label>
        <div id="live-follows-list">Lade Kontakte...</div>
        
        <div class="input-group">
            <label>ZIEL_SUCHE</label>
            <input type="text" id="raid-target-input" placeholder="Name..." autocomplete="off">
            <div id="raid-suggestions" class="suggestion-box"></div>
        </div>
        
        <div style="border: 1px dashed var(--mgs-red); padding: 10px; margin-bottom: 15px;">
            ZIEL_STATUS: <span id="selected-target-name">STANDBY</span>
        </div>
        
        <button class="btn-raid" onclick="startRaid()">RAID_STARTEN</button>
        <button style="background:#222; color:#888;" onclick="cancelRaid()">RAID_STOPP</button>
    </div>

</div>

<nav class="tab-bar" id="bottom-nav" style="display:none;">
    <div class="tab-item active" onclick="switchView('broadcast')">
        <span>BROADCAST</span>
    </div>
    <div class="tab-item" onclick="switchView('raid')">
        <span>RAID</span>
    </div>
    <div class="tab-item" onclick="window.location.href='index.html'">
        <span>EXIT</span>
    </div>
</nav>

<script>
    const CORRECT_PASS = "VenomSnake94";
    const CLIENT_ID = '67qdowganroqrazq3yt4g1bwj9bp8r';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const SCOPES = 'channel:manage:broadcast channel:manage:raids user:read:follows';

    let accessToken = null, myId = null, selectedGameId = null, selectedRaidId = null;

    function checkPass() {
        if(document.getElementById('pass-input').value === CORRECT_PASS) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('bottom-nav').style.display = 'flex';
            sessionStorage.setItem('mission_auth', 'true');
        }
    }

    if(sessionStorage.getItem('mission_auth') === 'true') {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('bottom-nav').style.display = 'flex';
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function showStatus(msg) {
        const s = document.getElementById('status');
        s.textContent = msg; s.style.opacity = 1;
        setTimeout(() => s.style.opacity = 0, 3000);
    }

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('broadcast-controls').style.display = 'block';
        window.history.replaceState({}, document.title, window.location.pathname);
        initData();
    }

    function login() {
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
    }

    async function initData() {
        const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
        const u = await fetch('https://api.twitch.tv/helix/users', { headers: h }).then(r => r.json());
        myId = u.data[0].id;
        const c = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myId}`, { headers: h }).then(r => r.json());
        document.getElementById('stream-title').value = c.data[0].title;
        loadFollows();
    }

    async function loadFollows() {
        const list = document.getElementById('live-follows-list');
        const h = { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` };
        const f = await fetch(`https://api.twitch.tv/helix/channels/followed?user_id=${myId}&first=50`, { headers: h }).then(r => r.json());
        if(!f.data) return;
        const ids = f.data.map(x => x.broadcaster_id).join('&user_id=');
        const s = await fetch(`https://api.twitch.tv/helix/streams?user_id=${ids}`, { headers: h }).then(r => r.json());
        list.innerHTML = '';
        s.data.forEach(stream => {
            const d = document.createElement('div'); d.className = 'live-follow-item';
            d.innerHTML = `<div><b>${stream.user_name}</b><br><small>${stream.game_name}</small></div><div>${stream.viewer_count} 👤</div>`;
            d.onclick = () => { selectedRaidId = stream.user_id; document.getElementById('selected-target-name').textContent = stream.user_name; };
            list.appendChild(d);
        });
    }

    // Such-Logik für Spiele
    const gIn = document.getElementById('stream-game'), gSug = document.getElementById('game-suggestions');
    gIn.addEventListener('input', async () => {
        if(gIn.value.length < 3) return;
        const r = await fetch(`https://api.twitch.tv/helix/search/categories?query=${encodeURIComponent(gIn.value)}`, {
            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        }).then(res => res.json());
        gSug.innerHTML = ''; gSug.style.display = 'block';
        r.data.forEach(g => {
            const d = document.createElement('div'); d.className = 'suggestion-item'; d.textContent = g.name;
            d.onclick = () => { gIn.value = g.name; selectedGameId = g.id; gSug.style.display = 'none'; };
            gSug.appendChild(d);
        });
    });

    async function updateTwitch() {
        showStatus("SENDING...");
        const body = { title: document.getElementById('stream-title').value };
        if(selectedGameId) body.game_id = selectedGameId;
        const res = await fetch(`https://api.twitch.tv/helix/channels?broadcaster_id=${myId}`, {
            method: 'PATCH', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        showStatus(res.ok ? "SUCCESS" : "ERROR");
    }

    async function startRaid() {
        if(!selectedRaidId) return showStatus("NO TARGET");
        const res = await fetch(`https://api.twitch.tv/helix/raids?from_broadcaster_id=${myId}&to_broadcaster_id=${selectedRaidId}`, {
            method: 'POST', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        showStatus(res.ok ? "RAID STARTED" : "FAILED");
    }

    async function cancelRaid() {
        const res = await fetch(`https://api.twitch.tv/helix/raids?from_broadcaster_id=${myId}`, {
            method: 'DELETE', headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
        });
        showStatus(res.ok ? "ABORTED" : "FAILED");
    }

    document.addEventListener('click', (e) => { if(!e.target.closest('.input-group')) gSug.style.display = 'none'; });
</script>
</body>
</html>
