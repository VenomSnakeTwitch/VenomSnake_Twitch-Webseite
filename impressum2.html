<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Impressum - VenomSnake_Twitch</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --twitch: #9146FF;
            --twitch-dim: #772ce8;
            --tactical-blue: #52b6ca;
            --base: #0a0b0e;
            --surface: #13151a;
            --overlay: #1c1f26;
            --live: #ff4444;
            --text-primary: #e6eef3;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            background-color: var(--base);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
        }

        /* ──────────────────────────────────────── */
        /*          PASSWORT-LOGIN OVERLAY          */
        /* ──────────────────────────────────────── */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 14, 0.96);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        #login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .login-box h2 {
            font-family: 'Chakra Petch', sans-serif;
            color: var(--twitch);
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.08em;
        }

        .login-box input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            margin: 1rem 0 1.5rem;
            background: var(--overlay);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.15em;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--twitch);
            box-shadow: 0 0 0 3px rgba(145, 70, 255, 0.25);
        }

        #login-btn {
            background: var(--twitch);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s;
        }

        #login-btn:hover {
            background: var(--twitch-dim);
            transform: translateY(-2px);
        }

        #error-msg {
            color: #ff5555;
            font-size: 0.95rem;
            margin-top: 1rem;
            min-height: 1.4rem;
        }

        /* Restlicher Style (unverändert) */
        .grid-bg { background-image: radial-gradient(rgba(82, 182, 202, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
        .glass { backdrop-filter: blur(16px); background-color: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--border); }
        .cut-corner { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%); }
        .glow-text { text-shadow: 0 0 20px rgba(145, 70, 255, 0.5); }
        /* ... der Rest deines bisherigen CSS ... bleibt gleich ... */
    </style>
</head>
<body class="grid-bg">

<!-- ──── PASSWORT-SCREEN ──────────────────────────────────────── -->
<div id="login-overlay">
    <div class="login-box">
        <h2>ACCESS GRANTED?</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
            VenomSnake autorisiert
        </p>
        <input type="password" id="password" placeholder="PASSWORT EINGEBEN" autocomplete="off">
        <button id="login-btn">LOGIN</button>
        <div id="error-msg"></div>
    </div>
</div>

<!-- Navigation (wie vorher) -->
<nav class="nav glass">
    <!-- ... dein kompletter Nav-Code bleibt unverändert ... -->
</nav>

<!-- Hauptinhalt – wird erst nach richtigem Passwort sichtbar -->
<main class="page" id="main-content" style="display: none; opacity: 0; transition: opacity 0.8s ease;">
    <div class="container">
        <div class="page-header">
            <h1><span class="glow-text" style="color: var(--twitch);">IMPRESSUM</span></h1>
            <p class="subtitle">ANBIETERKENNZEICHNUNG NACH § 5 DDG</p>
        </div>
        <div class="impressum-content cut-corner">
            <!-- ... dein gesamter Impressum-Inhalt bleibt gleich ... -->
        </div>
    </div>
</main>

<!-- Footer -->
<footer>
    <!-- ... dein Footer bleibt gleich ... -->
</footer>

<script>
    lucide.createIcons();

    function toggleMobileMenu() {
        document.getElementById('mobileNav').classList.toggle('open');
    }

    // Passwort-Logik
    const correctPassword = "VenomSnake";
    const loginOverlay = document.getElementById('login-overlay');
    const mainContent = document.getElementById('main-content');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    function checkPassword() {
        if (passwordInput.value === correctPassword) {
            loginOverlay.classList.add('hidden');
            setTimeout(() => {
                loginOverlay.style.display = 'none';
                mainContent.style.display = 'block';
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 100);
            }, 600);
        } else {
            errorMsg.textContent = "Falsches Passwort. Versuch's nochmal.";
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    loginBtn.addEventListener('click', checkPassword);

    // Enter-Taste auch möglich
    passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // Optional: Fokus direkt setzen
    passwordInput.focus();
</script>

</body>
</html>
