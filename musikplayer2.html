<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC // VenomSnake_Twitch</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            color: var(--text-primary);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container { max-width: 1600px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }

        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }
        
        .player-box {
            background: var(--mgs-panel); border: 2px solid var(--mgs-green); padding: 2rem;
            position: relative; box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1); width: 100%;
        }

        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 5px; color: var(--mgs-green); margin-bottom: 5px; font-size: 2.5rem; }
        
        #currentSong { color: #fff; font-size: 1rem; margin-bottom: 20px; background: var(--mgs-green-dim); padding: 10px; border: 1px dashed var(--mgs-green); min-height: 45px; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        
        select, button, .download-btn {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 10px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer;
            font-size: 0.75rem; transition: 0.2s;
        }
        button:hover, select:hover { background: var(--mgs-green); color: #000; }
        
        .control-row { display: flex; align-items: center; gap: 15px; margin: 15px 0; background: rgba(0,255,65,0.05); padding: 10px; border-radius: 4px; }
        
        input[type="range"] { 
            flex-grow: 1; accent-color: var(--mgs-green); cursor: pointer; height: 6px; background: var(--mgs-green-dim); border: none;
        }

        /* INFO PANEL */
        .info-panel {
            margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;
            border-top: 2px solid var(--mgs-border); padding-top: 20px;
        }
        .info-card h3 { font-family: 'Chakra Petch'; color: var(--mgs-green); font-size: 0.9rem; margin-bottom: 10px; border-left: 3px solid var(--mgs-green); padding-left: 10px; }
        .info-card p { font-size: 0.75rem; margin-bottom: 4px; color: var(--text-primary); }

        /* VISUALIZER OVERLAY */
        #visualizerOverlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 1px solid var(--mgs-green); max-width: 95vw; max-height: 75vh; }

        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.7rem; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_AUDIO</span>
        </a>
        <button onclick="toggleFullscreen()" style="border:none; background:none; color:var(--mgs-green); cursor:pointer; font-size:0.7rem;">[ VOLLBILD ]</button>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <h1>CODEC</h1>
        
        <h2 id="currentSong">VERBINDUNG WIRD HERGESTELLT...</h2>
        <audio id="audioPlayer" crossOrigin="anonymous"></audio>

        <div class="control-grid">
            <select id="songSelect" onchange="selectSong()">
                <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
                <option value="1">Ghost Town by VenomSnake_Twitch</option>
                <option value="2">Wreckfest</option>
                <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
                <option value="4">Paradies City</option>
                <option value="5">Parasitäres Bewustsein</option>
                <option value="6">Still Alive (Voiced)</option>
                <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
                <option value="8">Bye Bye Beautiful</option>
                <option value="9">Kettenreaktion (Cover)</option>
                <option value="10">Straße der Verdammnis</option>
                <option value="11">Syphon Filter Synth Mix</option>
                <option value="12">VenomSnake Mode Intro song</option>
                <option value="13">Hell March [Retaliation Cover]</option>
                <option value="14">Dance hall Dance(Cover)</option>
                <option value="15">Resident Evil 5 Desperate Escape Main Theme Music(Remix)</option>
                <option value="16">Bleed out My Frend</option>
                <option value="17">Revange</option>
                <option value="18">Revange 2</option>
                <option value="19">Survival Of Death</option>
                <option value="20">Pile of Total Wreck</option>
                <option value="21">Dessert Storm Ahead</option>
                <option value="22">Industrial Breakdown</option>
                <option value="23">Mental Breakdown</option>
                <option value="24">Metal Gear 2 Solid Snake Chasing the Green Beret Remix</option>
                <option value="25">Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026</option>
                <option value="26">Metal Gear 2 Solid Snake Level1 Warning Remix</option>
                <option value="27">Metal Gear 2 Solid Snake Level3 Warning Remix</option>
                <option value="28">Metal Gear 2 Solid Snake Reprieve of The Doctor Remix</option>
                <option value="29">Operation Stealth Destruction</option>
                <option value="30">Takin' On The Shagohod Remake</option>
            </select>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
            <a id="downloadBtn" href="#" download class="download-btn" style="text-decoration:none; text-align:center;">Download</a>
        </div>

        <div class="control-row">
            <span id="timeLabel">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span id="durationLabel">0:00</span>
        </div>

        <div class="control-row">
            <span style="color:var(--mgs-green); font-size:0.7rem;">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span id="volumeLabel" style="min-width: 40px;">50%</span>
        </div>

        <div class="control-grid">
            <button onclick="prevSong()">⏮ Zurück</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
            <button onclick="nextSong()">Weiter ⏭</button>
            <button id="radioToggle" onclick="toggleRadioMode()">Radio: AUS</button>
        </div>

        <div class="info-panel">
            <div class="info-card">
                <h3>NEU IM ARCHIV</h3>
                <p>Bleed out My Frend</p>
                <p>Revange 1 & 2</p>
                <p>Metal Gear 2 Remix Serie</p>
            </div>
            <div class="info-card">
                <h3>DEMNÄCHST</h3>
                <p>Frequency 140.85 (Original)</p>
                <p>The Best Is Yet To Come (Revamp)</p>
            </div>
        </div>
    </div>
</main>

<div id="visualizerOverlay">
    <canvas id="visualizerCanvas"></canvas>
    <div style="margin-top:20px;">
        <button onclick="closeVisualizer()" style="color:#ff4141; border-color:#ff4141;">[ DISCONNECT ]</button>
    </div>
</div>

<footer>
    <p>FREQUENCY: 140.85 MHz // OPERATOR: VENOMSNAKE_TWITCH</p>
</footer>

<script>
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3", "Ghost Town by VenomSnake_Twitch.mp3", "Wreckfest.mp3", 
    "In The Air Tonight(VenomSnake_Twitch).mp3", "Paradies City.mp3", "Parasitäres Bewustsein.mp3", 
    "Still Alive (Voiced).mp3", "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3", "ByeByeBeautiful.mp3", 
    "Kettenreaktion (Cover).mp3", "Strasse der Verdammnis.mp3", "Syphon Filter Synth Mix.mp3", 
    "VenomSnake Mode Intro song.mp3", "Hell March [Retaliation Cover].mp3", "Dance hall Dance(Cover).mp3", 
    "Resident Evil 5 Desperate Escape Main Theme Music(Remix).mp3", "Bleed out My Frend.mp3", "Revange.mp3", 
    "Revange 2.mp3", "Survival Of Death.mp3", "Pile of Total Wreck.mp3", "Dessert Storm Ahead.mp3", 
    "Industrial Breakdown.mp3", "Mental Breakdown.mp3", "Metal Gear 2 Solid Snake Chasing the Green Beret Remix.mp3", 
    "Metal Gear 2 Solid Snake Freqency 140.85 Remix Version 2026.mp3", "Metal Gear 2 Solid Snake Level1 Warning Remix.mp3", 
    "Metal Gear 2 Solid Snake Level3 Warning Remix.mp3", "Metal Gear 2 Solid Snake Reprieve of The Doctor Remix.mp3", 
    "Operation Stealth Destruction.mp3", "Takin' On The Shagohod Remake.mp3"
];

let currentIndex = 0; let radioMode = false;
let audioCtx, analyser, dataArray, animationId;
const audio = document.getElementById("audioPlayer");
const logoImg = new Image();
logoImg.src = "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png";

function loadSong(index) {
    currentIndex = index;
    audio.src = songs[index];
    document.getElementById("songSelect").value = index;
    document.getElementById("downloadBtn").href = songs[index];
    document.getElementById("currentSong").textContent = "▶ " + document.getElementById("songSelect").options[index].text.toUpperCase();
}

function togglePlay() {
    if(!audioCtx) initVisualizer();
    if (audio.paused) { audio.play(); document.getElementById("playPauseBtn").textContent = "⏸ PAUSE"; }
    else { audio.pause(); document.getElementById("playPauseBtn").textContent = "▶ PLAY"; }
}

function initVisualizer() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function draw() {
    animationId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);
    const canvas = document.getElementById("visualizerCanvas");
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const logoSize = 150;
    ctx.drawImage(logoImg, centerX - logoSize/2, centerY - logoSize/2, logoSize, logoSize);

    ctx.strokeStyle = "#00ff41";
    ctx.lineWidth = 2;
    for(let i=0; i<dataArray.length; i++) {
        let angle = (i/dataArray.length) * Math.PI * 2;
        let start = 85 + (dataArray[0]/5);
        let len = dataArray[i] / 2;
        ctx.beginPath();
        ctx.moveTo(centerX + Math.cos(angle)*start, centerY + Math.sin(angle)*start);
        ctx.lineTo(centerX + Math.cos(angle)*(start+len), centerY + Math.sin(angle)*(start+len));
        ctx.stroke();
    }
}

function openVisualizer() { 
    if(!audioCtx) initVisualizer();
    document.getElementById("visualizerOverlay").classList.add("active");
    const canvas = document.getElementById("visualizerCanvas");
    canvas.width = window.innerWidth * 0.9;
    canvas.height = window.innerHeight * 0.7;
    draw();
}

function closeVisualizer() { 
    document.getElementById("visualizerOverlay").classList.remove("active");
    cancelAnimationFrame(animationId);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function selectSong() { loadSong(parseInt(document.getElementById("songSelect").value)); togglePlay(); }
function nextSong() { let i = radioMode ? Math.floor(Math.random()*songs.length) : (currentIndex+1)%songs.length; loadSong(i); audio.play(); }
function prevSong() { loadSong((currentIndex-1+songs.length)%songs.length); audio.play(); }
function toggleRadioMode() { radioMode = !radioMode; document.getElementById("radioToggle").textContent = radioMode ? "Radio: AN" : "Radio: AUS"; }

document.getElementById("volumeSlider").oninput = function() {
    audio.volume = this.value;
    document.getElementById("volumeLabel").textContent = Math.round(this.value * 100) + "%";
};

audio.ontimeupdate = () => {
    document.getElementById("progress").value = (audio.currentTime / audio.duration) * 100 || 0;
    document.getElementById("timeLabel").textContent = formatTime(audio.currentTime);
    document.getElementById("durationLabel").textContent = formatTime(audio.duration);
};

function formatTime(s) { if (isNaN(s)) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60).toString().padStart(2, '0'); return m + ":" + sec; }

window.onload = () => { loadSong(0); audio.volume = 0.5; };
</script>
</body>
</html>
