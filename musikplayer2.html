<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC // VenomSnake_Twitch</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #visualizerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
        }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 2px solid var(--mgs-green); max-width: 95vw; max-height: 70vh; background: transparent; }
        
        .nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }
        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }
        .player-box { background: rgba(10, 15, 10, 0.85); border: 2px solid var(--mgs-green); padding: 2rem; position: relative; box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1); width: 100%; backdrop-filter: blur(5px); }
        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 5px; color: var(--mgs-green); margin-bottom: 5px; font-size: 2rem; }
        #currentSong { color: #fff; font-size: 0.9rem; margin-bottom: 20px; background: var(--mgs-green-dim); padding: 12px; border: 1px dashed var(--mgs-green); min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        select, button, .download-btn { background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green); padding: 10px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer; font-size: 0.75rem; transition: 0.2s; text-decoration: none; text-align: center; }
        button:hover, select:hover, .download-btn:hover { background: var(--mgs-green); color: #000; box-shadow: 0 0 10px var(--mgs-green); }
        .vis-controls { margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.65rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="#" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_AUDIO</span>
        </a>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <h1>CODEC INTERFACE</h1>
        <h2 id="currentSong">WÄHLE EINEN TRANSMISSION...</h2>
        <audio id="audioPlayer" crossOrigin="anonymous"></audio>

        <div class="control-grid">
            <select id="songSelect" onchange="selectSong()">
                <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
                <option value="1">Ghost Town by VenomSnake_Twitch</option>
                <option value="2">Wreckfest</option>
            </select>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
        </div>

        <div class="control-grid">
            <button onclick="prevSong()">⏮ ZURÜCK</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="nextSong()">WEITER ⏭</button>
        </div>
    </div>
</main>

<div id="visualizerOverlay">
    <div style="color:var(--mgs-green); margin-bottom:10px; font-family:'Chakra Petch';">VENOM_VISUALIZER_V4.5</div>
    <canvas id="visualizerCanvas"></canvas>
    <div class="vis-controls">
        <select onchange="handleBackgroundOption(this.value); this.value='';" style="border-color: var(--mgs-green); background: #000; color: #00ff41;">
            <option value="">[ HINTERGRUND ]</option>
            <option value="change">BILD ÄNDERN</option>
            <option value="reset">ZURÜCKSETZEN</option>
        </select>
        <button onclick="setVisMode('ring')">[ RING MODUS ]</button>
        <button onclick="setVisMode('bars')">[ BARS MODUS ]</button>
        <button onclick="closeVisualizer()" style="color:#ff4141; border-color:#ff4141;">[ DISCONNECT ]</button>
    </div>
    <input type="file" id="bgFileInput" accept="image/*" style="display:none;">
</div>

<script>
const songs = ["Snake Eater VenomSnake_Twitch Mix.mp3", "Ghost Town by VenomSnake_Twitch.mp3", "Wreckfest.mp3"];
const BASE_URL = "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/";
let currentIndex = 0;
let audioCtx, analyser, dataArray, animationId;
let visMode = 'ring';
const audio = document.getElementById("audioPlayer");
const vizOverlay = document.getElementById('visualizerOverlay');
const logoImg = new Image();
logoImg.src = "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png";

function handleBackgroundOption(val) {
    if(val === 'change') document.getElementById('bgFileInput').click();
    if(val === 'reset') { localStorage.removeItem('codec_viz_bg'); vizOverlay.style.backgroundImage = ''; }
}

document.getElementById('bgFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => { localStorage.setItem('codec_viz_bg', event.target.result); vizOverlay.style.backgroundImage = `url(${event.target.result})`; };
        reader.readAsDataURL(file);
    }
});

if(localStorage.getItem('codec_viz_bg')) vizOverlay.style.backgroundImage = `url(${localStorage.getItem('codec_viz_bg')})`;

function initAudioSystem() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function draw() {
    animationId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);
    const canvas = document.getElementById("visualizerCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (visMode === 'ring') {
        // --- DEINE INTEGRIERTE drawRing() LOGIK ---
        ctx.save();
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const logoBase = Math.min(canvas.width, canvas.height) * 0.32;
        const logoSize = logoBase;

        if (logoImg.complete) {
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(0,255,255,0.5)';
            ctx.drawImage(logoImg, centerX - logoSize/2, centerY - logoSize/2, logoSize, logoSize);
        }

        const ringRadius = logoSize * 0.6;
        const ringThickness = 6;
        const ringOpacity = 0.4;

        ctx.beginPath();
        ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
        ctx.lineWidth = ringThickness;
        ctx.strokeStyle = `hsla(200, 100%, 70%, ${ringOpacity})`;
        ctx.shadowBlur = 25;
        ctx.shadowColor = `rgba(0, 255, 255, 0.6)`;
        ctx.stroke();

        const rayCount = 72;
        for (let i = 0; i < rayCount; i++) {
            const angle = (i / rayCount) * Math.PI * 2;
            const mirroredIndex = Math.min(i, rayCount - 1 - i);
            const freqIndex = Math.floor((mirroredIndex / rayCount) * dataArray.length);
            const amp = dataArray[freqIndex] / 255;
            const rayLength = amp * (ringRadius * 0.5);

            const innerX = centerX + Math.cos(angle) * ringRadius;
            const innerY = centerY + Math.sin(angle) * ringRadius;
            const outerX = centerX + Math.cos(angle) * (ringRadius + rayLength);
            const outerY = centerY + Math.sin(angle) * (ringRadius + rayLength);

            const hue = 180 + (i * 5) % 180;
            ctx.strokeStyle = `hsla(${hue}, 100%, ${60 + amp * 40}%, ${0.7 + amp * 0.3})`;
            ctx.lineWidth = 2 + amp * 8;
            ctx.shadowBlur = 15 + amp * 30;
            ctx.shadowColor = `hsla(${hue}, 100%, 80%, 0.7)`;

            ctx.beginPath();
            ctx.moveTo(innerX, innerY);
            ctx.lineTo(outerX, outerY);
            ctx.stroke();
        }
        ctx.restore();
    } else {
        // Klassischer Bars Modus
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            let barHeight = dataArray[i] * 1.5;
            ctx.fillStyle = "#00ff41";
            ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
            x += barWidth;
        }
    }
}

function openVisualizer() { 
    if(!audioCtx) initAudioSystem();
    vizOverlay.classList.add("active");
    const canvas = document.getElementById("visualizerCanvas");
    canvas.width = window.innerWidth * 0.9;
    canvas.height = window.innerHeight * 0.65;
    draw();
}

function closeVisualizer() { vizOverlay.classList.remove("active"); cancelAnimationFrame(animationId); }
function togglePlay() {
    if(!audioCtx) initAudioSystem();
    if (audio.paused) { audio.play(); document.getElementById("playPauseBtn").textContent = "⏸ PAUSE"; }
    else { audio.pause(); document.getElementById("playPauseBtn").textContent = "▶ PLAY"; }
}
function setVisMode(m) { visMode = m; }
function loadSong(i) { currentIndex = i; audio.src = BASE_URL + encodeURIComponent(songs[i]); document.getElementById("currentSong").textContent = "▶ " + songs[i].toUpperCase(); }
function nextSong() { loadSong((currentIndex+1)%songs.length); audio.play(); }
function prevSong() { loadSong((currentIndex-1+songs.length)%songs.length); audio.play(); }
function selectSong() { loadSong(parseInt(document.getElementById("songSelect").value)); togglePlay(); }

window.onload = () => { loadSong(0); };
</script>
</body>
</html>
