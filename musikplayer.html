<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Musikplayer Test – Radiomodus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
}

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(8px, 3vw, 12px) clamp(12px, 4vw, 24px);
    z-index: 1000;
}

header .logo-container {
    display: flex;
    align-items: center;
    gap: 8px;
}

header .logo-container img { height: clamp(35px, 8vw, 45px); object-fit: contain; }

header .logo-container span {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: bold;
    color: #9146ff;
    text-shadow: 0 0 8px #00ffff;
}

header nav ul {
    list-style: none;
    display: flex;
    gap: clamp(12px, 3vw, 20px);
    margin: 0;
    padding: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
}

header nav ul li a {
    color: #ffffff;
    font-weight: bold;
    text-decoration: none;
    font-size: clamp(14px, 3.5vw, 16px);
    transition: 0.3s;
}

header nav ul li a:hover {
    color: #88f0ff;
    text-shadow: 0 0 6px #88f0ff;
}

#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(80px, 15vh, 100px) clamp(12px, 4vw, 24px) clamp(20px, 5vh, 40px);
}

h1 { font-size: clamp(28px, 8vw, 38px); margin: 0; color: #ffffff; text-shadow: 0 0 12px #00ffff; }
#infoText { margin-top: 8px; font-size: clamp(14px, 3.5vw, 16px); color: #c0c0ff; max-width: 90vw; }

audio { width: 100%; max-width: 600px; margin-top: 16px; }

button, select, #downloadBtn {
    margin: 6px;
    padding: clamp(8px, 2.5vw, 10px) clamp(12px, 3vw, 16px);
    font-size: clamp(14px, 3.5vw, 16px);
    border: 2px solid #00ffff;
    border-radius: 6px;
    background: rgba(0,0,50,0.8);
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

#songControls, #controls, #progressContainer {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 90vw;
}

#progressContainer {
    flex-direction: row;
    align-items: center;
    max-width: 520px;
    margin: 20px auto 12px;
}

#progress {
    width: 100%;
    max-width: 400px;
    height: 10px;
}

#infoBox {
    display: flex;
    flex-direction: row;
    gap: 20px;
    justify-content: space-between;
    background: rgba(10,10,30,0.9);
    padding: 12px;
    border: 1px solid #00ffff;
    border-radius: 6px;
    max-width: 600px;
    width: 90vw;
    color: #c8c8ff;
    text-align: left;
    flex-wrap: wrap;
    min-height: 200px;
    max-height: 40vh;
    overflow-y: auto;
}

@media (max-width: 600px) {
    #infoBox {
        flex-direction: column;
        gap: 16px;
        max-height: none;
        height: auto;
    }
    #infoBox .infoColumn {
        width: 100%;
    }
}

/* Restliche Styles (Loop-Button, Light/Dark, Visualizer) bleiben gleich – hier nur gekürzt dargestellt */
.loop-btn { /* ... wie bisher ... */ }
/* ... alle anderen Styles für Visualizer, Controls usw. wie in deiner letzten Version ... */

/* Visualizer bleibt responsiv wie zuvor */
#visualizerOverlay { /* ... wie bisher ... */ }
#visualizerCanvas { /* ... wie bisher ... */ }
/* ... */
</style>
</head>
<body>

<!-- Dein HTML bleibt fast identisch – nur kleine Klassen/IDs für Responsivität -->

<header>
    <!-- ... wie bisher ... -->
</header>

<div id="overlay">
    <h1>VenomSnake_Twitch´s Musikplayer</h1>
    <div id="infoText">Hier lade ich meine Musik, die ich mit Suno.com (https://suno.com/@venomsnake_94)erstellt habe, hoch. Diese kannst du dir anhören und herunterladen.</div>
    <h2 id="currentSong">▶ Kein Song ausgewählt</h2>
    <audio id="audioPlayer"></audio>

    <div id="songControls">
        <select id="songSelect" onchange="selectSong()">
            <!-- deine Optionen -->
        </select>
        <a id="downloadBtn" href="" download>Download</a>
        <div id="volumeContainer">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span>Lautstärke</span>
        </div>
    </div>

    <div id="progressContainer">
        <span id="timeLabel">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0">
        <button id="loopBtn" type="button" class="loop-btn">🔁</button>
        <span id="durationLabel">0:00</span>
    </div>

    <div id="controls">
        <!-- deine Buttons -->
    </div>

    <div id="infoBox">
        <!-- deine Info-Box bleibt gleich -->
    </div>
</div>

<!-- Visualizer-Overlay wie bisher -->

<script>
// Dein JavaScript bleibt fast identisch – nur resizeCanvas() für Hauptseite ggf. anpassen
// ... (kopiere deinen bisherigen JS-Code hier rein) ...
</script>
</body>
</html>
