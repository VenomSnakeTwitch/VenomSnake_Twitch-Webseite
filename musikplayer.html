<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #ffffff;
    background: url("Music-Background.png") no-repeat center center fixed;
    background-size: cover;
    background-color: #000;
}

/* Zurück Button */
.home-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.8);
    border: 2px solid #00ffcc;
    color: #00ffcc;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

.home-btn:hover {
    background: #00ffcc;
    color: #000;
}

/* Player Container */
.player-container {
    width: 550px;
    margin: 120px auto;
    padding: 30px;
    background: rgba(0,0,0,0.85);
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px #00ffcc;
}

h2 {
    color: #00ffcc;
}

/* Dropdown + Download */
.top-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

select {
    padding: 10px;
    width: 70%;
    border-radius: 6px;
    border: none;
    background: #111;
    color: #00ffcc;
    font-weight: bold;
}

.download-btn {
    padding: 10px 15px;
    border-radius: 6px;
    border: 2px solid #00ffcc;
    background: transparent;
    color: #00ffcc;
    cursor: pointer;
    font-weight: bold;
}

.download-btn:hover {
    background: #00ffcc;
    color: #000;
}

/* Steuerbuttons */
.controls {
    margin-top: 20px;
}

.controls button {
    padding: 10px 20px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    background: #00ffcc;
    color: #000;
    cursor: pointer;
    font-weight: bold;
}

.controls button:hover {
    background: #00cc99;
}

/* Fortschrittsleiste */
.progress-container {
    margin-top: 25px;
}

#progressBar {
    width: 100%;
}

/* Lautstärke */
.volume-container {
    margin-top: 25px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
}

.volume-slider {
    width: 130px;
}

label {
    color: #00ffcc;
    font-weight: bold;
}
</style>
</head>

<body>

<button class="home-btn" onclick="window.location.href='index.html'">
Zurück zur Startseite
</button>

<div class="player-container">

<h2>🎵 VenomSnake Music Player 🎵</h2>

<div class="top-controls">
<select id="songSelect">

<option value="">-- Song auswählen --</option>

<option value="Snake Eater VenomSnake_Twitch Mix.mp3">
Snake Eater VenomSnake_Twitch Mix
</option>

<option value="Ghost Town by VenomSnake_Twitch.mp3">
Ghost Town by VenomSnake_Twitch
</option>

<option value="Wreckfest.mp3">
Wreckfest
</option>

<option value="In The Air Tonight by VenomSnake_Twitch .mp3">
In The Air Tonight by VenomSnake_Twitch
</option>

<option value="Paradies City.mp3">
Paradies City
</option>

<option value="Parasitäres Bewustsein.mp3">
Parasitäres Bewustsein
</option>

<option value="Still Alive (Voiced).mp3">
Still Alive (Voiced)
</option>

<option value="Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3">
Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix
</option>

</select>

<button class="download-btn" onclick="downloadSong()">Download</button>
</div>

<div class="controls">
<button onclick="playSong()">Play</button>
<button onclick="pauseSong()">Pause</button>
<button onclick="stopSong()">Stop</button>
</div>

<div class="progress-container">
<input type="range" id="progressBar" value="0" min="0" step="1">
</div>

<div class="volume-container">
<label for="volume">Lautstärke</label>
<input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
</div>

<audio id="audioPlayer"></audio>

</div>

<script>
const audio = document.getElementById("audioPlayer");
const songSelect = document.getElementById("songSelect");
const progressBar = document.getElementById("progressBar");
const volumeControl = document.getElementById("volume");

/* Play */
function playSong() {
    if (songSelect.value === "") {
        alert("Bitte zuerst einen Song auswählen!");
        return;
    }

    if (!audio.src.includes(songSelect.value)) {
        audio.src = songSelect.value;
    }

    audio.play();
}

/* Pause */
function pauseSong() {
    audio.pause();
}

/* Stop */
function stopSong() {
    audio.pause();
    audio.currentTime = 0;
}

/* Download */
function downloadSong() {
    if (songSelect.value === "") {
        alert("Bitte zuerst einen Song auswählen!");
        return;
    }

    const link = document.createElement("a");
    link.href = songSelect.value;
    link.download = songSelect.value;
    link.click();
}

/* Fortschritt */
audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    progressBar.max = audio.duration;
    progressBar.value = audio.currentTime;
});

progressBar.addEventListener("input", () => {
    audio.currentTime = progressBar.value;
});

/* Lautstärke */
volumeControl.addEventListener("input", () => {
    audio.volume = volumeControl.value;
});
</script>

</body>
</html>
