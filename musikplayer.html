<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Musikplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: #c8c8ff;
    text-align: center;
    overflow: hidden;
}

#overlay {
    background: url("musicbackground.png") no-repeat center center;
    background-size: cover;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 15px #a0a0ff, 0 0 30px #000044;
}

#infoText {
    font-size: 16px;
    margin-bottom: 20px;
    color: #c0c0ff;
    text-shadow: 0 0 5px #8888ff;
}

form, button, select, input, textarea {
    font-family: 'Orbitron', sans-serif;
}

button, select {
    background: #220066;
    border: 2px solid #8888ff;
    color: #c8c8ff;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
    transition: all 0.2s ease;
}

button:hover, select:hover {
    background: #8888ff;
    color: #220066;
}

/* Fortschrittsleiste */
input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 10px;
    border-radius: 5px;
    background: #8888ff;
    outline: none;
    margin-top: 10px;
    cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: #220066;
    border: 2px solid #c8c8ff;
    border-radius: 50%;
    cursor: pointer;
}

/* Lautstärkeregler vertikal */
#volumeSlider {
    -webkit-appearance: none;
    width: 10px;
    height: 150px;
    background: #8888ff;
    border-radius: 5px;
    cursor: pointer;
    writing-mode: bt-lr; /* Vertikal */
    transform: rotate(-90deg); /* Drehen um Hochkant zu machen */
    margin-left: 20px;
}

#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 25px;
    height: 25px;
    background: #220066;
    border: 2px solid #c8c8ff;
    border-radius: 50%;
    cursor: pointer;
}

/* Fortschrittsleiste Container */
#progressContainer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 80%;
    max-width: 500px;
    margin: 10px auto 20px;
    font-size: 14px;
    color: #c8c8ff;
}

/* Song-Auswahl + Download + Lautstärke */
#songControls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
    width: 80%;
    max-width: 500px;
}

#backButton {
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    border: 2px solid gold;
    color: gold;
}

#backButton:hover {
    background: gold;
    color: black;
}

@media (max-width: 600px){
    h1 { font-size: 28px; }
    #infoText { font-size: 14px; }
    button, select { padding: 8px 16px; font-size: 14px; }
    #progressContainer { font-size: 12px; width: 90%; }
    input[type=range] { height: 8px; }
    input[type=range]::-webkit-slider-thumb { width: 16px; height: 16px; }
}
</style>
</head>
<body>
<div id="overlay">
    <h1>VenomSnake Musikplayer</h1>
    <div id="infoText">
        🎵 Alle Songs hier wurden von mir selbst erstellt über <strong>Suno.com</strong>
    </div>
    <h2 id="currentSong">▶ Kein Song ausgewählt</h2>

    <audio id="audioPlayer">
        Dein Browser unterstützt kein Audio-Element.
    </audio>

    <div>
        <button onclick="prevSong()">⏮ Vorheriger</button>
        <button id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
        <button onclick="stopSong()">⏹ Stop</button>
        <button onclick="nextSong()">⏭ Nächster</button>
        <button onclick="toggleFullscreen()">🖵 Vollbild</button>
    </div>

    <!-- Song auswählen + Download + Lautstärke -->
    <div id="songControls">
        <select id="songSelect" onchange="selectSong()">
            <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
            <option value="1">Ghost Town by VenomSnake_Twitch</option>
            <option value="2">Wreckfest</option>
        </select>
        <button id="downloadBtn" onclick="downloadSong()">⬇ Download</button>
        <input type="range" min="0" max="1" step="0.01" value="0.5" id="volumeSlider" oninput="setVolume(this.value)">
    </div>

    <!-- Musik-Fortschrittsleiste -->
    <div id="progressContainer">
        <span id="timeLabel">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0" oninput="seekSong(this.value)">
        <span id="durationLabel">0:00</span>
    </div>

    <!-- Button zurück zur Startseite -->
    <button id="backButton" onclick="window.location.href='index.html'">🏠 Zurück</button>
</div>

<script>
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3",
    "Ghost Town by VenomSnake_Twitch.mp3",
    "Wreckfest.mp3"
];

let currentIndex = 0;
const audio = document.getElementById("audioPlayer");
const currentSongLabel = document.getElementById("currentSong");
const playPauseBtn = document.getElementById("playPauseBtn");
const songSelect = document.getElementById("songSelect");
const progress = document.getElementById("progress");
const timeLabel = document.getElementById("timeLabel");
const durationLabel = document.getElementById("durationLabel");

function loadSong(index){
    currentIndex = index;
    audio.src = songs[index];
    currentSongLabel.textContent = "▶ " + songSelect.options[index].text;
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "▶ Play";
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playPauseBtn.textContent = "⏸ Pause";
    } else {
        audio.pause();
        playPauseBtn.textContent = "▶ Play";
    }
}

function stopSong(){
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "▶ Play";
}

function nextSong(){
    currentIndex = (currentIndex + 1) % songs.length;
    songSelect.value = currentIndex;
    loadSong(currentIndex);
}

function prevSong(){
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    songSelect.value = currentIndex;
    loadSong(currentIndex);
}

function setVolume(value){
    audio.volume = value;
}

function selectSong(){
    const index = parseInt(songSelect.value);
    loadSong(index);
}

function downloadSong(){
    const link = document.createElement('a');
    link.href = songs[currentIndex];
    link.download = songs[currentIndex];
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

audio.addEventListener("timeupdate", () => {
    if(!audio.duration) return;
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.value = percent;
    timeLabel.textContent = formatTime(audio.currentTime);
    durationLabel.textContent = formatTime(audio.duration);
});

function seekSong(value){
    if(!audio.duration) return;
    audio.currentTime = (value / 100) * audio.duration;
}

function formatTime(seconds){
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
}

function toggleFullscreen(){
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Lade ersten Song beim Start
loadSong(currentIndex);
</script>
</body>
</html>
