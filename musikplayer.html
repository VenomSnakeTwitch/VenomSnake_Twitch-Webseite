<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Musikplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow: hidden;
}

#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 15px #a0a0ff, 0 0 30px #000044;
}

#infoText {
    font-size: 16px;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 0 0 5px #000000;
}

#currentSong {
    font-size: 20px;
    margin-bottom: 15px;
    color: #ffffaa;
    text-shadow: 0 0 5px #000044;
}

form, button, select, input, textarea {
    font-family: 'Orbitron', sans-serif;
}

button, select {
    background: #220066;
    border: 2px solid #8888ff;
    color: #f0f0ff;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
    transition: all 0.2s ease;
}

button:hover, select:hover {
    background: #8888ff;
    color: #220066;
}

#backButton {
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    border: 2px solid gold;
    color: gold;
}

#backButton:hover {
    background: gold;
    color: black;
}

#songControls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 10px;
}

#downloadBtn {
    padding: 10px 15px;
    text-decoration: none;
    color: #f0f0ff;
    background: #220066;
    border: 2px solid #8888ff;
    border-radius: 5px;
}

#downloadBtn:hover {
    background: #8888ff;
    color: #220066;
}

/* Fortschrittsbalken */
#progressContainer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

#progress {
    width: 300px;
    height: 12px;
    -webkit-appearance: none;
    background: #8888ff;
    border-radius: 6px;
}

#progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #220066;
    border: 2px solid #f0f0ff;
    border-radius: 50%;
    cursor: pointer;
}

#timeLabel, #durationLabel {
    width: 50px;
    text-align: center;
    font-size: 14px;
    color: #ffffff;
}

/* Lautstärkeregler vertikal */
#volumeContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-left: 20px;
}

#volumeSlider {
    -webkit-appearance: slider-vertical;
    writing-mode: bt-lr;
    width: 40px;
    height: 160px;
    background: #8888ff;
    border-radius: 8px;
    cursor: pointer;
}

#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 40px;
    height: 25px;
    background: #220066;
    border: 2px solid #f0f0ff;
    border-radius: 8px;
    cursor: pointer;
}

/* Controls */
#controls {
    margin-top: 15px;
}

/* Info Box */
#infoBox {
    margin-top: 20px;
    width: 90%;
    max-width: 700px;
    background: rgba(20,20,80,0.9);
    border: 2px solid #8888ff;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 15px #000044;
}

#infoBox h3 {
    margin-top: 0;
    color: #ffffaa;
}

#infoBox p {
    font-size: 14px;
    line-height: 1.5;
    margin: 5px 0;
}

@media (max-width: 600px){
    h1 { font-size: 28px; }
    #progress { width: 200px; }
    #volumeSlider { height: 120px; width: 30px; }
    #timeLabel, #durationLabel { width: 40px; font-size: 12px; }
}
</style>
</head>
<body>
<div id="overlay">
    <h1>VenomSnake Musikplayer</h1>

    <div id="infoText">
        Alle Songs hier wurden von mir selbst erstellt über <strong>Suno.com</strong>
    </div>

    <button id="backButton" onclick="window.location.href='index.html'">Zurück zur Startseite</button>

    <h2 id="currentSong">▶ Kein Song ausgewählt</h2>

    <audio id="audioPlayer"></audio>

    <div id="songControls">
        <select id="songSelect" onchange="selectSong()">
            <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
            <option value="1">Ghost Town by VenomSnake_Twitch</option>
            <option value="2">Wreckfest</option>
            <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
            <option value="4">Paradies City</option>
            <option value="5">Parasitäres Bewustsein</option>
            <option value="6">Still Alive (Voiced)</option>
            <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
            <option value="8">Bye Bye Beautiful</option>
            <option value="9">Kettenreaktion (Cover)</option>
            <option value="10">Straße der Verdammnis (Cover)</option>
            <option value="11">Syphon Filter Synth Mix</option>
            <option value="12">VenomSnake Mode Intro song</option>
            <option value="13">Hell March [Retaliation Cover]</option>
        </select>
        <a id="downloadBtn" href="" download>Download</a>

        <div id="volumeContainer">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span>Lautstärke</span>
        </div>
    </div>

    <div id="progressContainer">
        <span id="timeLabel">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0">
        <span id="durationLabel">0:00</span>
    </div>

    <div id="controls">
        <button onclick="prevSong()">⏮ Vorheriger</button>
        <button id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
        <button onclick="stopSong()">⏹ Stop</button>
        <button onclick="nextSong()">⏭ Nächster</button>
        <button onclick="toggleFullscreen()">Vollbild</button>
    </div>

    <!-- INFO BOX UNTER DEN BUTTONS -->
    <div id="infoBox">
        <h3>Song News</h3>
        <p>Neu: Hell March [Retaliation Cover]</p>
        <p>Neu: Syphon Filter Synth Mix</p>
        <p>Weitere Tracks folgen bald.</p>
    </div>

</div>

<script>
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3",
    "Ghost Town by VenomSnake_Twitch.mp3",
    "Wreckfest.mp3",
    "In The Air Tonight(VenomSnake_Twitch).mp3",
    "Paradies City.mp3",
    "Parasitäres Bewustsein.mp3",
    "Still Alive (Voiced).mp3",
    "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3",
    "ByeByeBeautiful.mp3",
    "Kettenreaktion (Cover).mp3",
    "Straße der Verdammnis (Cover).mp3",
    "Syphon Filter Synth Mix.mp3",
    "VenomSnake Mode Intro song.mp3",
    "Hell March [Retaliation Cover].mp3"
];

let currentIndex = 0;
const audio = document.getElementById("audioPlayer");
const playPauseBtn = document.getElementById("playPauseBtn");
const songSelect = document.getElementById("songSelect");
const progress = document.getElementById("progress");
const timeLabel = document.getElementById("timeLabel");
const durationLabel = document.getElementById("durationLabel");
const volumeSlider = document.getElementById("volumeSlider");
const downloadBtn = document.getElementById("downloadBtn");

function loadSong(index){
    currentIndex = index;
    audio.src = songs[index];
    songSelect.value = index;
    downloadBtn.href = songs[index];
    downloadBtn.setAttribute("download", songs[index]);
    document.getElementById("currentSong").textContent = "▶ " + songSelect.options[index].text;
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playPauseBtn.textContent = "⏸ Pause";
    } else {
        audio.pause();
        playPauseBtn.textContent = "▶ Play";
    }
}

function stopSong(){
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "▶ Play";
}

function nextSong(){
    loadSong((currentIndex + 1) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function prevSong(){
    loadSong((currentIndex - 1 + songs.length) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function selectSong(){
    loadSong(parseInt(songSelect.value));
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Fortschritt & Zeit
audio.addEventListener("timeupdate", () => {
    if(!audio.duration) return;
    progress.value = (audio.currentTime / audio.duration) * 100;
    timeLabel.textContent = formatTime(audio.currentTime);
    durationLabel.textContent = formatTime(audio.duration);
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

// Lautstärke
volumeSlider.addEventListener("input", () => {
    audio.volume = volumeSlider.value;
});

// Zeitformat
function formatTime(time){
    if(isNaN(time)) return "0:00";
    const minutes = Math.floor(time / 60);
    const seconds = Math.floor(time % 60).toString().padStart(2, "0");
    return minutes + ":" + seconds;
}

// Automatischer nächster Song
audio.addEventListener("ended", nextSong);

// Initial
loadSong(0);
</script>
</body>
</html>
