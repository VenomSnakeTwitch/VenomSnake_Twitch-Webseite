<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Musikplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow: hidden;
}

/* HEADER STYLES VON INDEX.HTML */
header {
    width: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    box-sizing: border-box;
}
header .logo img {
    height: 50px;
}
header nav ul {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
}
header nav ul li a {
    text-decoration: none;
    color: #f0f0ff;
    font-weight: bold;
}
header nav ul li a:hover {
    color: #8888ff;
}

/* MUSIKPLAYER STYLES (bestehend) */
#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 15px #a0a0ff, 0 0 30px #000044;
}

/* ... restliche CSS unverändert ... */

</style>
</head>
<body>

<!-- HEADER VON INDEX.HTML -->
<header>
    <div class="logo">
        <img src="logo.png" alt="VenomSnake Logo">
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Startseite</a></li>
            <li><a href="musikplayer.html">Musikplayer</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>
</header>

<!-- EXISTIERENDER MUSIKPLAYER -->
<div id="overlay">
    <h1>VenomSnake Musikplayer</h1>

    <div id="infoText">
        Alle Songs hier wurden von mir selbst erstellt über <strong>Suno.com</strong>
    </div>

    <button id="backButton" onclick="window.location.href='index.html'">Zurück zur Startseite</button>

    <h2 id="currentSong">▶ Kein Song ausgewählt</h2>

    <audio id="audioPlayer"></audio>

    <div id="songControls">
        <select id="songSelect" onchange="selectSong()">
            <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
            <option value="1">Ghost Town by VenomSnake_Twitch</option>
            <option value="2">Wreckfest</option>
            <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
            <option value="4">Paradies City</option>
            <option value="5">Parasitäres Bewustsein</option>
            <option value="6">Still Alive (Voiced)</option>
            <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
            <option value="8">Bye Bye Beautiful</option>
            <option value="9">Kettenreaktion (Cover)</option>
            <option value="10">Straße der Verdammnis (Cover)</option>
            <option value="11">Syphon Filter Synth Mix</option>
            <option value="12">VenomSnake Mode Intro song</option>
            <option value="13">Hell March [Retaliation Cover]</option>
        </select>
        <a id="downloadBtn" href="" download>Download</a>

        <div id="volumeContainer">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span>Lautstärke</span>
        </div>
    </div>

    <div id="progressContainer">
        <span id="timeLabel">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0">
        <span id="durationLabel">0:00</span>
    </div>

    <div id="controls">
        <button onclick="prevSong()">⏮ Vorheriger</button>
        <button id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
        <button onclick="stopSong()">⏹ Stop</button>
        <button onclick="nextSong()">⏭ Nächster</button>
        <button onclick="toggleFullscreen()">Vollbild</button>
    </div>

    <div id="infoBox">
        <h3>Song News</h3>
        <p>Neu: Hell March [Retaliation Cover]</p>
        <p>Neu: Syphon Filter Synth Mix</p>
        <p>Weitere Tracks folgen bald.</p>
    </div>

</div>

<script>
/* JS unverändert */
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3",
    "Ghost Town by VenomSnake_Twitch.mp3",
    "Wreckfest.mp3",
    "In The Air Tonight(VenomSnake_Twitch).mp3",
    "Paradies City.mp3",
    "Parasitäres Bewustsein.mp3",
    "Still Alive (Voiced).mp3",
    "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3",
    "ByeByeBeautiful.mp3",
    "Kettenreaktion (Cover).mp3",
    "Straße der Verdammnis (Cover).mp3",
    "Syphon Filter Synth Mix.mp3",
    "VenomSnake Mode Intro song.mp3",
    "Hell March [Retaliation Cover].mp3"
];

let currentIndex = 0;
const audio = document.getElementById("audioPlayer");
const playPauseBtn = document.getElementById("playPauseBtn");
const songSelect = document.getElementById("songSelect");
const progress = document.getElementById("progress");
const timeLabel = document.getElementById("timeLabel");
const durationLabel = document.getElementById("durationLabel");
const volumeSlider = document.getElementById("volumeSlider");
const downloadBtn = document.getElementById("downloadBtn");

function loadSong(index){
    currentIndex = index;
    audio.src = songs[index];
    songSelect.value = index;
    downloadBtn.href = songs[index];
    downloadBtn.setAttribute("download", songs[index]);
    document.getElementById("currentSong").textContent = "▶ " + songSelect.options[index].text;
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playPauseBtn.textContent = "⏸ Pause";
    } else {
        audio.pause();
        playPauseBtn.textContent = "▶ Play";
    }
}

function stopSong(){
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "▶ Play";
}

function nextSong(){
    loadSong((currentIndex + 1) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function prevSong(){
    loadSong((currentIndex - 1 + songs.length) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function selectSong(){
    loadSong(parseInt(songSelect.value));
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

audio.addEventListener("timeupdate", () => {
    if(!audio.duration) return;
    progress.value = (audio.currentTime / audio.duration) * 100;
    timeLabel.textContent = formatTime(audio.currentTime);
    durationLabel.textContent = formatTime(audio.duration);
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

volumeSlider.addEventListener("input", () => {
    audio.volume = volumeSlider.value;
});

function formatTime(time){
    if(isNaN(time)) return "0:00";
    const minutes = Math.floor(time / 60);
    const seconds = Math.floor(time % 60).toString().padStart(2, "0");
    return minutes + ":" + seconds;
}

audio.addEventListener("ended", nextSong);
loadSong(0);
</script>
</body>
</html>
