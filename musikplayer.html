<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Musikplayer Test – Radiomodus</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0; padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    touch-action: manipulation;
}

header {
    position: fixed; inset: 0 0 auto 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(8px, 2.5vw, 12px) clamp(10px, 4vw, 24px);
    z-index: 1000;
}

.logo-container { display: flex; align-items: center; gap: clamp(6px, 2vw, 10px); }
.logo-container img { height: clamp(32px, 9vw, 45px); object-fit: contain; }
.logo-container span { font-size: clamp(18px, 5vw, 24px); font-weight: bold; color: #9146ff; text-shadow: 0 0 8px #00ffff; }
.logo-container span .snake { color: #00ffff; }

nav ul { list-style: none; display: flex; gap: clamp(10px, 3vw, 20px); margin: 0; padding: 0; flex-wrap: wrap; justify-content: flex-end; }
nav ul li a { color: #fff; font-weight: bold; text-decoration: none; font-size: clamp(13px, 3.5vw, 16px); transition: 0.3s; }
nav ul li a:hover { color: #88f0ff; text-shadow: 0 0 6px #88f0ff; }

#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: clamp(70px, 15vh, 100px) clamp(10px, 4vw, 24px) 40px;
}

h1 { font-size: clamp(28px, 8vw, 38px); margin: 0; color: #fff; text-shadow: 0 0 12px #00ffff; }
#infoText { margin-top: 8px; font-size: clamp(14px, 3.5vw, 16px); color: #c0c0ff; max-width: 90vw; line-height: 1.4; }

audio { width: 100%; max-width: 600px; margin-top: 16px; }

button, select, #downloadBtn {
    margin: clamp(4px, 1.5vw, 8px);
    padding: clamp(8px, 2.5vw, 10px) clamp(12px, 3vw, 16px);
    font-size: clamp(14px, 3.5vw, 16px);
    border: 2px solid #00ffff; border-radius: 6px;
    background: rgba(0,0,50,0.8); color: #fff; cursor: pointer;
    transition: 0.3s;
    min-width: 44px; min-height: 44px;
}

#songControls, #controls, #progressContainer {
    margin-top: 12px;
    display: flex; gap: clamp(8px, 2vw, 12px); flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 90vw;
}

#progressContainer { align-items: center; max-width: 520px; margin: 20px auto 12px; }
#progress { width: 100%; max-width: 400px; height: 10px; background: linear-gradient(90deg, #00ffff, #9146ff); border-radius: 5px; }

#infoBox {
    display: flex; gap: 20px; justify-content: space-between;
    background: rgba(10,10,30,0.9); padding: 12px; border: 1px solid #00ffff;
    border-radius: 6px; max-width: 600px; width: 90vw; color: #c8c8ff;
    text-align: left; flex-wrap: wrap; min-height: 200px; overflow-y: auto;
}

@media (max-width: 600px) {
    #infoBox { flex-direction: column; gap: 16px; min-height: auto; max-height: 45vh; }
    #infoBox .infoColumn { width: 100%; }
}

/* Loop-Button */
.loop-btn {
    width: 38px; height: 38px; font-size: 1.5rem; border: 2px solid #00ffff;
    border-radius: 50%; background: rgba(0,0,50,0.7); color: #a0f0ff; cursor: pointer;
    min-width: 44px; min-height: 44px;
}

/* Light / Dark (wie bei dir) */
[data-theme="light"] #overlay { background: rgba(245,245,255,0.88); }
/* ... restliche Light-Mode-Styles wie in deinem Code ... */

/* ==================== VISUALIZER – mobil-optimiert ==================== */
#visualizerOverlay {
    position: fixed; inset: 0;
    background: rgba(3,3,25,0.97); backdrop-filter: blur(14px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; padding: clamp(10px, 2vh, 20px);
}
#visualizerOverlay.active { display: flex; }

.viz-header { position: absolute; top: clamp(10px, 3vh, 25px); left: 50%; transform: translateX(-50%); }
.viz-header h2 { font-size: clamp(1.8rem, 6vw, 2.6rem); text-shadow: 0 0 25px #00ffff; color: #00ffff; }

.close-viz-btn {
    position: absolute; top: clamp(10px, 3vh, 25px); right: clamp(10px, 3vw, 40px);
    font-size: clamp(2.2rem, 8vw, 3rem); background: none; border: none; color: #ff3366;
    cursor: pointer; transition: all 0.3s;
}

#visualizerCanvas {
    border-radius: 16px;
    box-shadow: 0 0 40px #00ffff66, 0 0 80px #9146ff44;
    background: #00000033;
    width: min(92vw, 1000px);
    height: min(55vh, 70vw);
    max-height: 75vh;
}

.viz-mode-buttons, #vizControls {
    max-width: 92vw;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(8px, 2vw, 12px);
}

.mode-btn { padding: clamp(8px, 2.5vw, 10px) clamp(16px, 4vw, 24px); font-size: clamp(0.9rem, 3vw, 1.05rem); }
.viz-btn { width: clamp(40px, 10vw, 48px); height: clamp(40px, 10vw, 48px); font-size: clamp(1.4rem, 4vw, 1.65rem); }
#vizPlayPauseBtn { width: clamp(52px, 13vw, 62px); height: clamp(52px, 13vw, 62px); font-size: clamp(1.8rem, 5vw, 2.15rem); }
.viz-select { min-width: 180px; max-width: 90vw; font-size: clamp(0.9rem, 3vw, 0.98rem); }

#vizVersion { position: absolute; bottom: 12px; right: 16px; font-size: clamp(0.8rem, 2.5vw, 0.95rem); color: #88f0ff; opacity: 0.7; text-shadow: 0 0 8px #00ffff; pointer-events: none; z-index: 10; }
</style>
</head>
<body>

<!-- Dein gesamtes HTML bleibt identisch mit deiner letzten funktionierenden Version -->

<header>
    <!-- ... -->
</header>

<div id="overlay">
    <!-- ... h1, infoText, audio, songControls, progressContainer, controls, infoBox ... -->
</div>

<div id="visualizerOverlay">

<script>
// ──────────────────────────────────────────────
// Dein JavaScript – mit den entscheidenden Fixes
// ──────────────────────────────────────────────

const songs = [ /* deine Liste – unverändert */ ];

let currentIndex = 0;
let radioMode = false;
let loopCurrent = false;

const audio = document.getElementById("audioPlayer");
// ... alle anderen const (playPauseBtn, songSelect usw.) ...

// Visualizer-Variablen
const visualizerOverlay = document.getElementById('visualizerOverlay');
const visualizerBtn = document.getElementById('visualizerBtn');
const closeVisualizer = document.getElementById('closeVisualizer');
const canvas = document.getElementById('visualizerCanvas');
const ctx = canvas.getContext('2d');
// ... modeBtns, vizPlayPauseBtn, vizSongSelect ...

let audioContext = null;
let analyser, bufferLength, dataArray;
let animationId = null;
let vizMode = 2;

const logoImg = new Image();
logoImg.src = "DogVenomsnakeLogo.png";

// ─── AudioContext + Mobile-Fix ───
function initAudioContext() {
    if (audioContext) return;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    const source = audioContext.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioContext.destination);
}

// Resume bei jeder Interaktion (wichtig für iOS/Android)
function resumeAudio() {
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
}

audio.addEventListener('play', resumeAudio);
document.addEventListener('touchstart', resumeAudio, { once: true });
visualizerBtn.addEventListener('click', resumeAudio);

// ─── Verbesserte resizeCanvas ───
function resizeCanvas() {
    const isPortrait = window.innerHeight > window.innerWidth;
    const padding = isPortrait ? 0.92 : 0.96;

    let w = window.innerWidth * padding;
    let h = window.innerHeight * (isPortrait ? 0.58 : 0.68);

    w = Math.min(w, 1100);
    h = Math.min(h, 800);

    const ratio = isPortrait ? 0.75 : 1.45;
    if (w / h < ratio) h = w / ratio;
    else w = h * ratio;

    canvas.width = Math.floor(w);
    canvas.height = Math.floor(h);

    // Sofortiges Neuzeichnen erzwingen
    if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
        drawVisualizer();
    }
}

// ─── Resize + Drehung ───
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

// ─── Deine draw-Funktionen (unverändert) ───
// drawRing, drawWaveform, drawBars, drawLightning ...

// ─── Blitz nur bei laufender Musik ───
function drawLightning() {
    if (audio.paused || audio.ended || !audio.duration || audio.currentTime === 0) {
        ctx.fillStyle = 'rgba(0, 255, 255, 0.04)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        return;
    }
    // ... deine Blitz-Logik ...
}

// ... drawVisualizer, startVisualizer, stopVisualizer, populateVizSongSelect usw. wie bei dir ...

// ─── Dein restlicher Code (loadSong, togglePlay, toggleRadioMode usw.) ───
// ... bleibt exakt gleich ...

visualizerBtn.addEventListener('click', () => {
    visualizerOverlay.classList.add('active');
    populateVizSongSelect();
    resumeAudio();
    startVisualizer();
});

closeVisualizer.addEventListener('click', () => {
    visualizerOverlay.classList.remove('active');
    stopVisualizer();
});

// ... restliche Event-Listener ...

window.addEventListener('load', () => {
    // ... dein Load-Handler ...
    resizeCanvas();
});
</script>
</body>
</html>
