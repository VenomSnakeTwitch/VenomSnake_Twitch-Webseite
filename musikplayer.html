<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Spenden</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow: hidden;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    box-sizing: border-box;
    z-index: 1000;
}

header .logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

header .logo-container img {
    height: 45px;
    object-fit: contain;
}

header .logo-container span {
    font-size: 24px;
    font-weight: bold;
    color: #9146ff;
    text-shadow: 0px 0px 8px #00ffff;
}

header .logo-container span .snake {
    color: #00ffff;
}

header nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
}

header nav ul li a {
    color: #ffffff;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

header nav ul li a:hover {
    color: #88f0ff;
    text-shadow: 0 0 6px #88f0ff;
}

/* OVERLAY */
#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 100px;
    box-sizing: border-box;
}

h1 {
    font-size: 38px;
    margin: 0;
    color: #ffffff;
    text-shadow: 0 0 12px #00ffff, 0 0 24px #000044;
}

#infoText {
    margin-top: 8px;
    font-size: 16px;
    color: #c0c0ff;
}

/* Player UI */
audio {
    width: 100%;
    margin-top: 16px;
}

button, select, #downloadBtn {
    margin: 8px;
    padding: 10px 16px;
    font-size: 16px;
    border: 2px solid #00ffff;
    border-radius: 6px;
    background: rgba(0,0,50,0.8);
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

button:hover, #downloadBtn:hover, select:hover {
    border-color: #9146ff;
    background: rgba(20,20,80,0.9);
    color: #00ffff;
}

/* Progress + Controls */
#songControls, #controls, #progressContainer {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

/* Fortschrittsbalken mit Farbverlauf */
#progress {
    -webkit-appearance: none;
    appearance: none;
    width: 300px; /* Breite nach Bedarf anpassen */
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #00ffff, #9146ff);
    cursor: pointer;
    outline: none;
}

/* Webkit-Slider-Thumb */
#progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #00ffff;
    cursor: pointer;
    margin-top: -3px;
}

/* Firefox-Thumb */
#progress::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #00ffff;
    cursor: pointer;
}

#volumeContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#volumeContainer input[type="range"] {
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 100px;
}

/* Song News Box */
#infoBox {
    margin-top: 20px;
    background: rgba(10,10,30,0.9);
    padding: 12px;
    border: 1px solid #00ffff;
    border-radius: 6px;
    max-width: 600px;
    color: #c8c8ff;
    text-align: left;
}

/* Zurück Button */
#backBtn {
    margin-bottom: 16px;
    padding: 8px 14px;
    font-size: 14px;
    border: 2px solid #00ffff;
    border-radius: 6px;
    background: rgba(0,0,50,0.8);
    color: #fff;
    cursor: pointer;
}
#backBtn:hover {
    background: rgba(20,20,80,0.9);
    color: #00ffff;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo-container">
        <img src="DogVenomsnakeLogo.png" alt="VenomSnake Logo">
        <span>VENOM<span class="snake">SNΛKE</span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Startseite</a></li>
            <li><a href="donation.html">Spenden</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>
</header>

<!-- OVERLAY -->
<div id="overlay">

    <h1>VenomSnake Spenden</h1>
    <div id="infoText">Unterstütze den Kanal – danke für deine Hilfe!</div>

    <h2 id="currentSong">▶ Kein Song ausgewählt</h2>

    <audio id="audioPlayer"></audio>

    <div id="songControls">
        <select id="songSelect" onchange="selectSong()">
            <option value="0">Snake Eater VenomSnake_Twitch Mix</option>
            <option value="1">Ghost Town by VenomSnake_Twitch</option>
            <option value="2">Wreckfest</option>
            <option value="3">In The Air Tonight(VenomSnake_Twitch)</option>
            <option value="4">Paradies City</option>
            <option value="5">Parasitäres Bewustsein</option>
            <option value="6">Still Alive (Voiced)</option>
            <option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
            <option value="8">Bye Bye Beautiful</option>
            <option value="9">Kettenreaktion (Cover)</option>
            <option value="10">Straße der Verdammnis (Cover)</option>
            <option value="11">Syphon Filter Synth Mix</option>
            <option value="12">VenomSnake Mode Intro song</option>
            <option value="13">Hell March [Retaliation Cover]</option>
        </select>
        <a id="downloadBtn" href="" download>Download</a>

        <div id="volumeContainer">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span>Lautstärke</span>
        </div>
    </div>

    <div id="progressContainer">
        <span id="timeLabel">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0">
        <span id="durationLabel">0:00</span>
    </div>

    <div id="controls">
        <button onclick="prevSong()">⏮ Vorheriger</button>
        <button id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
        <button onclick="stopSong()">⏹ Stop</button>
        <button onclick="nextSong()">⏭ Nächster</button>
        <button onclick="toggleFullscreen()">Vollbild</button>
    </div>

    <div id="infoBox">
        <h3>Song News</h3>
        <p>Neu: Hell March [Retaliation Cover]</p>
        <p>Neu: Syphon Filter Synth Mix</p>
        <p>Weitere Tracks folgen bald.</p>
    </div>
</div>

<script>
const songs = [
    "Snake Eater VenomSnake_Twitch Mix.mp3",
    "Ghost Town by VenomSnake_Twitch.mp3",
    "Wreckfest.mp3",
    "In The Air Tonight(VenomSnake_Twitch).mp3",
    "Paradies City.mp3",
    "Parasitäres Bewustsein.mp3",
    "Still Alive (Voiced).mp3",
    "Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3",
    "ByeByeBeautiful.mp3",
    "Kettenreaktion (Cover).mp3",
    "Straße der Verdammnis (Cover).mp3",
    "Syphon Filter Synth Mix.mp3",
    "VenomSnake Mode Intro song.mp3",
    "Hell March [Retaliation Cover].mp3"
];

let currentIndex = 0;
const audio = document.getElementById("audioPlayer");
const playPauseBtn = document.getElementById("playPauseBtn");
const songSelect = document.getElementById("songSelect");
const progress = document.getElementById("progress");
const timeLabel = document.getElementById("timeLabel");
const durationLabel = document.getElementById("durationLabel");
const volumeSlider = document.getElementById("volumeSlider");
const downloadBtn = document.getElementById("downloadBtn");

function loadSong(index){
    currentIndex = index;
    audio.src = songs[index];
    songSelect.value = index;
    downloadBtn.href = songs[index];
    downloadBtn.setAttribute("download", songs[index]);
    document.getElementById("currentSong").textContent = "▶ " + songSelect.options[index].text;
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playPauseBtn.textContent = "⏸ Pause";
    } else {
        audio.pause();
        playPauseBtn.textContent = "▶ Play";
    }
}

function stopSong(){
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "▶ Play";
}

function nextSong(){
    loadSong((currentIndex + 1) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function prevSong(){
    loadSong((currentIndex - 1 + songs.length) % songs.length);
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function selectSong(){
    loadSong(parseInt(songSelect.value));
    audio.play();
    playPauseBtn.textContent = "⏸ Pause";
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

audio.addEventListener("timeupdate", () => {
    if(!audio.duration) return;
    progress.value = (audio.currentTime / audio.duration) * 100;
    timeLabel.textContent = formatTime(audio.currentTime);
    durationLabel.textContent = formatTime(audio.duration);
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

volumeSlider.addEventListener("input", () => {
    audio.volume = volumeSlider.value;
});

function formatTime(time){
    if(isNaN(time)) return "0:00";
    const minutes = Math.floor(time / 60);
    const seconds = Math.floor(time % 60).toString().padStart(2, "0");
    return minutes + ":" + seconds;
}

audio.addEventListener("ended", nextSong);
loadSong(0);
</script>
</body>
</html>
