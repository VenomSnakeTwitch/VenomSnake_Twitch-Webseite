<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC // VenomSnake_Twitch</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-controls { display: flex; gap: 10px; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }

        .main-container { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }

        .player-box {
            background: rgba(10, 15, 10, 0.6); border: 1px solid var(--mgs-green); padding: 2rem;
            position: relative; box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1); width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Chakra Petch'; text-transform: uppercase; letter-spacing: 5px; color: var(--mgs-green); margin-bottom: 5px; font-size: 2rem; }

        .suno-notice {
            background: rgba(0, 255, 65, 0.05); border: 1px solid var(--mgs-green); padding: 12px;
            margin-bottom: 20px; font-size: 0.8rem; color: var(--mgs-green); text-transform: uppercase;
            line-height: 1.4; backdrop-filter: blur(5px);
        }

        #currentSong { color: #fff; font-size: 0.9rem; margin-bottom: 20px; background: rgba(0, 59, 0, 0.3); padding: 12px; border: 1px dashed var(--mgs-green); min-height: 45px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }

        select, button, .download-btn {
            background: rgba(0, 255, 65, 0.05); border: 1px solid rgba(0, 255, 65, 0.5); color: var(--mgs-green);
            padding: 10px; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer;
            font-size: 0.75rem; transition: 0.3s; text-decoration: none; text-align: center;
            backdrop-filter: blur(8px);
        }
        
        button:hover, select:hover, .download-btn:hover { 
            background: var(--mgs-green); color: #000; box-shadow: 0 0 15px var(--mgs-green); backdrop-filter: none; 
        }

        .active-mode { background: var(--mgs-green) !important; color: #000 !important; backdrop-filter: none !important; }

        .slider-row { display: flex; align-items: center; gap: 15px; margin: 10px 0; background: rgba(0,255,65,0.05); padding: 10px; border: 1px solid var(--mgs-border); backdrop-filter: blur(5px); }
        .slider-label { font-size: 0.7rem; color: var(--mgs-green); min-width: 40px; font-weight: bold; }

        input[type="range"] { flex-grow: 1; accent-color: var(--mgs-green); cursor: pointer; height: 6px; background: var(--mgs-green-dim); border: none; }

        #mainSongOverlay {
            display: none; position: fixed; inset: 0; background: rgba(5, 8, 5, 0.9); backdrop-filter: blur(15px); z-index: 5000; flex-direction: column; padding: 20px; border: 2px solid var(--mgs-green);
        }
        .main-song-item {
            padding: 15px; border-bottom: 1px solid var(--mgs-green-dim); cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: var(--text-primary); text-transform: uppercase; display: flex; justify-content: space-between;
        }
        .main-song-item:hover { background: var(--mgs-green); color: #000; }
        .main-song-item.active-song { border-left: 5px solid var(--mgs-green); background: rgba(0, 255, 65, 0.1); }

        #visualizerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #visualizerOverlay.active { display: flex; }
        #visualizerCanvas { border: 2px solid var(--mgs-green); max-width: 95vw; max-height: 60vh; background: transparent; }

        .vis-player-ui {
            margin-top: 20px; padding: 15px; border: 1px solid var(--mgs-green);
            background: rgba(0, 255, 65, 0.05); backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 800px;
        }
        .vis-row { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }

        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.65rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="#" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_AUDIO</span>
        </a>
        <div class="nav-controls">
            <button onclick="toggleFullscreen()" style="padding: 5px 15px;">[ VOLLBILD ]</button>
        </div>
    </div>
</nav>

<main class="main-container">
    <div class="player-box">
        <h1>CODEC INTERFACE</h1>
        <div class="suno-notice">[ STATUS: SYNCHRONISIERT MIT GITHUB ]</div>
        <h2 id="currentSong">WÄHLE EINEN SONG...</h2>
        <audio id="audioPlayer" crossOrigin="anonymous"></audio>

        <div class="control-grid">
            <button onclick="toggleMainSongList()">[ SONG AUSWÄHLEN ]</button>
            <button onclick="openVisualizer()">[ VISUALIZER ]</button>
            <a id="downloadBtn" href="#" download class="download-btn">DOWNLOAD</a>
        </div>

        <div class="slider-row">
            <span class="slider-label" id="timeLabel">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span class="slider-label" id="durationLabel">0:00</span>
        </div>

        <div class="slider-row">
            <span class="slider-label">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-label" id="volumeLabel">50%</span>
        </div>

        <div class="control-grid">
            <button id="radioModeBtn" onclick="toggleRadioMode()">📻 RADIO: AUS</button>
            <button id="loopModeBtn" onclick="toggleLoopMode()">🔂 LOOP: AUS</button>
            <button onclick="prevSong()">⏮ ZURÜCK</button>
            <button id="playPauseBtn" onclick="togglePlay()">▶ PLAY</button>
            <button onclick="nextSong()">WEITER ⏭</button>
        </div>
    </div>
</main>

<div id="mainSongOverlay">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mgs-green); padding-bottom: 10px; margin-bottom: 20px;">
        <h2 id="overlayTitle" style="font-family: 'Chakra Petch'; color: var(--mgs-green); margin: 0;">ORDNERAUSWAHL</h2>
        <button onclick="toggleMainSongList()" style="color: #ff4141; border-color: #ff4141; padding: 5px 15px;">X SCHLIESSEN</button>
    </div>
    <div id="mainListContent" style="overflow-y: auto; flex-grow: 1;"></div>
</div>

<div id="visualizerOverlay">
    <div style="color:var(--mgs-green); margin-bottom:10px; font-family:'Chakra Petch';">VENOM_VISUALIZER_V5.0</div>
    <canvas id="visualizerCanvas"></canvas>
    <div class="vis-player-ui">
        <div class="slider-row" style="margin:0; background:none; border:none;">
            <span class="slider-label" id="visTimeLabel">0:00</span>
            <input type="range" id="visProgress" min="0" max="100" value="0" oninput="seekAudio(this.value)">
            <span class="slider-label" id="visDurationLabel">0:00</span>
        </div>
        <div class="vis-row">
            <select id="visSongSelect" onchange="selectSongDirect(this.value)" style="flex-grow:1;"></select>
        </div>
        <div class="vis-row">
            <button onclick="prevSong()">⏮</button>
            <button id="visPlayPauseBtn" onclick="togglePlay()" style="min-width:100px;">▶ PLAY</button>
            <button onclick="nextSong()">⏭</button>
            <button id="visRadioBtn" onclick="toggleRadioMode()">📻</button>
            <button id="visLoopBtn" onclick="toggleLoopMode()">🔂</button>
            <button onclick="setVisMode('ring')">RING</button>
            <button onclick="setVisMode('bars')">BARS</button>
            <button onclick="closeVisualizer()" style="color:#ff4141; border-color:#ff4141;">EXIT</button>
        </div>
    </div>
</div>

<script>
const musicLibrary = {
    "HAUPTARCHIV": { 
        api: "https://api.github.com/repos/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/contents/", 
        url: "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/" 
    },
    "RETROWAVEMUSIC": { 
        api: "https://api.github.com/repos/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/contents/RetroWaveMusic/", 
        url: "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/RetroWaveMusic/" 
    }
};

let loadedSongs = {}, currentCat = "HAUPTARCHIV", currentIndex = 0;
let audioCtx, analyser, dataArray, animationId;
let visMode = 'ring';
let isRadioMode = false;
let isLoopMode = false;

const audio = document.getElementById("audioPlayer");
const logoImg = new Image();
logoImg.src = "https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png";

window.addEventListener('DOMContentLoaded', async () => {
    for (const [cat, cfg] of Object.entries(musicLibrary)) {
        try {
            const res = await fetch(cfg.api);
            const data = await res.json();
            loadedSongs[cat] = data.filter(f => f.name.endsWith('.mp3')).map(f => f.name);
        } catch(e) { console.error("Fehler beim Laden von " + cat, e); }
    }
    if (loadedSongs["HAUPTARCHIV"] && loadedSongs["HAUPTARCHIV"].length > 0) loadSong("HAUPTARCHIV", 0);
});

function toggleMainSongList() {
    const overlay = document.getElementById('mainSongOverlay');
    if (overlay.style.display === 'flex') { overlay.style.display = 'none'; }
    else { showCategoryMenu(); overlay.style.display = 'flex'; }
}

function showCategoryMenu() {
    const container = document.getElementById('mainListContent');
    document.getElementById('overlayTitle').textContent = "ORDNERAUSWAHL";
    container.innerHTML = '';
    Object.keys(loadedSongs).forEach(cat => {
        const btn = document.createElement('div');
        btn.className = 'main-song-item';
        btn.innerHTML = `<span>📁 ${cat}</span>`;
        btn.onclick = () => showSongsInCategory(cat);
        container.appendChild(btn);
    });
}

function showSongsInCategory(cat) {
    const container = document.getElementById('mainListContent');
    document.getElementById('overlayTitle').textContent = cat;
    container.innerHTML = `<button onclick="showCategoryMenu()">⬅ ZURÜCK</button>`;
    loadedSongs[cat].forEach((song, idx) => {
        const item = document.createElement('div');
        item.className = 'main-song-item';
        if (cat === currentCat && idx === currentIndex) item.classList.add('active-song');
        item.innerHTML = `<span>🎵 ${song.replace('.mp3', '').replaceAll('_', ' ')}</span>`;
        item.onclick = () => { loadSong(cat, idx); toggleMainSongList(); };
        container.appendChild(item);
    });
}

function loadSong(cat, idx) {
    currentCat = cat;
    currentIndex = idx;
    const song = loadedSongs[cat][idx];
    audio.src = musicLibrary[cat].url + encodeURIComponent(song);
    updateVisSelect();
    document.getElementById("downloadBtn").href = audio.src;
    document.getElementById("currentSong").textContent = "▶ " + song.replace('.mp3', '').toUpperCase();
}

function updateVisSelect() {
    const visSelect = document.getElementById("visSongSelect");
    visSelect.innerHTML = '';
    loadedSongs[currentCat].forEach((song, idx) => {
        let opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = song.replace('.mp3', '');
        if(idx === currentIndex) opt.selected = true;
        visSelect.appendChild(opt);
    });
}

function selectSongDirect(idx) { loadSong(currentCat, parseInt(idx)); audio.play(); updatePlayButtons("⏸ PAUSE"); }

function togglePlay() {
    if(!audioCtx) initAudioSystem();
    if (audio.paused) { audio.play(); updatePlayButtons("⏸ PAUSE"); } 
    else { audio.pause(); updatePlayButtons("▶ PLAY"); }
}

function updatePlayButtons(text) {
    document.getElementById("playPauseBtn").textContent = text;
    document.getElementById("visPlayPauseBtn").textContent = text;
}

function nextSong() {
    let list = loadedSongs[currentCat];
    currentIndex = (currentIndex + 1) % list.length;
    loadSong(currentCat, currentIndex);
    audio.play();
    updatePlayButtons("⏸ PAUSE");
}

function prevSong() {
    let list = loadedSongs[currentCat];
    currentIndex = (currentIndex - 1 + list.length) % list.length;
    loadSong(currentCat, currentIndex);
    audio.play();
    updatePlayButtons("⏸ PAUSE");
}

function initAudioSystem() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function draw() {
    animationId = requestAnimationFrame(draw);
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);
    const canvas = document.getElementById("visualizerCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    if (visMode === 'ring') drawRing(ctx, canvas); else drawBars(ctx, canvas);
}

function drawRing(ctx, canvas) {
    const centerX = canvas.width / 2, centerY = canvas.height / 2;
    const logoBase = Math.min(canvas.width, canvas.height) * 0.32;
    if (logoImg.complete) ctx.drawImage(logoImg, centerX - logoBase/2, centerY - logoBase/2, logoBase, logoBase);
    for (let i = 0; i < 80; i++) {
        const angle = (i / 80) * Math.PI * 2;
        const amp = dataArray[i % dataArray.length] / 255;
        ctx.strokeStyle = `rgba(0, 255, 65, ${0.7 + amp * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(centerX + Math.cos(angle) * 60, centerY + Math.sin(angle) * 60);
        ctx.lineTo(centerX + Math.cos(angle) * (60 + amp * 100), centerY + Math.sin(angle) * (60 + amp * 100));
        ctx.stroke();
    }
}

function drawBars(ctx, canvas) {
    const barWidth = (canvas.width / dataArray.length) * 2.5;
    for (let i = 0; i < dataArray.length; i++) {
        ctx.fillStyle = "#00ff41";
        ctx.fillRect(i * barWidth, canvas.height - dataArray[i] * 1.5, barWidth - 1, dataArray[i] * 1.5);
    }
}

function setVisMode(mode) { visMode = mode; }
function toggleRadioMode() { isRadioMode = !isRadioMode; document.getElementById("radioModeBtn").classList.toggle("active-mode"); document.getElementById("visRadioBtn").classList.toggle("active-mode"); }
function toggleLoopMode() { isLoopMode = !isLoopMode; document.getElementById("loopModeBtn").classList.toggle("active-mode"); document.getElementById("visLoopBtn").classList.toggle("active-mode"); }
function openVisualizer() { if(!audioCtx) initAudioSystem(); document.getElementById("visualizerOverlay").classList.add("active"); draw(); }
function closeVisualizer() { document.getElementById("visualizerOverlay").classList.remove("active"); cancelAnimationFrame(animationId); }
function toggleFullscreen() { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
function seekAudio(val) { audio.currentTime = (val / 100) * audio.duration; }

audio.ontimeupdate = () => {
    if(!isNaN(audio.duration)) {
        const prog = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progress").value = prog;
        document.getElementById("visProgress").value = prog;
        document.getElementById("timeLabel").textContent = document.getElementById("visTimeLabel").textContent = formatTime(audio.currentTime);
        document.getElementById("durationLabel").textContent = document.getElementById("visDurationLabel").textContent = formatTime(audio.duration);
    }
};

document.getElementById("volumeSlider").oninput = function() { audio.volume = this.value; document.getElementById("volumeLabel").textContent = Math.round(this.value * 100) + "%"; };
document.getElementById("progress").oninput = function() { seekAudio(this.value); };
function formatTime(s) { let m = Math.floor(s/60), sec = Math.floor(s%60).toString().padStart(2, '0'); return m + ":" + sec; }
</script>
</body>
</html>
