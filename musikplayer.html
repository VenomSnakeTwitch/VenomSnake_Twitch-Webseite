<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenomSnake Musikplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    background: url("musicbackground.png") no-repeat center center fixed;
    background-size: cover;
    color: #f0f0ff;
    text-align: center;
    overflow: hidden;
}

#overlay {
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 15px #a0a0ff, 0 0 30px #000044;
}

#infoText {
    font-size: 16px;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 0 0 5px #000000;
}

#currentSong {
    font-size: 20px;
    margin-bottom: 15px;
    color: #ffffaa;
    text-shadow: 0 0 5px #000044;
}

form, button, select, input {
    font-family: 'Orbitron', sans-serif;
}

button, select {
    background: #220066;
    border: 2px solid #8888ff;
    color: #f0f0ff;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
    transition: all 0.2s ease;
}

button:hover, select:hover {
    background: #8888ff;
    color: #220066;
}

#backButton {
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    border: 2px solid gold;
    color: gold;
}

#backButton:hover {
    background: gold;
    color: black;
}

#songControls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

#volumeContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-left: 20px;
}

#volumeSlider {
    -webkit-appearance: slider-vertical;
    writing-mode: bt-lr;
    width: 15px;
    height: 150px;
    background: #8888ff;
    border-radius: 5px;
    cursor: pointer;
}

#progressContainer {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    gap: 10px;
}

#progress {
    width: 300px;
}
</style>
</head>

<body>
<div id="overlay">

<h1>VenomSnake Musikplayer</h1>

<div id="infoText">
🎵 Alle Songs hier wurden von mir selbst erstellt über <strong>Suno.com</strong>
</div>

<button id="backButton" onclick="window.location.href='index.html'">
🏠 Zurück zur Startseite
</button>

<h2 id="currentSong">▶ Kein Song ausgewählt</h2>

<audio id="audioPlayer"></audio>

<div id="songControls">
<select id="songSelect" onchange="selectSong()">
<option value="0">Snake Eater VenomSnake_Twitch Mix</option>
<option value="1">Ghost Town by VenomSnake_Twitch</option>
<option value="2">Wreckfest</option>
<option value="3">In The Air Tonight by VenomSnake_Twitch</option>
<option value="4">Paradies City</option>
<option value="5">Parasitäres Bewustsein</option>
<option value="6">Still Alive (Voiced)</option>
<option value="7">Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix</option>
</select>

<button onclick="downloadSong()">⬇ Download</button>

<div id="volumeContainer">
<input type="range" min="0" max="1" step="0.01"
value="0.5" id="volumeSlider"
oninput="audio.volume=this.value">
<span>Lautstärke</span>
</div>
</div>

<div id="progressContainer">
<input type="range" id="progress" min="0" max="100"
value="0" oninput="seekSong(this.value)">
</div>

<div>
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">▶ / ⏸</button>
<button onclick="stopSong()">⏹</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<script>
const songs = [
"Snake Eater VenomSnake_Twitch Mix.mp3",
"Ghost Town by VenomSnake_Twitch.mp3",
"Wreckfest.mp3",
"In The Air Tonight by VenomSnake_Twitch.mp3",
"Paradies City.mp3",
"Parasitäres Bewustsein.mp3",
"Still Alive (Voiced).mp3",
"Yu-Gi-Oh! Master Duel Solo Gate Theme Synth Mix.mp3"
];

let currentIndex = 0;
const audio = document.getElementById("audioPlayer");
const songSelect = document.getElementById("songSelect");
const currentSongLabel = document.getElementById("currentSong");
const progress = document.getElementById("progress");

function loadSong(index){
currentIndex = index;
audio.src = songs[index];
currentSongLabel.textContent = "▶ " + songSelect.options[index].text;
}

function selectSong(){
loadSong(parseInt(songSelect.value));
}

function togglePlay(){
if(audio.paused){
audio.play();
}else{
audio.pause();
}
}

function stopSong(){
audio.pause();
audio.currentTime = 0;
}

function nextSong(){
currentIndex = (currentIndex + 1) % songs.length;
songSelect.value = currentIndex;
loadSong(currentIndex);
}

function prevSong(){
currentIndex = (currentIndex - 1 + songs.length) % songs.length;
songSelect.value = currentIndex;
loadSong(currentIndex);
}

/* 🔥 FIXED DOWNLOAD FUNCTION */
function downloadSong(){
if (!songs[currentIndex]) {
alert("Kein Song ausgewählt!");
return;
}

const fileUrl = window.location.origin +
window.location.pathname.replace("musicplayer.html","") +
songs[currentIndex];

const link = document.createElement("a");
link.href = fileUrl;
link.setAttribute("download", songs[currentIndex]);
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

audio.addEventListener("timeupdate", ()=>{
if(!audio.duration) return;
progress.value = (audio.currentTime / audio.duration) * 100;
});

function seekSong(value){
if(!audio.duration) return;
audio.currentTime = (value / 100) * audio.duration;
}

loadSong(0);
</script>

</body>
</html>
