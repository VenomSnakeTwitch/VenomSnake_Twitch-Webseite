<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT // VenomSnake_Twitch - Secure Line</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
            --discord-blurple: #5865F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            color: var(--text-primary);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        /* Scanline Overlay (CRT Look) */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* Navigation */
        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }

        .nav-container {
            max-width: 1600px; margin: 0 auto; height: 100%; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }
        
        .nav-links { display: flex; gap: 0.8rem; align-items: center; }

        .nav-link { 
            color: var(--mgs-green); text-decoration: none; font-size: 0.8rem; 
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px;
            transition: 0.2s; border: 1px solid transparent;
        }
        .nav-link:hover { background: var(--mgs-green-dim); border: 1px solid var(--mgs-green); color: #fff; }

        .nav-link-discord { color: var(--discord-blurple); border: 1px solid var(--discord-blurple); }
        .nav-link-discord:hover { background: var(--discord-blurple); color: #fff; box-shadow: 0 0 10px var(--discord-blurple); }

        /* Dropdown */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 100%;
            background: var(--mgs-panel); border: 2px solid var(--mgs-green);
            min-width: 220px; z-index: 1001;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a {
            color: var(--mgs-green); padding: 12px 16px; text-decoration: none;
            display: block; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--mgs-border);
        }
        .dropdown-content a:hover { background: var(--mgs-green-dim); color: #fff; }

        /* Main Content */
        .container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        
        .contact-box {
            border: 2px solid var(--mgs-green); background: var(--mgs-panel); padding: 2rem;
            position: relative; box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
        }
        .contact-box::before {
            content: "SECURE_COMMS_ENCRYPTED"; position: absolute; top: -12px; left: 20px;
            background: var(--mgs-bg); padding: 0 10px; font-size: 0.7rem; color: var(--mgs-green);
        }

        h1 { font-family: 'Chakra Petch'; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--mgs-green); }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: var(--mgs-green); }
        
        input, textarea {
            width: 100%; background: #000; border: 1px solid var(--mgs-border);
            padding: 12px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--mgs-green); box-shadow: 0 0 5px var(--mgs-green); }

        .btn-submit {
            background: transparent; border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 12px 30px; font-family: 'Chakra Petch'; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; width: 100%;
        }
        .btn-submit:hover { background: var(--mgs-green); color: #000; }

        #messageStatus { margin-top: 15px; font-size: 0.8rem; font-weight: bold; }

        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.7rem; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span style="font-family:'Chakra Petch'; font-weight:bold;">VENOM_SNAKE_OPS</span>
        </a>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">[ MISSION ]</a>
            <a href="index.html" class="nav-link">[ DATA_FILE ]</a>
            <a href="https://discord.gg/SFzk4YxgRv" target="_blank" class="nav-link nav-link-discord">
                <i data-lucide="message-square" style="width:14px; vertical-align:middle; margin-right:5px;"></i> DISCORD
            </a>
            
            <div class="dropdown">
                <a href="#" class="nav-link" style="background: var(--mgs-green-dim); border: 1px solid var(--mgs-green);">[ SUB_OPERATIONS <i data-lucide="chevron-down" style="width:14px; vertical-align:middle;"></i> ]</a>
                <div class="dropdown-content">
                    <a href="kontakt.html" style="color: #fff;">Kontakt</a>
                    <a href="musikplayer.html">Musikplayer</a>
                    <a href="donation.html">Spenden</a>
                    <a href="impressum.html">Impressum</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="container">
    <div class="contact-box">
        <h1>Establish Connection</h1>
        <p style="font-size: 0.8rem; margin-bottom: 2rem; color: #52b6ca;">Sende eine verschlüsselte Nachricht an das HQ.</p>
        
        <form id="contactForm">
            <div class="form-group">
                <label>OPERATOR_NAME</label>
                <input type="text" name="from_name" placeholder="Rufname eingeben..." required>
            </div>
            <div class="form-group">
                <label>RETURN_ADDRESS (EMAIL)</label>
                <input type="email" name="reply_to" placeholder="email@frequenz.com" required>
            </div>
            <div class="form-group">
                <label>ENCRYPTED_MESSAGE</label>
                <textarea name="message" rows="5" placeholder="Nachricht hier eingeben..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">Sende Signal (Burst Transmission)</button>
            <div id="messageStatus"></div>
        </form>
    </div>
</main>

<footer>
    <p>© 2026 // FOXHOUND COMMUNICATION RELAY // NO TRACE LEFT</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
    (function() {
        emailjs.init("Bw8SYa2jG4vcW4APx");
    })();

    lucide.createIcons();

    const form = document.getElementById('contactForm');
    const status = document.getElementById('messageStatus');

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        status.textContent = ">>> ÜBERTRAGE DATEN...";
        status.style.color = "var(--mgs-green)";

        emailjs.sendForm('service_v64fxbu', 'template_1f6t01d', this)
            .then(() => {
                status.textContent = "✅ ÜBERTRAGUNG ERFOLGREICH: NACHRICHT GESENDET!";
                status.style.color = "#00ff41";
                form.reset();
            }, (error) => {
                console.error(error);
                status.textContent = "❌ FEHLER: VERBINDUNG UNTERBROCHEN. ERNEUT VERSUCHEN.";
                status.style.color = "#ff0000";
            });
    });
</script>

</body>
</html>
