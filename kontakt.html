<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt – VenomSnake_Twitch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    color: #f0f0ff;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(to bottom, #000000, #000044);
}

/* HEADER FIXIEREN UND TRANSPARENT */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    box-sizing: border-box;
    z-index: 1000;
    backdrop-filter: blur(5px);
}

/* Logo + Schriftzug */
header .logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
}
header .logo-container img {
    height: 50px;
    object-fit: contain;
}
header .logo-container span {
    font-size: 24px;
    font-weight: bold;
    color: #a020f0; /* Twitch-Lila */
    text-shadow: 0 0 5px #00ffff;
}
header .logo-container span span {
    color: #00ffff; /* Hellblau für SNΛKE */
}

/* Navigation */
header nav ul {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
}
header nav ul li a {
    text-decoration: none;
    color: #f0f0ff;
    font-weight: bold;
    transition: color 0.3s, text-shadow 0.3s;
}
header nav ul li a:hover {
    color: #88f0ff;
    text-shadow: 0 0 8px #88f0ff;
}

/* Hintergrundbild */
#backgroundImage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://venomsnaketwitch.github.io/VenomSnake_Twitch-Webseite/backgroundcontact.png") no-repeat center center;
    background-size: cover;
    z-index: 0;
}

/* Kontaktformular Overlay */
#overlay {
    position: relative;
    z-index: 1;
    background: rgba(0,0,50,0.85);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 120px 20px 20px 20px; /* Header berücksichtigt */
    box-sizing: border-box;
}

h1 {
    font-size: 36px;
    margin-bottom: 30px;
    text-shadow: 0 0 15px #a020f0, 0 0 30px #00ffff;
}

form {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 500px;
}

input, textarea {
    padding: 15px;
    border: 2px solid #a020f0;
    border-radius: 5px;
    background: black;
    color: #f0f0ff;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    resize: none;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #00ffff;
}

button {
    background: black;
    border: 2px solid #a020f0;
    color: #f0f0ff;
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    background: #a020f0;
    color: #00ffff;
}

#messageStatus {
    font-size: 16px;
    margin-top: 15px;
}

@media (max-width: 600px){
    h1 { font-size: 28px; }
    form { max-width: 90%; }
    input, textarea, button { font-size: 16px; padding: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo-container">
        <img src="DogVenomsnakeLogo.png" alt="VenomSnake Logo">
        <span>VENOM<span>SNΛKE</span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Startseite</a></li>
            <li><a href="musikplayer.html">Musikplayer</a></li> <!-- Korrigiert -->
            <li><a href="donation.html">Spenden</a></li> <!-- Bleibt Spenden -->
        </ul>
    </nav>
</header>
<!-- Hintergrundbild -->
<div id="backgroundImage"></div>

<!-- Kontaktformular Overlay -->
<div id="overlay">
    <h1>Kontakt</h1>
    
    <form id="contactForm">
        <input type="text" name="from_name" placeholder="Dein Name" required>
        <input type="email" name="reply_to" placeholder="Deine E-Mail" required>
        <textarea name="message" placeholder="Deine Nachricht" rows="7" required></textarea>
        <button type="submit">Nachricht senden</button>
        <div id="messageStatus"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
    emailjs.init("Bw8SYa2jG4vcW4APx");

    const form = document.getElementById('contactForm');
    const status = document.getElementById('messageStatus');

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        status.textContent = "Sende Nachricht...";
        emailjs.sendForm('service_v64fxbu', 'template_1f6t01d', this)
            .then(() => {
                status.textContent = "✅ Nachricht erfolgreich gesendet!";
                form.reset();
            }, (error) => {
                console.error(error);
                status.textContent = "❌ Fehler beim Senden. Bitte erneut versuchen.";
            });
    });
</script>
</body>
</html>
