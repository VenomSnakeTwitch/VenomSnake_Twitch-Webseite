<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT // VenomSnake_Twitch - Secure Line</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --mgs-green: #00ff41; 
            --mgs-green-dim: #003b00;
            --mgs-bg: #050805;
            --mgs-panel: #0a0f0a;
            --mgs-border: #1a2e1a;
            --text-primary: #d1ffd1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--mgs-bg);
            color: var(--text-primary);
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* Navigation */
        .nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 15, 10, 0.95); border-bottom: 2px solid var(--mgs-green); z-index: 1000;
        }
        .nav-container { max-width: 1600px; margin: 0 auto; height: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--mgs-green); font-family: 'Chakra Petch'; font-weight: bold; }
        .logo img { height: 45px; filter: drop-shadow(0 0 5px var(--mgs-green)); }

        /* Main Content */
        .container { max-width: 600px; margin: 120px auto 40px; padding: 0 20px; }
        
        .contact-box {
            border: 2px solid var(--mgs-green); background: var(--mgs-panel); padding: 2.5rem;
            position: relative; box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
        }
        .contact-box::before {
            content: "SECURE_COMMS_V3.0"; position: absolute; top: -12px; left: 20px;
            background: var(--mgs-bg); padding: 0 10px; font-size: 0.7rem; color: var(--mgs-green);
        }

        h1 { font-family: 'Chakra Petch'; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; color: var(--mgs-green); border-bottom: 1px solid var(--mgs-green-dim); padding-bottom: 10px; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: var(--mgs-green); letter-spacing: 1px; }
        
        input, textarea {
            width: 100%; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--mgs-border);
            padding: 12px; color: #fff; font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--mgs-green); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }

        .btn-submit {
            background: var(--mgs-green-dim); border: 1px solid var(--mgs-green); color: var(--mgs-green);
            padding: 15px; font-family: 'Chakra Petch'; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; width: 100%; letter-spacing: 1px;
        }
        .btn-submit:hover { background: var(--mgs-green); color: #000; box-shadow: 0 0 20px var(--mgs-green); }

        #messageStatus { margin-top: 15px; font-size: 0.8rem; font-weight: bold; text-align: center; min-height: 1.2em; }

        footer { text-align: center; padding: 40px; color: var(--mgs-green-dim); font-size: 0.7rem; border-top: 1px dashed var(--mgs-green-dim); }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/VenomSnakeTwitch/VenomSnake_Twitch-Webseite/main/DogVenomsnakeLogo.png" alt="Logo">
            <span>VENOM_SNAKE_OPS</span>
        </a>
    </div>
</nav>

<main class="container">
    <div class="contact-box">
        <h1>Funkverbindung</h1>
        
        <form id="contactForm">
            <div class="form-group">
                <label>OPERATOR_NAME</label>
                <input type="text" name="from_name" placeholder="Name eingeben..." required>
            </div>
            
            <div class="form-group">
                <label>SIGNAL_ADRESSE (E-MAIL)</label>
                <input type="email" name="reply_to" placeholder="E-Mail eingeben..." required>
            </div>

            <div class="form-group">
                <label>VERSCHLÜSSELTE_NACHRICHT</label>
                <textarea name="message" rows="6" placeholder="Nachricht verfassen..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">SIGNAL SENDEN (BURST TRANSMISSION)</button>
            <div id="messageStatus"></div>
        </form>
    </div>
</main>

<footer>
    <p>ENCRYPTION: AES-256 // FOXHOUND SECURE COMM-LINK</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
    (function() {
        emailjs.init("Bw8SYa2jG4vcW4APx"); // Deine User-ID
    })();

    const form = document.getElementById('contactForm');
    const status = document.getElementById('messageStatus');

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        status.textContent = ">>> ÜBERTRAGE DATEN...";
        status.style.color = "var(--mgs-green)";

        emailjs.sendForm('service_v64fxbu', 'template_1f6t01d', this)
            .then(() => {
                status.textContent = "✅ ÜBERTRAGUNG ERFOLGREICH: SIGNAL EMPFANGEN.";
                status.style.color = "#00ff41";
                form.reset();
            }, (error) => {
                console.error(error);
                status.textContent = "❌ FEHLER: VERBINDUNG UNTERBROCHEN.";
                status.style.color = "#ff0000";
            });
    });
</script>

</body>
</html>
